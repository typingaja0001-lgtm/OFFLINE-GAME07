<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - TETRIS ULTRA NEON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body { background: #050112; color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #ff00ff; box-shadow: 0 0 30px #ff00ff; background: #000; }
        .stats-panel { border: 2px solid #00f2ff; padding: 15px; border-radius: 10px; background: rgba(0, 242, 255, 0.05); text-align: center; min-width: 140px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .neon-pink { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }

        /* MODAL STYLE */
        #gameOverModal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: #0d0221; border: 3px solid #ff00ff; padding: 40px; 
            border-radius: 20px; text-align: center; box-shadow: 0 0 50px #ff00ff;
        }
    </style>
</head>
<body>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="text-4xl neon-pink mb-2 italic">GAME OVER</h2>
            <p class="text-gray-400 text-xs mb-6 tracking-widest uppercase">Arena Telah Penuh</p>
            <div class="mb-8">
                <p class="text-gray-500 text-[10px] uppercase">Final Score</p>
                <p id="finalScoreDisplay" class="text-5xl neon-cyan">0</p>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="restartGame()" class="w-full bg-white text-black py-3 rounded-lg font-black hover:bg-cyan-400 transition uppercase italic">Main Lagi</button>
                <button onclick="saveAndExit()" class="w-full border border-gray-600 text-gray-500 py-3 rounded-lg hover:text-white hover:border-white transition uppercase text-xs">Menu Utama</button>
            </div>
        </div>
    </div>

    <div class="mb-6 flex gap-6">
        <div class="stats-panel">
            <p class="text-[10px] text-gray-400 uppercase tracking-tighter">Player</p>
            <p id="pName" class="text-sm neon-cyan uppercase">---</p>
        </div>
        <div class="stats-panel">
            <p class="text-[10px] text-gray-400 uppercase tracking-tighter">Score</p>
            <p id="pScore" class="text-2xl neon-pink">0</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const player = (localStorage.getItem('loginUser') || "USER").toUpperCase();
        document.getElementById('pName').innerText = player;

        context.scale(20, 20);

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                playerStats.score += rowCount * 100;
                rowCount *= 2;
                updateStats();
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createMatrix(w, h) { return Array.from({length: h}, () => new Array(w).fill(0)); }

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
            return [[0, 5, 0], [5, 5, 0], [0, 5, 0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(playerStats.matrix, playerStats.pos);
        }

        const colors = [null, '#00f2ff', '#ff00ff', '#00ff00', '#ffff00', '#ff0000', '#0000ff', '#ffa500'];

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function playerDrop() {
            playerStats.pos.y++;
            if (collide(arena, playerStats)) {
                playerStats.pos.y--;
                merge(arena, playerStats);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            playerStats.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            playerStats.pos.y = 0;
            playerStats.pos.x = (arena[0].length / 2 | 0) - (playerStats.matrix[0].length / 2 | 0);
            if (collide(arena, playerStats)) isGameOver = true;
        }

        function updateStats() { document.getElementById('pScore').innerText = playerStats.score; }

        let dropCounter = 0;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if (isGameOver) {
                document.getElementById('finalScoreDisplay').innerText = playerStats.score;
                document.getElementById('gameOverModal').style.display = 'flex';
                return;
            }
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > 800) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        // --- NAVIGASI MODAL ---
        function restartGame() {
            arena.forEach(row => row.fill(0));
            playerStats.score = 0;
            isGameOver = false;
            updateStats();
            playerReset();
            document.getElementById('gameOverModal').style.display = 'none';
            update();
        }

        async function saveAndExit() {
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                let userKey = Object.keys(data).find(k => data[k].name.toUpperCase() === player);
                if(userKey) {
                    await fetch(`https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ score: data[userKey].score + playerStats.score })
                    });
                }
            } catch (e) {}
            window.location.href = 'menu.html';
        }

        const arena = createMatrix(12, 20);
        const playerStats = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        document.addEventListener('keydown', e => {
            if (isGameOver) return;
            if (e.keyCode === 37) { playerStats.pos.x--; if(collide(arena, playerStats)) playerStats.pos.x++; }
            if (e.keyCode === 39) { playerStats.pos.x++; if(collide(arena, playerStats)) playerStats.pos.x--; }
            if (e.keyCode === 40) playerDrop();
        });

        playerReset();
        update();
    </script>
</body>
</html>

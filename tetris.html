<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - TETRIS NEON EVOLUTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background: #02000a; color: white; font-family: 'Rajdhani', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; overflow: hidden; 
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* TOMBOL BACK - DESIGN BARU */
        .btn-exit {
            position: fixed; top: 30px; left: 30px;
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid #ff00ff;
            padding: 10px 20px; border-radius: 8px;
            color: #ff00ff; text-decoration: none;
            font-size: 12px; letter-spacing: 2px;
            transition: 0.4s; z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }
        .btn-exit:hover { 
            background: #ff00ff; color: #fff; 
            box-shadow: 0 0 30px #ff00ff; transform: translateY(-2px);
        }

        /* GAME BOARD */
        #game-container { 
            position: relative; border: 3px solid #00f2ff; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); 
            background: #000; border-radius: 12px; padding: 5px;
        }

        .stats-wrapper {
            display: flex; gap: 30px; margin-bottom: 20px;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 9px; color: #666; letter-spacing: 3px; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-family: 'Orbitron'; color: #fff; line-height: 1; }

        /* MODAL GAME OVER */
        #gameOverModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.96); z-index: 100; 
            align-items: center; justify-content: center; backdrop-filter: blur(15px); 
        }
        .modal-content { 
            background: #050112; border: 2px solid #00f2ff; padding: 40px; 
            border-radius: 20px; text-align: center; box-shadow: 0 0 80px rgba(0, 242, 255, 0.3); width: 340px; 
        }
    </style>
</head>
<body>

    <a href="menu.html" class="btn-exit orbitron font-bold">
        <i class="fas fa-power-off mr-2"></i> ABORT MISSION
    </a>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="orbitron text-4xl text-cyan-400 mb-2 italic">CORE BREACH</h2>
            <p class="text-gray-500 text-[10px] uppercase orbitron mb-10 tracking-[0.5em]">Sequence Interrupted</p>
            <div class="mb-10">
                <p class="text-gray-400 text-xs orbitron mb-2 uppercase">Total Data Acquired</p>
                <p id="finalScoreDisplay" class="text-6xl text-white orbitron">0</p>
            </div>
            <button onclick="restartGame()" class="w-full bg-[#00f2ff] text-black py-4 rounded-lg font-black orbitron hover:bg-white transition uppercase text-lg italic shadow-[0_0_20px_rgba(0,242,255,0.5)]">RE-INITIATE</button>
            <button onclick="window.location.href='menu.html'" class="mt-6 text-gray-600 text-[10px] orbitron uppercase hover:text-white transition tracking-widest">Return to Base</button>
        </div>
    </div>

    <div class="stats-wrapper">
        <div class="stat-item">
            <p class="stat-label orbitron uppercase">Agent</p>
            <p id="pName" class="text-cyan-400 font-bold uppercase tracking-widest text-sm">---</p>
        </div>
        <div class="stat-item">
            <p class="stat-label orbitron uppercase">Data-Score</p>
            <p id="pScore" class="stat-value">0</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="tetris" width="240" height="440"></canvas>
    </div>

    <div class="mt-8 flex gap-8 opacity-40">
        <div class="text-center"><p class="text-[10px] orbitron uppercase">Arrows</p><p class="text-[9px]">MOVE</p></div>
        <div class="text-center"><p class="text-[10px] orbitron uppercase">Space</p><p class="text-[9px]">ROTATE</p></div>
        <div class="text-center"><p class="text-[10px] orbitron uppercase">Down</p><p class="text-[9px]">DROP</p></div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const player = (localStorage.getItem('loginUser') || "GHOST").toUpperCase();
        document.getElementById('pName').innerText = player;

        context.scale(20, 20);

        function createMatrix(w, h) { return Array.from({length: h}, () => new Array(w).fill(0)); }

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
            if (type === 'S') return [[0, 5, 5], [5, 5, 0], [0, 0, 0]];
            if (type === 'Z') return [[6, 6, 0], [0, 6, 6], [0, 0, 0]];
        }

        const colors = [null, '#00f2ff', '#ff00ff', '#00ff00', '#ffff00', '#ff0000', '#3b82f6', '#f59e0b'];

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Neon Crystal Style
                        context.shadowBlur = 15;
                        context.shadowColor = colors[value];
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 0.9, 0.9);
                        
                        // Inner Highlight
                        context.strokeStyle = 'rgba(255,255,255,0.5)';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.7, 0.7);
                    }
                });
            });
            context.shadowBlur = 0;
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            // Subtle Scanlines
            context.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            context.lineWidth = 0.02;
            for(let i=0; i<22; i++) {
                context.beginPath(); context.moveTo(0, i); context.lineTo(12, i); context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(playerStats.matrix, playerStats.pos);
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerRotate(dir) {
            const pos = playerStats.pos.x;
            let offset = 1;
            rotate(playerStats.matrix, dir);
            while (collide(arena, playerStats)) {
                playerStats.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > playerStats.matrix[0].length) {
                    rotate(playerStats.matrix, -dir);
                    playerStats.pos.x = pos;
                    return;
                }
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                playerStats.score += rowCount * 100;
                rowCount *= 2;
                updateStats();
            }
        }

        function playerDrop() {
            playerStats.pos.y++;
            if (collide(arena, playerStats)) {
                playerStats.pos.y--;
                merge(arena, playerStats);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            playerStats.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            playerStats.pos.y = 0;
            playerStats.pos.x = (arena[0].length / 2 | 0) - (playerStats.matrix[0].length / 2 | 0);
            if (collide(arena, playerStats)) isGameOver = true;
        }

        function updateStats() { document.getElementById('pScore').innerText = playerStats.score; }

        let dropCounter = 0;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if (isGameOver) {
                document.getElementById('finalScoreDisplay').innerText = playerStats.score;
                document.getElementById('gameOverModal').style.display = 'flex';
                return;
            }
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > 800) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function restartGame() {
            arena.forEach(row => row.fill(0));
            playerStats.score = 0;
            isGameOver = false;
            updateStats();
            playerReset();
            document.getElementById('gameOverModal').style.display = 'none';
            update();
        }

        const arena = createMatrix(12, 22);
        const playerStats = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        document.addEventListener('keydown', e => {
            if (isGameOver) return;
            if (e.keyCode === 37) { playerStats.pos.x--; if(collide(arena, playerStats)) playerStats.pos.x++; }
            if (e.keyCode === 39) { playerStats.pos.x++; if(collide(arena, playerStats)) playerStats.pos.x--; }
            if (e.keyCode === 40) playerDrop();
            if (e.keyCode === 32) { e.preventDefault(); playerRotate(1); }
        });

        playerReset();
        update();
    </script>
</body>
</html>

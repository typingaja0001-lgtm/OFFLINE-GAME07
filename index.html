<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - THE ULTIMATE NEON ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* AUTH STYLE (GLASSMORPHISM POPUP) */
        .auth-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        .glass-box {
            background: rgba(15, 23, 42, 0.9); border: 1px solid #bc13fe;
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.3); width: 100%; max-width: 400px;
            padding: 40px; border-radius: 30px; position: relative;
        }

        /* GAME GRID BACKGROUND (PREVIEW) */
        .bg-grid-preview { filter: blur(5px); opacity: 0.5; pointer-events: none; }

        /* INPUT & BUTTON */
        .input-cyber { background: #000 !important; border: 1px solid #334155 !important; color: white !important; font-size: 12px; }
        .input-cyber:focus { border-color: #00f2ff !important; box-shadow: 0 0 10px #00f2ff; outline: none; }
        
        /* PREVIEW CARD */
        .preview-card {
            background: #0f172a; border-radius: 12px; overflow: hidden; height: 160px;
            border: 1px solid rgba(255, 255, 255, 0.05); position: relative;
        }
        .preview-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .preview-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; background: linear-gradient(transparent, #000); }
    </style>
</head>
<body>

    <div id="authContainer" class="auth-overlay">
        <div class="glass-box text-center">
            <h1 class="text-5xl font-black orbitron italic neon-cyan mb-8 tracking-tighter italic shadow-[0_0_15px_#00f2ff]">YOKBISAYOK</h1>
            <p class="text-[10px] tracking-[4px] text-purple-400 font-bold uppercase mt-2">Access Granted to Members Only</p>

            <div id="loginForm" class="mt-8 space-y-4">
                <input type="text" id="lUser" placeholder="USERNAME" class="input-cyber w-full p-4 rounded-xl text-center">
                <input type="password" id="lPass" placeholder="PASSWORD" class="input-cyber w-full p-4 rounded-xl text-center">
                <button onclick="doLogin()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 p-4 rounded-xl font-bold orbitron text-sm hover:scale-105 transition shadow-lg shadow-cyan-500/20">ENTER ARCADE</button>
                <p class="text-center mt-6 text-xs text-gray-500">Belum punya akses? <span onclick="toggleAuth()" class="text-purple-400 cursor-pointer hover:underline">Daftar Sekarang</span></p>
            </div>

            <div id="registerForm" class="hidden mt-8 space-y-4">
                <input type="text" id="rUser" placeholder="NEW USERNAME" class="input-cyber w-full p-4 rounded-xl text-center">
                <input type="password" id="rPass" placeholder="NEW PASSWORD" class="input-cyber w-full p-4 rounded-xl text-center">
                <button onclick="doRegister()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 p-4 rounded-xl font-bold orbitron text-sm hover:scale-105 transition shadow-lg shadow-purple-500/20">CREATE ACCOUNT</button>
                <p class="text-center mt-6 text-xs text-gray-500">Sudah terdaftar? <span onclick="toggleAuth()" class="text-cyan-400 cursor-pointer hover:underline">Masuk</span></p>
            </div>
        </div>
    </div>

    <div class="bg-grid-preview p-8">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black orbitron italic">YOKBISAYOK</h2>
            <div class="flex gap-4">
                <div class="w-10 h-10 rounded-xl bg-slate-800"></div>
                <div class="w-24 h-4 bg-slate-800 rounded-full mt-3"></div>
            </div>
        </header>

        <div class="mb-12 text-center">
            <h3 class="text-5xl font-black orbitron mb-4">ARCADE <span class="text-cyan-400">OFFLINE</span> 100+ GAMES</h3>
            <p class="text-gray-500 tracking-widest uppercase text-xs">Login to unlock full experience</p>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <div class="preview-card">
                <img src="https://source.unsplash.com/400x300/?gaming,snake,neon" class="preview-img">
                <div class="preview-text"><p class="text-[10px] font-bold orbitron truncate text-cyan-400">Neon Snake</p></div>
            </div>
            <div class="preview-card">
                <img src="https://source.unsplash.com/400x300/?gaming,motorcycle,neon" class="preview-img">
                <div class="preview-text"><p class="text-[10px] font-bold orbitron truncate text-cyan-400">Cyber Moto</p></div>
            </div>
            <div class="preview-card">
                <img src="https://source.unsplash.com/400x300/?gaming,breakout,neon" class="preview-img">
                <div class="preview-text"><p class="text-[10px] font-bold orbitron truncate text-cyan-400">Brick Break</p></div>
            </div>
            </div>
    </div>

<script>
    // SISTEM LOGIN & DAFTAR
    let users = JSON.parse(localStorage.getItem("users") || "[]");

    function toggleAuth() {
        document.getElementById("loginForm").classList.toggle("hidden");
        document.getElementById("registerForm").classList.toggle("hidden");
    }

    function doRegister() {
        const u = document.getElementById("rUser").value;
        const p = document.getElementById("rPass").value;
        if(!u || !p) return alert("Isi data Bosku!");
        if(users.find(x => x.user === u)) return alert("Username sudah terpakai!");
        
        users.push({user: u, pass: p});
        localStorage.setItem("users", JSON.stringify(users));
        alert("Pendaftaran Berhasil! Silakan Login.");
        toggleAuth();
    }

    function doLogin() {
        const u = document.getElementById("lUser").value;
        const p = document.getElementById("lPass").value;
        const found = users.find(x => x.user === u && x.pass === p);
        
        if(found) {
            localStorage.setItem("loginUser", u);
            // PINDAH KE HALAMAN LOADING SEBELUM KE MENU UTAMA
            window.location.href = "loading.html?game=menu";
        } else {
            alert("Akses Ditolak! Cek Username/Password.");
        }
    }

    // AUTO-REDIRECT JIKA SUDAH LOGIN
    if(localStorage.getItem("loginUser")) {
        window.location.href = "menu.html";
    }
</script>
</body>
</html>

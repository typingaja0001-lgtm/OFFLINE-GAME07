/* HEADER - NEON STYLE */

/* SIDEBAR */

}

.menu-item{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);

}

.menu-item:hover{

/* 🔥 KOTAK LIVE WIN NEON */
.win-container{
  margin-top:20px;
  padding:10px;
  border-radius:10px;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 15px cyan;
  border:1px solid rgba(0,255,255,0.5);
}

#winBox div{
  background:rgba(0,0,0,0.6);
  border-left:3px solid cyan;
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
  margin-bottom: 8px;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateX(-10px);}
  to{opacity:1; transform:translateX(0);}
}

/* BANNER UTAMA (DITAMBAH LOGO OVERLAY) */
.banner{
  width:100%;
  height:70vh;
  border-radius:15px;
  overflow:hidden;
  position: relative;
  border: 1px solid rgba(188, 19, 254, 0.5);
  box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
}

.banner img.main-img{

  height:100%;

}

.banner-logo {

  top: 10%;
  left: 50%;

  filter: drop-shadow(0 0 15px cyan);
  z-index: 10;
}

/* GAME CARD NEON */
.game-card{

  border-radius:12px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 15px #a855f7, 0 0 30px #3b82f6;
}

.game-card:hover{
  transform:scale(1.05);
  box-shadow: 0 0 30px #ec4899, 0 0 60px #3b82f6;
  border-color: #ec4899;
}

.game-img{
  width:100%;
  height:140px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#020617;
  border-bottom: 2px solid cyan;
}

.game-img img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;

/* KOTAK PANJANG DI BAWAH (LOWER BANNER) */

    width: 100%;
    height: 120px;

.promo-text h2 { font-size: 20px; font-weight: bold; color: white; margin: 0; }

/* INPUT & BUTTON NEON */

<script>
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "" || pass === ""){
    alert("Isi username & password dulu!");
    return;
  }

  // AMBIL DATA DARI LOCAL STORAGE
  let users = JSON.parse(localStorage.getItem("users") || "[]");

  // CARI USER
  let found = users.find(u => u.user === user && u.pass === pass);

  if(found){
    localStorage.setItem("loginUser", user);
    // Masuk ke halaman loading dulu biar keren
    window.location.href = "loading.html?game=menu";
  }else{
    alert("Username atau password salah! Pastikan sudah Daftar.");
  }
}

/* LIVE WINNER LOGIC */
const games = ["PRAGMATIC", "BACCARAT", "ROULETTE", "POKER", "PGSOFT"];
const names = ["Master", "Raja", "Sultan", "Hoki88", "Gacor", "King"];
const winBox = document.getElementById("winBox");

function addWin(){
  let name = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99);
  let game = games[Math.floor(Math.random()*games.length)];
  let amount = (Math.floor(Math.random()*900000)+50000).toLocaleString('id-ID');

  let div = document.createElement("div");
  div.innerHTML = `<span style="color:cyan">***${name.slice(-3)}</span> menang <b style="color:yellow">Rp ${amount}</b> di ${game}`;
  winBox.prepend(div);

  if(winBox.children.length > 6){
    winBox.removeChild(winBox.lastChild);
  }
}

for(let i=0;i<5;i++){ addWin(); }
setInterval(addWin, 3000);
</script>

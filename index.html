<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - PC OFFLINE ARCADE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #020617; }

        /* NEON BACKGROUND EFFECT */
        .hero-pc {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0.4), #020617), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        /* GLITCH NEON TEXT */
        .neon-title {
            font-size: 7rem; font-weight: 900; line-height: 0.9;
            color: #fff;
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff, 0 0 40px #bc13fe;
            animation: glow 2s infinite alternate;
            text-transform: uppercase; font-style: italic;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
            to { text-shadow: 0 0 20px #bc13fe, 0 0 40px #bc13fe, 0 0 60px #bc13fe; }
        }

        /* NEON BUTTON */
        .btn-neon-play {
            background: transparent;
            border: 4px solid #00f2ff;
            color: #00f2ff;
            padding: 20px 80px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 0; /* Kotak biar kesan PC-nya dapet */
            cursor: pointer;
            box-shadow: 0 0 15px #00f2ff, inset 0 0 15px #00f2ff;
            transition: 0.3s;
            margin-top: 40px;
            text-transform: uppercase;
        }

        .btn-neon-play:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 50px #00f2ff;
            transform: scale(1.05);
        }

        /* MODAL NEON */
        .modal-neon {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); z-index: 100; display: none;
            align-items: center; justify-content: center;
        }

        .neon-card {
            background: #000; border: 2px solid #bc13fe;
            padding: 50px; width: 100%; max-width: 450px;
            box-shadow: 0 0 30px #bc13fe;
        }

        .input-neon {
            background: #000; border: 1px solid #00f2ff;
            color: #00f2ff; padding: 15px; width: 100%;
            outline: none; transition: 0.3s;
        }

        .input-neon:focus { box-shadow: 0 0 15px #00f2ff; }
    </style>
</head>
<body>

    <div id="hero" class="hero-pc">
        <div class="text-center z-10">
            <p class="text-cyan-400 font-bold tracking-[15px] mb-4">SYSTEM ONLINE: TERMINAL 01</p>
            <h1 class="neon-title">TOP 100+ PC<br>OFFLINE GAMES</h1>
            <p class="text-white/60 text-2xl font-bold mt-4 tracking-widest uppercase">High Performance • 4K Ultra Graphics</p>
            
            <button onclick="openAuth()" class="btn-neon-play">MULAI BERMAIN</button>
        </div>
    </div>

    <div id="authModal" class="modal-neon">
        <div class="neon-card text-center">
            <div id="loginForm">
                <h3 class="text-3xl font-black text-cyan-400 mb-8 tracking-tighter">USER AUTHENTICATION</h3>
                <div class="space-y-6">
                    <input type="text" id="lUser" placeholder="IDENTITAS USER" class="input-neon">
                    <input type="password" id="lPass" placeholder="KODE AKSES" class="input-cyber input-neon">
                </div>
                <button onclick="doLogin()" class="w-full mt-8 bg-cyan-500 p-4 font-black text-black hover:bg-white transition">LOGIN KE SISTEM</button>
                <p class="mt-8 text-xs text-gray-500 uppercase">Akses Ditolak? <span onclick="toggleTab()" class="text-purple-500 cursor-pointer font-bold">Daftar Akun Baru</span></p>
            </div>

            <div id="regForm" class="hidden">
                <h3 class="text-3xl font-black text-purple-500 mb-8 tracking-tighter">CREATE NEW ACCOUNT</h3>
                <div class="space-y-6">
                    <input type="text" id="rUser" placeholder="USERNAME BARU" class="input-neon">
                    <input type="password" id="rPass" placeholder="PASSWORD BARU" class="input-neon">
                </div>
                <button onclick="doRegister()" class="w-full mt-8 bg-purple-600 p-4 font-black text-white hover:bg-white hover:text-black transition">DAFTARKAN IDENTITAS</button>
                <p class="mt-8 text-xs text-gray-500 uppercase">Sudah Terdaftar? <span onclick="toggleTab()" class="text-cyan-400 cursor-pointer font-bold">Kembali ke Login</span></p>
            </div>
            <button onclick="closeAuth()" class="mt-6 text-gray-700 text-[10px] hover:text-red-500 tracking-widest">CANCEL_SESSION</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById("authModal");
        function openAuth() { modal.style.display = "flex"; }
        function closeAuth() { modal.style.display = "none"; }
        function toggleTab() {
            document.getElementById("loginForm").classList.toggle("hidden");
            document.getElementById("regForm").classList.toggle("hidden");
        }

        // --- AUTH LOGIC ---
        function doRegister() {
            const u = document.getElementById("rUser").value;
            const p = document.getElementById("rPass").value;
            if(!u || !p) return alert("System Error: Data tidak lengkap!");
            let users = JSON.parse(localStorage.getItem("users") || "[]");
            users.push({user: u, pass: p});
            localStorage.setItem("users", JSON.stringify(users));
            alert("Sistem: Registrasi Berhasil!");
            toggleTab();
        }

        function doLogin() {
            const u = document.getElementById("lUser").value;
            const p = document.getElementById("lPass").value;
            const users = JSON.parse(localStorage.getItem("users") || "[]");
            const found = users.find(x => x.user === u && x.pass === p);
            
            if(found) {
                localStorage.setItem("loginUser", u);
                window.location.href = "loading.html?game=menu";
            } else {
                alert("Sistem: Akses Ditolak! Kredensial Salah.");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - THE ULTIMATE NEON ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* ANIMATED BACKGROUND GRID */
        .bg-wall {
            position: absolute; inset: -50px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; transform: rotate(-5deg) scale(1.1);
            filter: blur(2px) brightness(0.3); opacity: 0.6; z-index: 1;
            animation: moveBg 60s linear infinite;
        }

        @keyframes moveBg {
            from { transform: rotate(-5deg) translateY(0); }
            to { transform: rotate(-5deg) translateY(-500px); }
        }

        .game-placeholder {
            width: 100%; height: 100px; border-radius: 12px;
            background: linear-gradient(45deg, #0f172a, #1e293b);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
        }

        /* OVERLAY GRADIENT */
        .overlay {
            position: fixed; inset: 0; z-index: 5;
            background: radial-gradient(circle at center, transparent 0%, #020617 80%);
        }

        /* AUTH CARD */
        .auth-card {
            position: relative; z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15), inset 0 0 20px rgba(188, 19, 254, 0.1);
            width: 90%; max-width: 420px;
            padding: 50px 40px; border-radius: 40px;
            text-align: center;
        }

        /* NEON INPUTS */
        .cyber-input {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #00f2ff !important;
            font-family: 'Orbitron', sans-serif; font-size: 13px;
            transition: 0.3s;
        }
        .cyber-input:focus {
            border-color: #bc13fe !important;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            outline: none;
        }

        .btn-main {
            background: linear-gradient(90deg, #00f2ff, #bc13fe);
            color: white; font-weight: 900; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transition: 0.3s;
        }
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px #00f2ff;
        }

        .neon-title {
            font-size: 3.5rem; line-height: 1;
            background: linear-gradient(to bottom, #fff 30%, #00f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="bgWall" class="bg-wall">
        </div>

    <div class="overlay"></div>

    <div class="auth-card">
        <div class="mb-10">
            <h1 class="neon-title orbitron font-black italic tracking-tighter mb-2">YOKBISAYOK</h1>
            <div class="h-1 w-20 bg-cyan-500 mx-auto rounded-full mb-4"></div>
            <p class="text-[10px] tracking-[5px] text-gray-400 font-bold uppercase">System Terminal Alpha-7</p>
        </div>

        <div id="loginBox" class="space-y-5">
            <div class="relative">
                <i class="fas fa-user absolute left-4 top-4 text-gray-600 text-xs"></i>
                <input type="text" id="lUser" placeholder="IDENTITAS USER" class="cyber-input w-full p-4 pl-10 rounded-2xl">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-gray-600 text-xs"></i>
                <input type="password" id="lPass" placeholder="KODE AKSES" class="cyber-input w-full p-4 pl-10 rounded-2xl">
            </div>
            <button onclick="doLogin()" class="btn-main w-full p-4 rounded-2xl orbitron text-xs mt-4">INITIALIZE ACCESS</button>
            <p class="text-xs text-gray-500 mt-6">Belum Terdaftar? <span onclick="toggle()" class="text-cyan-400 cursor-pointer font-bold hover:underline">Register Akun</span></p>
        </div>

        <div id="regBox" class="hidden space-y-5">
            <input type="text" id="rUser" placeholder="CREATE USERNAME" class="cyber-input w-full p-4 rounded-2xl">
            <input type="password" id="rPass" placeholder="CREATE PASSWORD" class="cyber-input w-full p-4 rounded-2xl">
            <button onclick="doRegister()" class="btn-main w-full p-4 rounded-2xl orbitron text-xs">JOIN REVOLUTION</button>
            <p class="text-xs text-gray-500 mt-6">Sudah Terdaftar? <span onclick="toggle()" class="text-purple-400 cursor-pointer font-bold hover:underline">Login Terminal</span></p>
        </div>
    </div>

    <script>
        // ISI BACKGROUND DENGAN IKON GAME SECARA RANDOM
        const bgWall = document.getElementById("bgWall");
        const icons = ['gamepad', 'ghost', 'rocket', 'bolt', 'bomb', 'brain', 'car', 'chess', 'dice', 'dragon', 'flask', 'headset', 'microchip', 'moped', 'puzzle-piece', 'robot', 'shield-alt', 'space-shuttle', 'trophy', 'user-ninja'];
        
        for (let i = 0; i < 100; i++) {
            const icon = icons[Math.floor(Math.random() * icons.length)];
            bgWall.innerHTML += `
                <div class="game-placeholder">
                    <i class="fas fa-${icon} text-slate-700 text-2xl"></i>
                </div>
            `;
        }

        // LOGIKA AUTH
        function toggle() {
            document.getElementById("loginBox").classList.toggle("hidden");
            document.getElementById("regBox").classList.toggle("hidden");
        }

        function doRegister() {
            const u = document.getElementById("rUser").value;
            const p = document.getElementById("rPass").value;
            if(!u || !p) return alert("Mohon lengkapi data!");
            let users = JSON.parse(localStorage.getItem("users") || "[]");
            users.push({user: u, pass: p});
            localStorage.setItem("users", JSON.stringify(users));
            alert("Registrasi Berhasil!");
            toggle();
        }

        function doLogin() {
            const u = document.getElementById("lUser").value;
            const p = document.getElementById("lPass").value;
            const users = JSON.parse(localStorage.getItem("users") || "[]");
            const found = users.find(x => x.user === u && x.pass === p);
            
            if(found) {
                localStorage.setItem("loginUser", u);
                window.location.href = "loading.html?game=menu";
            } else {
                alert("Identitas atau Kode Akses Salah!");
            }
        }
    </script>
</body>
</html>

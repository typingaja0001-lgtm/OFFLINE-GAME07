<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - NEON ARCADE HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* EFFECT NEON */
        .neon-purple { border: 1px solid #bc13fe; box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
        .neon-cyan { border: 1px solid #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .text-neon { text-shadow: 0 0 10px #00f2ff; color: #00f2ff; }
        
        /* FORM LOGIN */
        .glass-box { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-radius: 20px; }
        input { background: rgba(0,0,0,0.5) !important; border: 1px solid #334155 !important; color: white !important; }
        input:focus { border-color: #00f2ff !important; box-shadow: 0 0 10px #00f2ff; outline: none; }

        /* GAME CARD */
        .game-card {
            background: #0f172a; border-radius: 20px; overflow: hidden; transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer;
        }
        .game-card:hover { transform: translateY(-10px); border-color: #bc13fe; box-shadow: 0 0 25px #bc13fe; }
        .game-icon { font-size: 50px; height: 120px; display: flex; align-items: center; justify-content: center; background: #020617; }
    </style>
</head>
<body class="min-h-screen">

    <div id="authSection" class="flex flex-col items-center justify-center min-h-screen p-6">
        <h1 class="text-5xl font-black orbitron italic text-neon mb-10 tracking-tighter">YOKBISAYOK</h1>
        
        <div class="glass-box p-8 w-full max-w-md neon-purple">
            <div id="loginForm">
                <h2 class="text-xl font-bold orbitron mb-6 text-center">PLAYER LOGIN</h2>
                <input type="text" id="loginUser" placeholder="Username" class="w-full p-3 rounded-lg mb-4">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-3 rounded-lg mb-6">
                <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 p-3 rounded-lg font-bold orbitron hover:brightness-125 transition">MASUK GAME</button>
                <p class="text-center mt-4 text-sm text-gray-400">Belum punya akun? <span onclick="toggleAuth()" class="text-cyan-400 cursor-pointer hover:underline">Daftar Sini</span></p>
            </div>

            <div id="registerForm" class="hidden">
                <h2 class="text-xl font-bold orbitron mb-6 text-center text-cyan-400">DAFTAR BARU</h2>
                <input type="text" id="regUser" placeholder="Username Baru" class="w-full p-3 rounded-lg mb-4">
                <input type="password" id="regPass" placeholder="Password Baru" class="w-full p-3 rounded-lg mb-6">
                <button onclick="handleRegister()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 p-3 rounded-lg font-bold orbitron hover:brightness-125 transition">BUAT AKUN</button>
                <p class="text-center mt-4 text-sm text-gray-400">Sudah ada akun? <span onclick="toggleAuth()" class="text-purple-400 cursor-pointer hover:underline">Login Sini</span></p>
            </div>
        </div>
    </div>

    <div id="lobbySection" class="hidden">
        <header class="p-6 flex justify-between items-center border-b border-white/10 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
            <h1 class="text-2xl font-black orbitron text-neon">YOKBISAYOK</h1>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="displayUser" class="font-bold orbitron text-purple-400">PLAYER</p>
                    <p class="text-[10px] text-cyan-400 font-bold">LVL 1 - NOVICE</p>
                </div>
                <button onclick="handleLogout()" class="bg-red-500/20 text-red-500 p-2 rounded-lg hover:bg-red-500 hover:text-white transition">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <main class="p-8 max-w-6xl mx-auto">
            <div class="mb-10 p-10 rounded-3xl neon-cyan bg-gradient-to-br from-slate-900 to-slate-950 flex flex-col items-center text-center">
                <h2 class="text-4xl font-black orbitron mb-2">NEON OFFLINE ARCADE</h2>
                <p class="text-gray-400 tracking-[4px]">PILIH GAME DAN CETAK SKOR TERTINGGI</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="game-card" onclick="location.href='snake.html'">
                    <div class="game-icon">🐍</div>
                    <div class="p-4 border-t border-white/5">
                        <p class="text-[10px] text-purple-400 font-bold orbitron">ARCADE</p>
                        <h3 class="font-bold text-lg">Neon Snake</h3>
                    </div>
                </div>

                <div class="game-card" onclick="alert('Game segera hadir!')">
                    <div class="game-icon">🃏</div>
                    <div class="p-4 border-t border-white/5">
                        <p class="text-[10px] text-purple-400 font-bold orbitron">PUZZLE</p>
                        <h3 class="font-bold text-lg">Memory Match</h3>
                    </div>
                </div>

                <div class="game-card" onclick="alert('Game segera hadir!')">
                    <div class="game-icon">🎾</div>
                    <div class="p-4 border-t border-white/5">
                        <p class="text-[10px] text-purple-400 font-bold orbitron">ACTION</p>
                        <h3 class="font-bold text-lg">Brick Neon</h3>
                    </div>
                </div>

                <div class="game-card" onclick="alert('Game segera hadir!')">
                    <div class="game-icon">❓</div>
                    <div class="p-4 border-t border-white/5">
                        <p class="text-[10px] text-purple-400 font-bold orbitron">LOGIC</p>
                        <h3 class="font-bold text-lg">Magic Number</h3>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const users = JSON.parse(localStorage.getItem("users") || "[]");
        const currentUser = localStorage.getItem("loginUser");

        // CEK STATUS LOGIN SAAT BUKA HALAMAN
        window.onload = () => {
            if (currentUser) {
                document.getElementById("authSection").classList.add("hidden");
                document.getElementById("lobbySection").classList.remove("hidden");
                document.getElementById("displayUser").innerText = currentUser.toUpperCase();
            }
        };

        function toggleAuth() {
            document.getElementById("loginForm").classList.toggle("hidden");
            document.getElementById("registerForm").classList.toggle("hidden");
        }

        function handleRegister() {
            const u = document.getElementById("regUser").value;
            const p = document.getElementById("regPass").value;
            if(!u || !p) return alert("Isi username & password!");
            if(users.find(x => x.user === u)) return alert("Username sudah terdaftar!");

            users.push({user: u, pass: p, xp: 0});
            localStorage.setItem("users", JSON.stringify(users));
            alert("Pendaftaran Berhasil! Silakan Login.");
            toggleAuth();
        }

        function handleLogin() {
            const u = document.getElementById("loginUser").value;
            const p = document.getElementById("loginPass").value;
            const found = users.find(x => x.user === u && x.pass === p);

            if(found) {
                localStorage.setItem("loginUser", u);
                location.reload();
            } else {
                alert("Username atau Password salah!");
            }
        }

        function handleLogout() {
            localStorage.removeItem("loginUser");
            location.reload();
        }
    </script>
</body>
</html>

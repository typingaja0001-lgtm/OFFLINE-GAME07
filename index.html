<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>YOKBISAYOK - OFFLINE ARCADE</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
body { background:#020617; color:white; margin:0; font-family:'Rajdhani', sans-serif; }
.orbitron { font-family: 'Orbitron', sans-serif; }

/* NAVBAR & NEON */
.header { background:rgba(0,0,0,0.8); border-bottom: 2px solid #bc13fe; box-shadow:0 0 15px #bc13fe; }
.sidebar { background:rgba(15, 23, 42, 0.5); border-right: 1px solid rgba(0, 242, 255, 0.2); min-height:100vh; }

/* KARTU GAME */
.game-card {
    background:#0f172a; border-radius:15px; overflow:hidden; transition:0.3s;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 10px rgba(188, 19, 254, 0.2);
}
.game-card:hover {
    transform:translateY(-5px); border-color:#00f2ff;
    box-shadow: 0 0 20px #00f2ff;
}

/* TOMBOL */
.btn-neon { background:linear-gradient(90deg, #bc13fe, #00f2ff); color:black; font-weight:bold; transition:0.3s; }
.btn-neon:hover { box-shadow:0 0 15px #00f2ff; transform:scale(1.05); }

/* LIST SKOR */
.score-item { background:rgba(0,0,0,0.4); padding:8px; border-left:3px solid #bc13fe; border-radius:4px; margin-bottom:5px; font-size:12px; }
</style>
</head>

<body>

<div class="header flex justify-between items-center p-4 sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <h1 class="text-2xl font-black orbitron italic text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-400">YOKBISAYOK</h1>
    </div>

    <div id="login-section" class="flex gap-2">
        <input id="u" type="text" placeholder="User" class="px-2 py-1 rounded bg-slate-900 border border-gray-700 text-xs w-24">
        <input id="p" type="password" placeholder="Pass" class="px-2 py-1 rounded bg-slate-900 border border-gray-700 text-xs w-24">
        <button onclick="login()" class="btn-neon px-4 py-1 rounded text-xs">MASUK</button>
    </div>
    
    <div id="user-section" class="hidden flex items-center gap-4">
        <div class="text-right">
            <p id="nav-user" class="text-xs font-bold text-purple-400 orbitron">PLAYER</p>
            <p id="nav-xp" class="text-[10px] text-cyan-400 font-bold">XP: 0</p>
        </div>
        <button onclick="logout()" class="text-red-500 text-xs font-bold hover:underline">KELUAR</button>
    </div>
</div>

<div class="flex">
    <div class="w-64 sidebar p-4 hidden md:block">
        <p class="text-[10px] text-gray-500 orbitron mb-4">NAVIGASI ARCADE</p>
        <div class="space-y-2">
            <div class="p-2 text-cyan-400 font-bold hover:bg-slate-800 rounded cursor-pointer"><i class="fas fa-gamepad mr-2"></i> Semua Game</div>
            <div class="p-2 text-gray-400 hover:text-white cursor-pointer"><i class="fas fa-trophy mr-2"></i> Papan Skor</div>
            <div class="p-2 text-gray-400 hover:text-white cursor-pointer"><i class="fas fa-user-friends mr-2"></i> Komunitas</div>
        </div>

        <div class="mt-10">
            <p class="text-[10px] text-purple-400 orbitron mb-3 italic">🏆 TOP LOCAL PLAYER</p>
            <div id="scoreBox" class="space-y-1"></div>
        </div>
    </div>

    <div class="flex-1 p-6">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            
            <div class="game-card" onclick="alert('Membuka Game Ular...')">
                <div class="h-32 bg-slate-950 flex items-center justify-center border-b border-purple-900/50">
                    <span class="text-6xl">🐍</span>
                </div>
                <div class="p-4">
                    <p class="text-[10px] text-purple-500 font-bold orbitron">CLASSIC</p>
                    <h3 class="font-bold">Neon Snake</h3>
                </div>
            </div>

            <div class="game-card" onclick="alert('Membuka Game Tebak Angka...')">
                <div class="h-32 bg-slate-950 flex items-center justify-center border-b border-purple-900/50">
                    <span class="text-6xl">❓</span>
                </div>
                <div class="p-4">
                    <p class="text-[10px] text-purple-500 font-bold orbitron">BRAIN</p>
                    <h3 class="font-bold">Magic Number</h3>
                </div>
            </div>

            <div class="game-card" onclick="alert('Membuka Game Memori...')">
                <div class="h-32 bg-slate-950 flex items-center justify-center border-b border-purple-900/50">
                    <span class="text-6xl">🃏</span>
                </div>
                <div class="p-4">
                    <p class="text-[10px] text-purple-500 font-bold orbitron">PUZZLE</p>
                    <h3 class="font-bold">Memory Match</h3>
                </div>
            </div>

            <div class="game-card" onclick="alert('Membuka Game Pantul Bola...')">
                <div class="h-32 bg-slate-950 flex items-center justify-center border-b border-purple-900/50">
                    <span class="text-6xl">🎾</span>
                </div>
                <div class="p-4">
                    <p class="text-[10px] text-purple-500 font-bold orbitron">ARCADE</p>
                    <h3 class="font-bold">Brick Neon</h3>
                </div>
            </div>

        </div>

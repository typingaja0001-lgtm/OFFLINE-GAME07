<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - THE ULTIMATE NEON ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* BACKGROUND GAME GRID (HIDUP & RAMAI) */
        .bg-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px;
            padding: 20px; filter: blur(3px) brightness(0.4); pointer-events: none;
            position: absolute; inset: 0; z-index: 1;
        }

        /* AUTH POPUP (GLASSMORPHISM MEWAH) */
        .auth-container {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, transparent 20%, #020617 90%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.9); border: 2px solid #bc13fe;
            box-shadow: 0 0 60px rgba(188, 19, 254, 0.4); width: 100%; max-width: 440px;
            padding: 50px; border-radius: 40px; position: relative;
            backdrop-filter: blur(15px);
        }

        /* INPUT STYLE */
        .input-cyber { background: #000 !important; border: 1px solid #334155 !important; color: #00f2ff !important; font-family: 'Orbitron', sans-serif; font-size: 14px; text-align: center; }
        .input-cyber:focus { border-color: #00f2ff !important; box-shadow: 0 0 15px #00f2ff; outline: none; }
        
        .btn-neon { background: linear-gradient(90deg, #00f2ff, #bc13fe); font-weight: 900; transition: 0.3s; box-shadow: 0 0 20px rgba(188, 19, 254, 0.5); }
        .btn-neon:hover { transform: translateY(-3px); box-shadow: 0 0 40px #00f2ff; }

        .game-thumb { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="gameBg" class="bg-grid"></div>

    <div class="auth-container">
        <div class="glass-card text-center">
            <h1 class="text-6xl font-black orbitron italic text-cyan-400 mb-2 italic tracking-tighter">YOKBISAYOK</h1>
            <p class="text-[10px] tracking-[6px] text-purple-400 font-bold uppercase mb-10">NEON ARCADE SYSTEM V3.0</p>

            <div id="loginForm" class="space-y-5">
                <input type="text" id="lUser" placeholder="ENTER USERNAME" class="input-cyber w-full p-4 rounded-2xl">
                <input type="password" id="lPass" placeholder="ENTER PASSWORD" class="input-cyber w-full p-4 rounded-2xl">
                <button onclick="doLogin()" class="btn-neon w-full p-4 rounded-2xl orbitron text-xs">ACCESS ARCADE</button>
                <p class="mt-8 text-xs text-gray-400">Belum ada akun? <span onclick="toggle()" class="text-purple-400 cursor-pointer font-bold hover:underline">Daftar Sekarang</span></p>
            </div>

            <div id="regForm" class="hidden space-y-5">
                <input type="text" id="rUser" placeholder="NEW USERNAME" class="input-cyber w-full p-4 rounded-2xl">
                <input type="password" id="rPass" placeholder="NEW PASSWORD" class="input-cyber w-full p-4 rounded-2xl">
                <button onclick="doRegister()" class="btn-neon w-full p-4 rounded-2xl orbitron text-xs text-black">CREATE ACCOUNT</button>
                <p class="mt-8 text-xs text-gray-400">Sudah jadi member? <span onclick="toggle()" class="text-cyan-400 cursor-pointer font-bold hover:underline">Masuk Sini</span></p>
            </div>
        </div>
    </div>

<script>
    // 1. GENERATE BACKGROUND GAME AGAR TERLIHAT RAMAI
    const bg = document.getElementById("gameBg");
    // Gunakan kata kunci game untuk gambar yang relevan
    const keywords = ['racing', 'gaming', 'retro', 'cyberpunk', 'snake', 'shooter', 'galaxy', 'neon', 'joystick', 'console'];
    
    for(let i=0; i<30; i++) {
        const key = keywords[Math.floor(Math.random() * keywords.length)];
        bg.innerHTML += `<img src="https://source.unsplash.com/400x300/?${key},arcade&sig=${i}" class="game-thumb">`;
    }

    // 2. LOGIKA AUTH
    function toggle() {
        document.getElementById("loginForm").classList.toggle("hidden");
        document.getElementById("regForm").classList.toggle("hidden");
    }

    function doRegister() {
        const u = document.getElementById("rUser").value;
        const p = document.getElementById("rPass").value;
        if(!u || !p) return alert("Mohon isi semua data!");
        let users = JSON.parse(localStorage.getItem("users") || "[]");
        users.push({user: u, pass: p});
        localStorage.setItem("users", JSON.stringify(users));
        alert("Pendaftaran Berhasil! Silakan Login.");
        toggle();
    }

    function doLogin() {
        const u = document.getElementById("lUser").value;
        const p = document.getElementById("lPass").value;
        const users = JSON.parse(localStorage.getItem("users") || "[]");
        const found = users.find(x => x.user === u && x.pass === p);
        
        if(found) {
            localStorage.setItem("loginUser", u);
            // Redirect ke loading buatan Bosku
            window.location.href = "loading.html?game=menu";
        } else {
            alert("Akses Ditolak! Cek Username/Password.");
        }
    }
</script>
</body>
</html>

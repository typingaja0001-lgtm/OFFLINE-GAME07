<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - 100+ NEON ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .text-neon { text-shadow: 0 0 10px #00f2ff; color: #00f2ff; }
        
        /* CARD STYLE: Lebih Kecil & Padat */
        .game-card {
            background: #0f172a; border-radius: 15px; overflow: hidden; transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer;
            position: relative; height: 180px;
        }
        .game-card:hover { transform: scale(1.05); border-color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); z-index: 10; }
        .game-icon { font-size: 40px; height: 100px; display: flex; align-items: center; justify-content: center; background: #020617; }
        .badge-hot { position: absolute; top: 8px; left: 8px; background: red; color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div id="lobbySection">
    <header class="p-4 flex justify-between items-center border-b border-white/10 sticky top-0 bg-slate-950/90 backdrop-blur-md z-50">
        <h1 class="text-xl font-black orbitron text-neon italic">YOKBISAYOK</h1>
        <div class="flex gap-4 items-center">
            <span class="text-xs orbitron text-gray-400">STATUS: <span class="text-green-400">ONLINE</span></span>
            <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center font-bold">M</div>
        </div>
    </header>

    <main class="p-4 max-w-7xl mx-auto">
        <div class="mb-8 p-8 rounded-3xl border border-cyan-500/30 bg-gradient-to-r from-blue-900/20 to-transparent">
            <h2 class="text-3xl font-black orbitron">OFFLINE MEGA STORE</h2>
            <p class="text-cyan-400 text-sm tracking-[3px]">COLLECTION: 100+ GAMES AVAILABLE</p>
        </div>

        <div class="flex gap-3 mb-8 overflow-x-auto pb-2">
            <button class="bg-cyan-500 text-black px-4 py-1 rounded-full text-xs font-bold orbitron">ALL</button>
            <button class="bg-slate-800 px-4 py-1 rounded-full text-xs font-bold orbitron">ACTION</button>
            <button class="bg-slate-800 px-4 py-1 rounded-full text-xs font-bold orbitron">RACING</button>
            <button class="bg-slate-800 px-4 py-1 rounded-full text-xs font-bold orbitron">PUZZLE</button>
            <button class="bg-slate-800 px-4 py-1 rounded-full text-xs font-bold orbitron">SPORT</button>
        </div>

        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </main>
</div>

<script>
    // DATA GAME (Bisa ditambah sampai ratusan)
    const gameList = [
        { name: "Neon Snake", icon: "🐍", cat: "ARCADE", link: "snake.html", hot: true },
        { name: "Cyber Moto", icon: "🏍️", cat: "RACING", link: "#" },
        { name: "Brick Break", icon: "🧱", cat: "ACTION", link: "#" },
        { name: "Space Invader", icon: "🚀", cat: "SHOOTER", link: "#" },
        { name: "Memory Pro", icon: "🧠", cat: "BRAIN", link: "#" },
        { name: "Tetris Neo", icon: "🕹️", cat: "PUZZLE", link: "#" },
        { name: "Boxing Glow", icon: "🥊", cat: "FIGHT", link: "#" },
        { name: "Penalty Kick", icon: "⚽", cat: "SPORT", link: "#" },
        { name: "Dino Run", icon: "🦖", cat: "ARCADE", link: "#" },
        { name: "Neon Tank", icon: "🛡️", cat: "WAR", link: "#" },
        { name: "Sudoku Lite", icon: "🧩", cat: "MATH", link: "#" },
        { name: "Fast Drift", icon: "🏎️", cat: "RACING", link: "#" },
        { name: "Ping Pong", icon: "🏓", cat: "SPORT", link: "#" },
        { name: "Tic Tac Toe", icon: "❌", cat: "LOGIC", link: "#" },
        { name: "Gold Miner", icon: "⛏️", cat: "CASUAL", link: "#" },
        { name: "Cyber Archer", icon: "🏹", cat: "ACTION", link: "#" },
        { name: "Jewel Match", icon: "💎", cat: "PUZZLE", link: "#" },
        { name: "Neon Jump", icon: "🦘", cat: "ARCADE", link: "#" },
        { name: "Pool 8 Ball", icon: "🎱", cat: "SPORT", link: "#" },
        { name: "Piano Tiles", icon: "🎹", cat: "MUSIC", link: "#" },
        { name: "Angry Bird", icon: "🐦", cat: "ACTION", link: "#" },
        { name: "Solitaire", icon: "🃏", cat: "CARD", link: "#" },
        { name: "Ludo King", icon: "🎲", cat: "BOARD", link: "#" },
        { name: "Fruit Ninja", icon: "🍉", cat: "ACTION", link: "#" },
        { name: "Chess Pro", icon: "♟️", cat: "STRATEGY", link: "#" },
        { name: "Subway Neon", icon: "🏃", cat: "RUNNER", link: "#" },
        { name: "Bubble Pop", icon: "🫧", cat: "PUZZLE", link: "#" },
        { name: "Pinball Glow", icon: "🕹️", cat: "ARCADE", link: "#" },
        { name: "Air Hockey", icon: "🏒", cat: "SPORT", link: "#" },
        { name: "Doodle Jump", icon: "🖍️", cat: "CASUAL", link: "#" },
        { name: "Car Parking", icon: "🅿️", cat: "SIMULATOR", link: "#" },
        { name: "Tower Stack", icon: "🏢", cat: "LOGIC", link: "#" },
        { name: "Zombie Smasher", icon: "🧟", cat: "HORROR", link: "#" },
        { name: "Fishing Hook", icon: "🎣", cat: "CASUAL", link: "#" },
        { name: "Knife Hit", icon: "🔪", cat: "ACTION", link: "#" },
        { name: "Bowling Glow", icon: "🎳", cat: "SPORT", link: "#" }
    ];

    const grid = document.getElementById("gameGrid");

    gameList.forEach(game => {
        const card = document.createElement("div");
        card.className = "game-card";
        card.onclick = () => {
            if(game.link !== "#") window.location.href = game.link;
            else alert(game.name + " segera hadir di update berikutnya!");
        };

        card.innerHTML = `
            ${game.hot ? '<span class="badge-hot orbitron">HOT GAME</span>' : ''}
            <div class="game-icon">${game.icon}</div>
            <div class="p-3 border-t border-white/5 bg-slate-900/50">
                <p class="text-[8px] text-cyan-400 font-bold orbitron mb-0.5">${game.cat}</p>
                <h4 class="font-bold text-xs truncate uppercase">${game.name}</h4>
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>

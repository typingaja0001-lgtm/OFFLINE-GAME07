<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - SPACE INVADERS NEON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        
        body { 
            background: #050112; color: white; font-family: 'Rajdhani', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        #game-container { 
            position: relative; border: 4px solid #00f2ff; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3); 
            background: #000; border-radius: 15px; overflow: hidden;
        }

        canvas { display: block; }

        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .neon-pink { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }

        /* MODAL GAME OVER */
        #gameOverModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 100; 
            align-items: center; justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: #0d0221; border: 3px solid #ff00ff; padding: 40px; 
            border-radius: 20px; text-align: center; box-shadow: 0 0 60px #ff00ff; width: 340px; 
        }

        /* PANDUAN STYLE */
        .how-to-play { 
            margin-top: 25px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(0, 242, 255, 0.3); padding: 20px; 
            border-radius: 15px; width: 440px; 
        }
        .key-badge { 
            background: #1a1a1a; border: 1px solid #00f2ff; color: #00f2ff; 
            padding: 2px 10px; border-radius: 6px; font-size: 11px; font-family: 'Orbitron'; 
        }
    </style>
</head>
<body>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="orbitron text-4xl neon-pink mb-2 italic">INVADED</h2>
            <p class="text-[10px] text-gray-400 uppercase orbitron mb-6 tracking-widest">Base Destroyed</p>
            <div class="mb-10">
                <p class="text-gray-500 text-[10px] uppercase orbitron">Final Score</p>
                <p id="finalScoreDisplay" class="text-6xl neon-cyan orbitron">0</p>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black orbitron hover:bg-cyan-400 transition uppercase italic text-lg">REDEPLOY</button>
                <button onclick="saveAndExit()" class="w-full border border-gray-600 text-gray-500 py-3 rounded-xl hover:text-white hover:border-white transition uppercase text-[10px] orbitron">MENU UTAMA</button>
            </div>
        </div>
    </div>

    <div class="mb-6 text-center">
        <p class="text-[10px] text-gray-500 uppercase orbitron tracking-[0.3em]">System Score</p>
        <p id="pScore" class="text-5xl neon-cyan orbitron">0</p>
    </div>

    <div id="game-container">
        <canvas id="invaders" width="480" height="400"></canvas>
    </div>

    <div class="how-to-play">
        <h3 class="orbitron text-[10px] neon-pink mb-4 italic uppercase tracking-widest text-center">
            📡 DEFENSE PROTOCOL: ACTIVATED 📡
        </h3>
        <div class="grid grid-cols-2 gap-4 text-[13px] text-gray-300">
            <div class="space-y-2">
                <p class="flex justify-between"><span>Gerak:</span> <span class="key-badge">← →</span></p>
                <p class="flex justify-between"><span>Tembak:</span> <span class="key-badge">SPASI</span></p>
            </div>
            <div class="space-y-2 border-l border-white/10 pl-4">
                <p class="flex justify-between"><span>Target:</span> <span class="neon-pink">+20 pts</span></p>
                <p class="flex justify-between text-red-500 italic font-bold"><span>Status:</span> <span>1-HIT KILL</span></p>
            </div>
        </div>
        <p class="mt-4 pt-4 border-t border-white/5 text-[9px] text-center text-gray-500 uppercase">
            ⚠️ PERINGATAN: Alien akan bergerak lebih CEPAT saat jumlahnya berkurang!
        </p>
    </div>

    <script>
        const canvas = document.getElementById('invaders');
        const ctx = canvas.getContext('2d');
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const player = (localStorage.getItem('loginUser') || "USER").toUpperCase();

        let score = 0;
        let gameActive = true;
        let keys = {};

        const ship = { x: 225, y: 360, w: 30, h: 20, speed: 5 };
        let bullets = [];
        let enemyBullets = [];
        let aliens = [];
        let alienDir = 1;
        let alienMoveTimer = 0;

        function initAliens() {
            aliens = [];
            for(let r=0; r<5; r++) {
                for(let c=0; c<10; c++) {
                    aliens.push({ x: 50 + c*40, y: 30 + r*30, w: 25, h: 20 });
                }
            }
        }

        window.addEventListener('keydown', e => { 
            keys[e.code] = true; 
            if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); 
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if(!gameActive) return;

            if(keys['ArrowLeft'] && ship.x > 0) ship.x -= ship.speed;
            if(keys['ArrowRight'] && ship.x < canvas.width - ship.w) ship.x += ship.speed;
            
            if(keys['Space'] && bullets.length < 1) {
                bullets.push({ x: ship.x + ship.w/2 - 1.5, y: ship.y, w: 3, h: 10 });
            }

            alienMoveTimer++;
            // Kecepatan alien menyesuaikan sisa jumlah alien
            let speedThreshold = Math.max(5, 40 - (score/100));
            if(alienMoveTimer > speedThreshold) {
                let hitWall = false;
                aliens.forEach(a => {
                    a.x += 10 * alienDir;
                    if(a.x > canvas.width - a.w || a.x < 0) hitWall = true;
                });

                if(hitWall) {
                    alienDir *= -1;
                    aliens.forEach(a => {
                        a.y += 15;
                        if(a.y + a.h > ship.y) gameActive = false;
                    });
                }
                alienMoveTimer = 0;
                
                if(aliens.length > 0 && Math.random() < 0.2) {
                    const shooter = aliens[Math.floor(Math.random() * aliens.length)];
                    enemyBullets.push({ x: shooter.x + shooter.w/2, y: shooter.y + shooter.h, w: 3, h: 10 });
                }
            }

            bullets.forEach((b, bi) => {
                b.y -= 7;
                aliens.forEach((en, ei) => {
                    if(b.x < en.x + en.w && b.x + b.w > en.x && b.y < en.y + en.h && b.y + b.h > en.y) {
                        aliens.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 20;
                        document.getElementById('pScore').innerText = score;
                        if(aliens.length === 0) initAliens();
                    }
                });
                if(b.y < 0) bullets.splice(bi, 1);
            });

            enemyBullets.forEach((eb, ebi) => {
                eb.y += 4;
                if(eb.x < ship.x + ship.w && eb.x + eb.w > ship.x && eb.y < ship.y + ship.h && eb.y + eb.h > ship.y) {
                    gameActive = false;
                }
                if(eb.y > canvas.height) enemyBullets.splice(ebi, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#050112';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ship (Cyan Neon)
            ctx.fillStyle = '#00f2ff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
            ctx.fillRect(ship.x, ship.y, ship.w, ship.h);
            ctx.fillRect(ship.x + 10, ship.y - 5, 10, 5);

            // Aliens (Pink Neon)
            ctx.fillStyle = '#ff00ff';
            ctx.shadowColor = '#ff00ff';
            aliens.forEach(a => {
                ctx.fillRect(a.x, a.y, a.w, a.h);
                ctx.clearRect(a.x+5, a.y+5, 4, 4); 
                ctx.clearRect(a.x+16, a.y+5, 4, 4);
            });

            // Bullets (Yellow & Red)
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
            
            ctx.fillStyle = '#ff0000';
            ctx.shadowColor = '#ff0000';
            enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, eb.w, eb.h));
            
            ctx.shadowBlur = 0;
        }

        async function saveAndExit() {
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                let userKey = Object.keys(data).find(k => data[k].name.toUpperCase() === player);
                if(userKey) {
                    await fetch(`https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ score: data[userKey].score + score })
                    });
                }
            } catch (e) {}
            window.location.href = 'menu.html';
        }

        function gameLoop() {
            if(!gameActive) {
                document.getElementById('finalScoreDisplay').innerText = score;
                document.getElementById('gameOverModal').style.display = 'flex';
                return;
            }
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initAliens();
        gameLoop();
    </script>
</body>
</html>

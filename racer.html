<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - NEON RACER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; border: 4px solid #00f2ff; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); background: #111; border-radius: 15px; overflow: hidden; }
        canvas { display: block; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        #gameOverModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0d0221; border: 3px solid #00f2ff; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 0 60px #00f2ff; width: 340px; }
        .how-to-play { margin-top: 25px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.3); padding: 15px; border-radius: 15px; width: 360px; }
        .key-badge { background: #1a1a1a; border: 1px solid #00f2ff; color: #00f2ff; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="orbitron text-4xl neon-cyan mb-2 italic">TOTALED</h2>
            <p class="text-[10px] text-gray-400 uppercase orbitron mb-6 tracking-widest">Insurance Voided</p>
            <div class="mb-10">
                <p class="text-gray-500 text-[10px] uppercase orbitron">Distance Covered</p>
                <p id="finalScoreDisplay" class="text-6xl neon-cyan orbitron">0</p>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black orbitron hover:bg-cyan-400 transition uppercase italic text-lg">RE-DRIVE</button>
                <button onclick="saveAndExit()" class="w-full border border-gray-600 text-gray-500 py-3 rounded-xl hover:text-white hover:border-white transition uppercase text-[10px] orbitron">BACK TO GARAGE</button>
            </div>
        </div>
    </div>

    <div class="mb-4 text-center">
        <p class="text-[10px] text-gray-500 uppercase orbitron tracking-[0.3em]">Racing Score</p>
        <p id="pScore" class="text-5xl neon-cyan orbitron">0</p>
    </div>

    <div id="game-container">
        <canvas id="raceCanvas" width="360" height="500"></canvas>
    </div>

    <div class="how-to-play">
        <h3 class="orbitron text-[10px] text-cyan-400 mb-3 italic uppercase tracking-widest text-center">🏎️ HIGHWAY PROTOCOL 🏎️</h3>
        <div class="grid grid-cols-2 gap-4 text-[13px] text-gray-300">
            <div class="space-y-1">
                <p class="flex justify-between"><span>Steer:</span> <span class="key-badge">← →</span></p>
            </div>
            <div class="space-y-1 border-l border-white/10 pl-4">
                <p class="flex justify-between text-pink-500 font-bold"><span>Goal:</span> <span>Avoid Crashes</span></p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const player = (localStorage.getItem('loginUser') || "USER").toUpperCase();

        let score = 0;
        let gameActive = true;
        let speed = 5;
        let lineOffset = 0;

        const car = { x: 155, y: 400, w: 50, h: 80 };
        let enemies = [];
        let keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function spawnEnemy() {
            const lanes = [40, 130, 220, 310];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            enemies.push({ x: lane - 25, y: -100, w: 50, h: 80, color: '#ff00ff' });
        }

        function update() {
            if(!gameActive) return;

            // Gerakan Jalanan
            lineOffset += speed;
            if(lineOffset > 40) lineOffset = 0;

            // Kontrol Mobil
            if(keys['ArrowLeft'] && car.x > 10) car.x -= 7;
            if(keys['ArrowRight'] && car.x < canvas.width - car.w - 10) car.x += 7;

            // Musuh
            if(Math.random() < 0.02) spawnEnemy();

            enemies.forEach((en, i) => {
                en.y += speed;
                
                // Cek Tabrakan
                if(car.x < en.x + en.w && car.x + car.w > en.x && car.y < en.y + en.h && car.y + car.h > en.y) {
                    gameActive = false;
                }

                if(en.y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 100;
                    document.getElementById('pScore').innerText = score;
                    speed += 0.05; // Makin lama makin cepat
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Garis Jalan (Neon Cyan)
            ctx.strokeStyle = '#00f2ff';
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -lineOffset;
            ctx.lineWidth = 2;
            [90, 180, 270].forEach(x => {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            });

            // Mobil Kita (Cyan Neon)
            ctx.fillStyle = '#00f2ff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
            ctx.fillRect(car.x, car.y, car.w, car.h);
            
            // Lampu Depan Mobil
            ctx.fillStyle = '#fff';
            ctx.fillRect(car.x + 5, car.y + 5, 10, 5);
            ctx.fillRect(car.x + 35, car.y + 5, 10, 5);

            // Mobil Musuh (Pink Neon)
            ctx.shadowColor = '#ff00ff';
            enemies.forEach(en => {
                ctx.fillStyle = en.color;
                ctx.fillRect(en.x, en.y, en.w, en.h);
            });

            ctx.shadowBlur = 0;
            ctx.setLineDash([]);
        }

        async function saveAndExit() {
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                let userKey = Object.keys(data).find(k => data[k].name.toUpperCase() === player);
                if(userKey) {
                    await fetch(`https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ score: data[userKey].score + score })
                    });
                }
            } catch (e) {}
            window.location.href = 'menu.html';
        }

        function loop() {
            update();
            draw();
            if(gameActive) requestAnimationFrame(loop);
            else {
                document.getElementById('finalScoreDisplay').innerText = score;
                document.getElementById('gameOverModal').style.display = 'flex';
            }
        }

        loop();
    </script>
</body>
</html>

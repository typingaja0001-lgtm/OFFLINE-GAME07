<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - NEON RACER NITRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f2ff;
            --pink: #ff0055;
            --purple: #bc13fe;
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
            height: 100vh;
        }

        /* SCREEN SHAKE EFFECT */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }

        /* 3D ARENA */
        #container {
            width: 100%; height: 100vh; position: relative;
            background: radial-gradient(circle at 50% 50%, #1a0033 0%, #000 100%);
            perspective: 600px;
        }

        #road {
            position: absolute; bottom: -50px; left: 50%;
            width: 3000px; height: 120%; background: #050505;
            transform: translateX(-50%) rotateX(75deg);
            border-left: 15px solid var(--cyan);
            border-right: 15px solid var(--cyan);
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.3);
            background-image: linear-gradient(rgba(0, 242, 255, 0.1) 2px, transparent 2px);
            background-size: 100% 60px;
            animation: roadMove 0.3s linear infinite;
        }

        @keyframes roadMove { from { background-position: 0 0; } to { background-position: 0 60px; } }

        /* PLAYER CAR (MODERN) */
        #car {
            position: absolute; bottom: 80px; left: 50%;
            width: 100px; height: 60px; transform: translateX(-50%);
            z-index: 50; transition: left 0.1s ease-out;
        }

        .car-body {
            background: #111; border: 2px solid var(--cyan);
            height: 100%; width: 100%; border-radius: 5px 5px 20px 20px;
            box-shadow: 0 10px 30px var(--cyan); position: relative;
        }

        .engine-fire {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 20px; background: var(--pink);
            filter: blur(10px); opacity: 0.8; animation: pulse 0.1s infinite;
        }

        /* OBSTACLE */
        .obs {
            position: absolute; width: 80px; height: 40px;
            background: var(--pink); border: 2px solid white;
            box-shadow: 0 0 30px var(--pink); border-radius: 4px;
            transform: translateX(-50%); z-index: 20;
        }

        /* HUD */
        .hud {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.8); border: 1px solid var(--cyan);
            padding: 20px; text-align: right;
        }

        .btn-back {
            position: fixed; top: 20px; left: 20px; z-index: 200;
            padding: 12px 25px; border: 2px solid var(--pink);
            color: var(--pink); text-decoration: none; font-weight: 900;
            background: rgba(255,0,85,0.1); transition: 0.3s;
        }
        .btn-back:hover { background: var(--pink); color: white; box-shadow: 0 0 30px var(--pink); }

        /* OVERLAY */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <a href="menu.html" class="btn-back">BACK TO HQ</a>

    <div id="container">
        <div id="road"></div>
        <div id="car">
            <div class="engine-fire"></div>
            <div class="car-body">
                <div class="absolute -top-2 left-2 w-4 h-2 bg-cyan-400"></div>
                <div class="absolute -top-2 right-2 w-4 h-2 bg-cyan-400"></div>
                <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-12 h-4 bg-pink-600 opacity-50 blur-sm"></div>
            </div>
        </div>

        <div class="hud">
            <p class="text-[10px] opacity-50 tracking-[5px]">SPEED_LEVEL</p>
            <h1 id="speedo" class="text-4xl font-black italic text-cyan-400">0</h1>
            <p class="text-[10px] opacity-50 tracking-[5px] mt-4">DIST_KM</p>
            <h1 id="score" class="text-2xl font-bold">0</h1>
        </div>
    </div>

    <div id="overlay">
        <h1 id="title" class="text-7xl font-black italic mb-4 text-white">NEON RACER</h1>
        <p class="text-cyan-400 tracking-[10px] mb-12 uppercase">Ultimate Speed Mission</p>
        
        <div class="bg-white/5 p-6 rounded-xl border border-white/10 mb-8 text-center w-80">
            <p class="text-xs text-gray-400 mb-2 font-mono uppercase">Control Scheme</p>
            <p class="text-sm">Gunakan <span class="text-cyan-400 font-bold">PANAH KIRI / KANAN</span> untuk menghindar. Jangan sampai tabrak rintangan <span class="text-pink-500 font-bold">PINK</span>!</p>
        </div>

        <button onclick="startGame()" class="px-16 py-5 bg-cyan-500 text-black font-black text-xl hover:bg-white transition shadow-[0_0_30px_rgba(0,242,255,0.5)]">BOOT ENGINES</button>
    </div>

    <script>
        const car = document.getElementById('car');
        const road = document.getElementById('road');
        const scoreTxt = document.getElementById('score');
        const speedo = document.getElementById('speedo');
        const overlay = document.getElementById('overlay');
        const container = document.getElementById('container');

        let active = false;
        let pos = 50;
        let score = 0;
        let speed = 200;
        let obstacles = [];

        // Controls
        window.addEventListener('keydown', (e) => {
            if(!active) return;
            if(e.key === 'ArrowLeft' && pos > 20) pos -= 10;
            if(e.key === 'ArrowRight' && pos < 80) pos += 10;
            car.style.left = pos + '%';
        });

        function spawnObs() {
            if(!active) return;
            const obs = document.createElement('div');
            obs.className = 'obs';
            const lane = [25, 50, 75][Math.floor(Math.random()*3)];
            obs.style.left = lane + '%';
            obs.style.top = '0px';
            container.appendChild(obs);

            let obsY = 0;
            let currentSpeed = 10 + (score / 100);

            const move = setInterval(() => {
                if(!active) { clearInterval(move); obs.remove(); return; }

                obsY += currentSpeed;
                obs.style.top = obsY + 'px';

                // Perspective Scale
                let scale = Math.max(0.1, obsY / 500);
                obs.style.transform = `translateX(-50%) scale(${scale})`;

                // Collision
                const r1 = car.getBoundingClientRect();
                const r2 = obs.getBoundingClientRect();

                if (r1.left < r2.right && r1.right > r2.left && r1.top < r2.bottom && r1.bottom > r2.top) {
                    gameOver();
                }

                if(obsY > window.innerHeight) {
                    clearInterval(move);
                    obs.remove();
                    score += 50;
                    scoreTxt.innerText = score;
                }
            }, 1000/60);

            setTimeout(spawnObs, Math.max(400, 1200 - (score/20)));
        }

        function startGame() {
            active = true;
            score = 0;
            pos = 50;
            car.style.left = '50%';
            overlay.style.display = 'none';
            scoreTxt.innerText = "0";
            
            // Road Animation Speed up
            road.style.animationDuration = '0.1s';
            
            spawnObs();
            updateSpeed();
        }

        function updateSpeed() {
            if(!active) return;
            speed = 200 + Math.floor(score/10);
            speedo.innerText = speed;
            setTimeout(updateSpeed, 100);
        }

        function gameOver() {
            active = false;
            container.classList.add('shake');
            setTimeout(() => {
                container.classList.remove('shake');
                overlay.style.display = 'flex';
                document.getElementById('title').innerText = "SYSTEM CRASH";
                document.getElementById('title').style.color = "var(--pink)";
            }, 500);
        }
    </script>
</body>
</html>

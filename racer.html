<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - NEON RACER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; border: 4px solid #00f2ff; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); background: #000; border-radius: 15px; overflow: hidden; }
        canvas { display: block; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        #gameOverModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0d0221; border: 3px solid #00f2ff; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 0 60px #00f2ff; width: 340px; }
        .how-to-play { margin-top: 20px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.3); padding: 15px; border-radius: 15px; width: 360px; text-align: center; }
    </style>
</head>
<body>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="orbitron text-4xl neon-cyan mb-2 italic">CRASHED</h2>
            <p id="lvlMsg" class="text-[10px] text-yellow-400 uppercase orbitron mb-6 tracking-widest italic">LEVEL 1 REACHED</p>
            <div class="mb-10">
                <p class="text-gray-500 text-[10px] uppercase orbitron">Final Score</p>
                <p id="finalScoreDisplay" class="text-6xl neon-cyan orbitron">0</p>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black orbitron hover:bg-cyan-400 transition uppercase italic text-lg">RE-DRIVE</button>
                <button onclick="saveAndExit()" class="w-full border border-gray-600 text-gray-500 py-3 rounded-xl hover:text-white hover:border-white transition uppercase text-[10px] orbitron">BACK TO GARAGE</button>
            </div>
        </div>
    </div>

    <div class="flex gap-8 mb-4 text-center">
        <div>
            <p class="text-[10px] text-gray-400 uppercase orbitron">Level</p>
            <p id="lvlDisplay" class="text-3xl text-yellow-400 orbitron">1</p>
        </div>
        <div>
            <p class="text-[10px] text-gray-400 uppercase orbitron">Score</p>
            <p id="pScore" class="text-3xl neon-cyan orbitron">0</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="raceCanvas" width="360" height="500"></canvas>
    </div>

    <div class="how-to-play">
        <p class="text-[11px] text-gray-400 uppercase font-bold tracking-[0.2em]">
            Gunakan <span class="text-cyan-400">PANAH KIRI & KANAN</span> untuk menghindar.
            <br><span class="text-pink-500">Mobil musuh lebih besar dan berbahaya!</span>
        </p>
    </div>

    <script>
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const player = (localStorage.getItem('loginUser') || "USER").toUpperCase();

        let score = 0;
        let gameActive = true;
        let level = 1;
        let speed = 6;
        let lineOffset = 0;

        // UKURAN MOBIL DISESUAIKAN (Player lebih kecil)
        const playerCar = { x: 165, y: 400, w: 35, h: 65 }; // Ramping
        const enemyW = 50; // Musuh lebih lebar
        const enemyH = 80; // Musuh lebih panjang
        
        let enemies = [];
        let keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function spawnEnemy() {
            const lanes = [40, 130, 220, 310];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            enemies.push({ x: lane - (enemyW/2), y: -100 });
        }

        function checkLevel() {
            let nextLvl = Math.floor(score / 1000) + 1;
            if (nextLvl > level) {
                level = nextLvl;
                speed += 1.5;
                document.getElementById('lvlDisplay').innerText = level;
            }
        }

        function update() {
            if(!gameActive) return;

            lineOffset += speed;
            if(lineOffset > 40) lineOffset = 0;

            if(keys['ArrowLeft'] && playerCar.x > 10) playerCar.x -= 7;
            if(keys['ArrowRight'] && playerCar.x < canvas.width - playerCar.w - 10) playerCar.x += 7;

            if(Math.random() < 0.02 + (level * 0.002)) spawnEnemy();

            enemies.forEach((en, i) => {
                en.y += speed;
                
                // Hitbox Collision
                if(playerCar.x < en.x + enemyW && playerCar.x + playerCar.w > en.x && playerCar.y < en.y + enemyH && playerCar.y + playerCar.h > en.y) {
                    gameActive = false;
                }

                if(en.y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 100;
                    document.getElementById('pScore').innerText = score;
                    checkLevel();
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Jalanan
            ctx.strokeStyle = '#00f2ff';
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -lineOffset;
            ctx.lineWidth = 2;
            [90, 180, 270].forEach(lx => {
                ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, canvas.height); ctx.stroke();
            });

            // Draw Player Car (Kecil & Ramping)
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
            ctx.fillStyle = '#00f2ff';
            ctx.fillRect(playerCar.x, playerCar.y, playerCar.w, playerCar.h);
            // Detail lampu player
            ctx.fillStyle = '#fff';
            ctx.fillRect(playerCar.x + 5, playerCar.y + 5, 6, 4);
            ctx.fillRect(playerCar.x + playerCar.w - 11, playerCar.y + 5, 6, 4);

            // Draw Enemies (Besar & Pink)
            ctx.shadowColor = '#ff00ff';
            enemies.forEach(en => {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(en.x, en.y, enemyW, enemyH);
                // Detail lampu musuh
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(en.x + 5, en.y + enemyH - 10, 10, 5);
                ctx.fillRect(en.x + enemyW - 15, en.y + enemyH - 10, 10, 5);
            });

            ctx.shadowBlur = 0; ctx.setLineDash([]);
        }

        async function saveAndExit() {
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                let userKey = Object.keys(data).find(k => data[k].name.toUpperCase() === player);
                if(userKey) {
                    await fetch(`https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ score: data[userKey].score + score })
                    });
                }
            } catch (e) {}
            window.location.href = 'menu.html';
        }

        function loop() {
            update();
            draw();
            if(gameActive) requestAnimationFrame(loop);
            else {
                document.getElementById('finalScoreDisplay').innerText = score;
                document.getElementById('lvlMsg').innerText = "LEVEL " + level + " REACHED";
                document.getElementById('gameOverModal').style.display = 'flex';
            }
        }

        loop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DRIFT - MOUSE CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #02010a; overflow: hidden; font-family: 'Orbitron', sans-serif; touch-action: none; color: white; cursor: crosshair; }
        canvas { display: block; margin: 0 auto; filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3)); }
        
        /* UI OVERLAY */
        .overlay { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
        .btn-abort { pointer-events: auto; border: 1px solid #ff0055; background: rgba(255,0,85,0.1); padding: 8px 15px; border-radius: 4px; color: #ff0055; font-size: 10px; backdrop-filter: blur(5px); text-decoration: none; }
        
        /* MODAL GAME OVER */
        #gameOverModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px);
            pointer-events: auto;
        }
        .modal-box {
            background: #050112; border: 2px solid #ff0055; padding: 40px; 
            border-radius: 20px; text-align: center; box-shadow: 0 0 50px #ff0055;
            width: 90%; max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="overlay p-6 flex justify-between items-start">
        <a href="menu.html" class="btn-abort uppercase tracking-widest font-black hover:bg-red-600 hover:text-white transition">
            <i class="fas fa-arrow-left mr-2"></i> BACK TO MENU
        </a>
        <div class="text-right">
            <p class="text-[9px] text-cyan-400 tracking-[4px]">SCORE</p>
            <h1 id="scoreDisplay" class="text-4xl font-black italic drop-shadow-[0_0_10px_#00f2ff]">0</h1>
        </div>
    </div>

    <canvas id="driftCanvas"></canvas>

    <div id="gameOverModal">
        <div class="modal-box">
            <h1 class="text-5xl font-black italic text-red-500 mb-2 uppercase tracking-tighter">WASTED</h1>
            <p class="text-gray-500 text-[10px] tracking-[5px] mb-8 italic">ENGINE FAILURE DETECTED</p>
            
            <div class="bg-white/5 p-4 rounded-lg mb-8 border-l-4 border-cyan-500 text-left">
                <p class="text-[8px] text-gray-500 uppercase tracking-widest">Recorded Score</p>
                <p id="finalScore" class="text-4xl font-black text-white">0</p>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <button onclick="restartGame()" class="w-full bg-white text-black py-4 font-black tracking-widest hover:bg-cyan-400 transition uppercase text-sm">
                    RETRY MISSION
                </button>
                <button onclick="window.location.href='menu.html'" class="w-full border border-red-600/50 text-red-500 py-3 font-bold hover:bg-red-600 hover:text-white transition text-[10px] tracking-widest">
                    RETURN TO MENU
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('driftCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const modal = document.getElementById('gameOverModal');

        function resize() {
            canvas.width = window.innerWidth > 600 ? 500 : window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize(); window.onresize = resize;

        let score = 0, speed = 8, gameActive = true, frame = 0;

        const player = {
            x: canvas.width / 2 - 22,
            y: canvas.height - 150,
            w: 44, h: 75,
            targetX: canvas.width / 2 - 22,
            color: '#00f2ff'
        };

        const enemies = [];
        const lines = [];
        for(let i=0; i<6; i++) lines.push({ y: i * (canvas.height/5) });

        // MOUSE & TOUCH ONLY
        const moveHandler = (clientX) => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            player.targetX = (clientX - rect.left) - player.w/2;
        };

        window.addEventListener('mousemove', (e) => moveHandler(e.clientX));
        window.addEventListener('touchmove', (e) => moveHandler(e.touches[0].clientX));

        function spawnEnemy() {
            const lane = Math.floor(Math.random() * 3);
            const laneWidth = canvas.width / 3;
            enemies.push({
                x: (lane * laneWidth) + (laneWidth/2) - 22,
                y: -100, w: 44, h: 75,
                color: '#ff0055', speedBoost: 0.5 + Math.random() * 0.3
            });
        }

        function restartGame() {
            score = 0; speed = 8; frame = 0; enemies.length = 0;
            gameActive = true; modal.style.display = 'none';
            player.x = canvas.width / 2 - 22; player.targetX = player.x;
            requestAnimationFrame(draw);
        }

        function update() {
            if(!gameActive) return;
            frame++;

            // Smooth Drift
            player.x += (player.targetX - player.x) * 0.12;
            player.x = Math.max(10, Math.min(canvas.width - player.w - 10, player.x));

            if(frame % 30 === 0) {
                score += 10;
                scoreDisplay.innerText = score;
                if(speed < 25) speed += 0.08;
            }

            lines.forEach(l => { l.y += speed; if(l.y > canvas.height) l.y = -100; });
            if(frame % Math.floor(100 / (speed/5)) === 0) spawnEnemy();

            enemies.forEach((en, i) => {
                en.y += speed * en.speedBoost;
                if(en.y > canvas.height) enemies.splice(i, 1);
                
                // Hitbox presisi
                if (player.x < en.x + en.w - 10 && player.x + player.w - 10 > en.x &&
                    player.y < en.y + en.h - 10 && player.y + player.h - 10 > en.y) {
                    gameActive = false;
                    document.getElementById('finalScore').innerText = score;
                    modal.style.display = 'flex';
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#02010a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Neon Road Lines
            ctx.strokeStyle = 'rgba(188, 19, 254, 0.2)'; ctx.lineWidth = 2;
            lines.forEach(l => {
                ctx.beginPath(); ctx.setLineDash([30, 15]);
                ctx.moveTo(canvas.width/3, l.y); ctx.lineTo(canvas.width/3, l.y + canvas.height);
                ctx.moveTo(canvas.width*2/3, l.y); ctx.lineTo(canvas.width*2/3, l.y + canvas.height);
                ctx.stroke();
            });

            // Enemies
            enemies.forEach(en => {
                ctx.shadowBlur = 15; ctx.shadowColor = en.color;
                ctx.fillStyle = en.color; ctx.fillRect(en.x, en.y, en.w, en.h);
            });

            // Player Mobil
            ctx.shadowBlur = 20; ctx.shadowColor = player.color;
            ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // Lights
            ctx.shadowBlur = 0; ctx.fillStyle = 'white'; 
            ctx.fillRect(player.x+5, player.y+5, 8, 4); ctx.fillRect(player.x+player.w-13, player.y+5, 8, 4);

            update();
            if(gameActive) requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - CYBER CRASH OFFLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* BACK BUTTON */
        .btn-back {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 10px 20px; border-radius: 12px;
            font-size: 0.8rem; color: #00f2ff; transition: 0.3s;
            z-index: 100;
        }
        .btn-back:hover { background: #00f2ff; color: #020617; box-shadow: 0 0 20px #00f2ff; }

        /* AREA GAME */
        #game-area {
            width: 100%; max-width: 800px; height: 400px;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            border: 3px solid #00f2ff; border-radius: 30px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: moveStar linear infinite; }
        @keyframes moveStar { from { transform: translateX(850px); } to { transform: translateX(-50px); } }

        #rocket { position: absolute; bottom: 50px; left: 80px; font-size: 4rem; z-index: 20; }

        #multiplier {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem; font-weight: 900; opacity: 0.15;
            z-index: 10; pointer-events: none; color: #00f2ff;
        }

        .btn-action {
            background: linear-gradient(45deg, #00f2ff, #0ea5e9);
            color: #020617; border-radius: 20px;
            padding: 20px 60px; font-size: 2rem; font-weight: 900;
            box-shadow: 0 8px 0 #0369a1; transition: 0.1s;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 4px 0 #0369a1; }
        .btn-action.eject { background: linear-gradient(45deg, #ff00ff, #bc13fe); box-shadow: 0 8px 0 #7e22ce; color: white; }
    </style>
</head>
<body>

    <a href="menu.html" class="btn-back orbitron uppercase font-bold">
        <i class="fas fa-arrow-left mr-2"></i> Kembali ke Arena
    </a>

    <div class="w-full max-w-[800px] flex justify-between items-end mb-6 px-4">
        <div>
            <h1 class="orbitron text-4xl text-cyan-400 italic">CYBER CRASH</h1>
            <p class="text-xs tracking-widest text-purple-500 font-bold uppercase">Infinite Offline Edition</p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-500 orbitron uppercase">Best Multiplier</p>
            <h2 class="text-3xl orbitron text-purple-400"><span id="bestScore">1.00</span>x</h2>
        </div>
    </div>

    <div id="game-area">
        <div id="stars-container"></div>
        <div id="multiplier" class="orbitron">1.00x</div>
        <div id="rocket">🚀</div>
        
        <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 z-50 hidden">
            <h2 id="result-title" class="orbitron text-6xl font-black italic"></h2>
            <p id="result-val" class="text-3xl mt-4 orbitron text-cyan-400"></p>
            <p class="mt-8 text-gray-400 animate-bounce uppercase tracking-widest text-xs">Klik tombol bawah untuk main lagi</p>
        </div>
    </div>

    <div class="mt-10">
        <button id="mainBtn" onclick="toggleGame()" class="btn-action orbitron italic uppercase">LAUNCH ROCKET</button>
    </div>

    <script>
        let isPlaying = false;
        let multiplier = 1.00;
        let crashPoint = 0;
        let bestScore = localStorage.getItem("crashBest") || 1.00;
        let animationId;
        let startTime;

        const mainBtn = document.getElementById("mainBtn");
        const multiTxt = document.getElementById("multiplier");
        const rocket = document.getElementById("rocket");
        const overlay = document.getElementById("overlay");
        const resTitle = document.getElementById("result-title");
        const resVal = document.getElementById("result-val");

        document.getElementById("bestScore").innerText = parseFloat(bestScore).toFixed(2);

        // Buat Bintang Latar Belakang
        for(let i=0; i<30; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.width = Math.random() * 3 + "px";
            star.style.height = star.style.width;
            star.style.left = Math.random() * 800 + "px";
            star.style.top = Math.random() * 400 + "px";
            star.style.animationDuration = (Math.random() * 2 + 1) + "s";
            document.getElementById("stars-container").appendChild(star);
        }

        function toggleGame() {
            if (!isPlaying) start();
            else eject();
        }

        function start() {
            isPlaying = true;
            multiplier = 1.00;
            // Algoritma Crash Realistis
            crashPoint = (Math.random() < 0.08) ? 1.00 : (0.99 / (1 - Math.random())).toFixed(2);
            startTime = Date.now();

            overlay.classList.add("hidden");
            rocket.innerHTML = "🚀";
            rocket.style.bottom = "50px";
            rocket.style.left = "80px";
            rocket.style.transform = "rotate(0deg)";

            mainBtn.innerText = "EJECT NOW!";
            mainBtn.classList.add("eject");
            
            animate();
        }

        function animate() {
            if (!isPlaying) return;

            let elapsed = (Date.now() - startTime) / 1000;
            multiplier = Math.pow(1.08, elapsed * 5);

            multiTxt.innerText = multiplier.toFixed(2) + "x";

            let shake = Math.sin(Date.now() * 0.1) * 2;
            rocket.style.bottom = (50 + (elapsed * 15)) + shake + "px";
            rocket.style.transform = `rotate(${Math.sin(elapsed * 10) * 5}deg)`;

            if (multiplier >= crashPoint) {
                crash();
                return;
            }

            animationId = requestAnimationFrame(animate);
        }

        function eject() {
            isPlaying = false;
            cancelAnimationFrame(animationId);

            resTitle.innerText = "SAFE LANDING!";
            resTitle.className = "orbitron text-6xl font-black italic text-cyan-400";
            resVal.innerText = multiplier.toFixed(2) + "x Multiplier Achieved!";
            overlay.classList.remove("hidden");

            checkBestScore();
            resetButton();
        }

        function crash() {
            isPlaying = false;
            cancelAnimationFrame(animationId);

            rocket.innerHTML = "💥";
            resTitle.innerText = "BOOOOM!!";
            resTitle.className = "orbitron text-6xl font-black italic text-red-500";
            resVal.innerText = "Crashed at " + multiplier.toFixed(2) + "x";
            overlay.classList.remove("hidden");

            resetButton();
        }

        function checkBestScore() {
            if (multiplier > bestScore) {
                bestScore = multiplier;
                localStorage.setItem("crashBest", bestScore);
                document.getElementById("bestScore").innerText = bestScore.toFixed(2);
            }
        }

        function resetButton() {
            mainBtn.innerText = "RE-LAUNCH";
            mainBtn.classList.remove("eject");
        }
    </script>
</body>
</html>

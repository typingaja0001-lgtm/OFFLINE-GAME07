<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - DRAGON SLAYER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        :root {
            --red: #ff003c;
            --cyan: #00f2ff;
            --yellow: #fcee0a;
            --bg: #050505;
        }

        body { 
            background-color: var(--bg); color: white; font-family: 'Share Tech Mono', monospace;
            height: 100vh; overflow: hidden; margin: 0;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        /* CRT SCANLINE EFFECT */
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1); opacity: 0; z-index: 2; pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker { 0% { opacity: 0.27; } 5% { opacity: 0.12; } 10% { opacity: 0.35; } 15% { opacity: 0.23; } 25% { opacity: 0.4; } 100% { opacity: 0.3; } }

        /* HUD ELEMENTS */
        .hud-border { border: 1px solid rgba(0, 242, 255, 0.3); background: rgba(0, 40, 40, 0.1); backdrop-filter: blur(5px); }
        .text-critical { color: var(--red); text-shadow: 0 0 10px var(--red); }
        .text-safe { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* BATTLE STAGE FPS STYLE */
        #battle-view {
            width: 100%; height: 60vh; position: relative;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
        }

        #dragon-sprite {
            font-size: 12rem; transition: 0.1s; filter: drop-shadow(0 0 20px var(--red));
            animation: hover 3s infinite ease-in-out;
        }

        @keyframes hover { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

        /* SHAKE ANIMATION FOR CRITICAL HIT */
        .glitch-hit { animation: glitch 0.2s steps(2) infinite; filter: hue-rotate(90deg); }
        @keyframes glitch { 
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }

        /* DAMAGE FLASH */
        .flash-red { animation: flash 0.3s forwards; }
        @keyframes flash { 0% { background: rgba(255, 0, 0, 0.5); } 100% { background: transparent; } }

        /* BUTTONS - INDUSTRIAL LOOK */
        .btn-industrial {
            position: relative; padding: 15px; border: 1px solid var(--cyan);
            background: transparent; color: var(--cyan); overflow: hidden;
            transition: 0.2s; cursor: pointer; text-align: left;
        }
        .btn-industrial:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }
        .btn-industrial::after {
            content: ""; position: absolute; top: 0; right: 0;
            width: 0; height: 0; border-style: solid;
            border-width: 0 15px 15px 0; border-color: transparent var(--cyan) transparent transparent;
        }

        /* LOG BOX */
        #terminal-log {
            background: rgba(0,0,0,0.8); height: 120px; border-left: 4px solid var(--cyan);
            padding: 10px; font-size: 12px; overflow-y: auto; scroll-behavior: smooth;
        }

        /* PROGRESS BARS */
        .bar-container { height: 4px; background: #222; width: 100%; position: relative; }
        #hp-dragon-fill { height: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); transition: 0.5s; }
        #hp-player-fill { height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); transition: 0.5s; }
    </style>
</head>
<body class="p-4 flex flex-col">

    <div class="flex justify-between items-start mb-4 z-10">
        <div class="hud-border p-4 w-64">
            <p class="text-[10px] opacity-50 uppercase tracking-tighter">Target_Identifier</p>
            <h2 class="text-xl font-bold text-critical uppercase">Void_Entity.v03</h2>
            <div class="bar-container mt-2"><div id="hp-dragon-fill" style="width: 100%;"></div></div>
            <p id="dragon-hp-txt" class="text-[10px] mt-1 text-right">HP: 1000/1000</p>
        </div>

        <a href="menu.html" class="px-6 py-2 border border-red-600 text-red-600 hover:bg-red-600 hover:text-white transition uppercase text-xs font-bold">
            Terminate_Link
        </a>

        <div class="hud-border p-4 w-64">
            <p class="text-[10px] opacity-50 uppercase tracking-tighter">System_User</p>
            <h2 id="playerName" class="text-xl font-bold text-safe uppercase">AGENT_---</h2>
            <div class="bar-container mt-2"><div id="hp-player-fill" style="width: 100%;"></div></div>
            <p id="player-hp-txt" class="text-[10px] mt-1">CORE: 100%</p>
        </div>
    </div>

    <div id="battle-view" class="hud-border rounded-lg">
        <div id="dragon-sprite">
            <i class="fas fa-dragon"></i>
        </div>
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
            <div class="w-32 h-32 border border-cyan-400 rounded-full flex items-center justify-center">
                <div class="w-1 h-1 bg-red-500"></div>
            </div>
        </div>
    </div>

    <div id="terminal-log" class="my-4 font-mono uppercase tracking-tighter">
        <p class="text-safe">[SYSTEM] BOOTING COMBAT PROTOCOL...</p>
        <p class="text-safe">[SYSTEM] TARGET ACQUIRED: VOID DRAKE</p>
    </div>

    <div class="grid grid-cols-3 gap-4 mb-4">
        <button onclick="combatAction('attack')" class="btn-industrial">
            <span class="block text-[10px] opacity-50">CMD_01</span>
            <span class="text-lg font-bold italic">EXECUTE_STRIKE</span>
        </button>
        <button onclick="combatAction('defend')" class="btn-industrial">
            <span class="block text-[10px] opacity-50">CMD_02</span>
            <span class="text-lg font-bold italic">SHIELD_MOD.exe</span>
        </button>
        <button onclick="combatAction('heal')" class="btn-industrial">
            <span class="block text-[10px] opacity-50">CMD_03</span>
            <span class="text-lg font-bold italic">REPAIR_CELLS (<span id="healCount">3</span>)</span>
        </button>
    </div>

    <div class="flex justify-between items-center text-[12px] opacity-40 uppercase">
        <p>Sync_Ratio: 98.4%</p>
        <p>Score: <span id="gameScore" class="opacity-100 text-yellow-400">0</span></p>
        <p>Session_Time: <span id="timer">00:00</span></p>
    </div>

    <div id="deathScreen" class="fixed inset-0 bg-red-900/90 z-[100] hidden flex-col items-center justify-center text-center backdrop-blur-md">
        <h1 class="text-8xl font-black italic tracking-tighter mb-4 glitch-hit">CORE_FATAL_ERROR</h1>
        <p class="text-2xl mb-8 uppercase tracking-[10px]">Neural Connection Severed</p>
        <div class="flex gap-4">
            <button onclick="location.reload()" class="px-10 py-4 bg-white text-black font-black uppercase hover:bg-red-500 transition">Re-Link</button>
            <a href="menu.html" class="px-10 py-4 border border-white text-white font-black uppercase hover:bg-white hover:text-black transition">Abort</a>
        </div>
    </div>

    <script>
        const activeUser = (localStorage.getItem('loginUser') || "UNKNOWN").toUpperCase();
        document.getElementById('playerName').innerText = "AGENT_" + activeUser;

        let game = {
            player: { hp: 100, max: 100, heals: 3, shield: false },
            dragon: { hp: 1000, max: 1000, lvl: 1 },
            score: 0,
            active: true
        };

        const logs = document.getElementById('terminal-log');
        const dSprite = document.getElementById('dragon-sprite');

        function addLog(msg, color = 'white') {
            const p = document.createElement('p');
            p.style.color = color;
            p.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
            logs.appendChild(p);
            logs.scrollTop = logs.scrollHeight;
        }

        function combatAction(type) {
            if(!game.active) return;

            if(type === 'attack') {
                const dmg = Math.floor(Math.random() * 50) + 50;
                game.dragon.hp -= dmg;
                addLog(`CRITICAL STRIKE: -${dmg} UNIT DAMAGE`, '#00f2ff');
                dSprite.classList.add('glitch-hit');
                setTimeout(() => dSprite.classList.remove('glitch-hit'), 200);
                
                if(game.dragon.hp <= 0) {
                    victory();
                    return;
                }
                setTimeout(dragonCounter, 600);
            } 
            
            else if(type === 'defend') {
                game.player.shield = true;
                addLog(`PROTOCOL: SHIELD_REINFORCEMENT ACTIVE`, '#bc13fe');
                setTimeout(dragonCounter, 600);
            }

            else if(type === 'heal') {
                if(game.player.heals > 0) {
                    game.player.hp = Math.min(game.player.max, game.player.hp + 40);
                    game.player.heals--;
                    document.getElementById('healCount').innerText = game.player.heals;
                    addLog(`REPAIR: SYSTEM STABILITY RESTORED`, '#fcee0a');
                    setTimeout(dragonCounter, 600);
                } else {
                    addLog(`ERROR: REPAIR_CELLS EMPTY`, 'red');
                }
            }
            updateUI();
        }

        function dragonCounter() {
            if(!game.active) return;
            
            let dmg = Math.floor(Math.random() * 15) + 10;
            if(game.player.shield) {
                dmg = Math.floor(dmg * 0.2);
                game.player.shield = false;
                addLog(`NOTICE: SHIELD ABSORBING 80% DAMAGE`, '#bc13fe');
            }

            document.body.classList.add('flash-red');
            setTimeout(() => document.body.classList.remove('flash-red'), 300);

            game.player.hp -= dmg;
            addLog(`WARNING: INBOUND DAMAGE -${dmg} UNITS`, '#ff003c');

            if(game.player.hp <= 0) {
                game.active = false;
                document.getElementById('deathScreen').style.display = 'flex';
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('hp-dragon-fill').style.width = (game.dragon.hp / game.dragon.max * 100) + '%';
            document.getElementById('hp-player-fill').style.width = (game.player.hp / game.player.max * 100) + '%';
            document.getElementById('dragon-hp-txt').innerText = `HP: ${game.dragon.hp}/${game.dragon.max}`;
            document.getElementById('player-hp-txt').innerText = `CORE: ${game.player.hp}%`;
            document.getElementById('gameScore').innerText = game.score;
        }

        function victory() {
            game.score += 500;
            addLog(`SUCCESS: VOID ENTITY NEUTRALIZED`, '#fcee0a');
            addLog(`SYSTEM: UPGRADING THREAT LEVEL...`, '#fcee0a');
            
            setTimeout(() => {
                game.dragon.max += 250;
                game.dragon.hp = game.dragon.max;
                game.player.heals = 3;
                document.getElementById('healCount').innerText = 3;
                updateUI();
                addLog(`ALERT: NEW TARGET DETECTED`, 'red');
            }, 2000);
        }

        // Timer
        let sec = 0;
        setInterval(() => {
            if(!game.active) return;
            sec++;
            let m = Math.floor(sec/60);
            let s = sec%60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);

    </script>
</body>
</html>

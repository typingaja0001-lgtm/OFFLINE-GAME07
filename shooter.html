<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - GALAXY SHOOTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; border: 4px solid #00f2ff; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); background: #000; border-radius: 15px; overflow: hidden; }
        canvas { display: block; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        #gameOverModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0d0221; border: 3px solid #ff00ff; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 60px #ff00ff; width: 340px; }
        .how-to-play { margin-top: 25px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.3); padding: 20px; border-radius: 15px; width: 440px; }
        .key-badge { background: #1a1a1a; border: 1px solid #00f2ff; color: #00f2ff; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="orbitron text-4xl neon-pink mb-2 italic" style="color:#ff00ff">CRASHED</h2>
            <p class="text-[10px] text-gray-400 uppercase orbitron mb-6 tracking-widest">Pilot Ejected</p>
            <div class="mb-10">
                <p class="text-gray-500 text-[10px] uppercase orbitron">Final Score</p>
                <p id="finalScoreDisplay" class="text-6xl neon-cyan orbitron">0</p>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black orbitron hover:bg-cyan-400 transition uppercase italic text-lg">REDEPLOY</button>
                <button onclick="saveAndExit()" class="w-full border border-gray-600 text-gray-500 py-3 rounded-xl hover:text-white hover:border-white transition uppercase text-[10px] orbitron">MENU UTAMA</button>
            </div>
        </div>
    </div>

    <div class="mb-6 text-center">
        <p class="text-[10px] text-gray-500 uppercase orbitron tracking-[0.3em]">Galaxy Score</p>
        <p id="pScore" class="text-5xl neon-cyan orbitron">0</p>
    </div>

    <div id="game-container">
        <canvas id="shooter" width="400" height="500"></canvas>
    </div>

    <div class="how-to-play">
        <h3 class="orbitron text-[10px] text-cyan-400 mb-4 italic uppercase tracking-widest text-center">🚀 STARSHIP CONTROL 🚀</h3>
        <div class="grid grid-cols-2 gap-4 text-[13px] text-gray-300">
            <div class="space-y-2">
                <p class="flex justify-between"><span>Navigasi:</span> <span class="key-badge">← → ↑ ↓</span></p>
                <p class="flex justify-between"><span>Senjata:</span> <span class="key-badge">SPASI</span></p>
            </div>
            <div class="space-y-2 border-l border-white/10 pl-4">
                <p class="flex justify-between text-yellow-500 italic font-bold"><span>Misi:</span> <span>Hancurkan Meteor</span></p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('shooter');
        const ctx = canvas.getContext('2d');
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const player = (localStorage.getItem('loginUser') || "USER").toUpperCase();

        let score = 0;
        let gameActive = true;
        let keys = {};

        const ship = { x: 185, y: 430, w: 30, h: 30, speed: 6 };
        let bullets = [];
        let enemies = [];
        let spawnTimer = 0;

        window.addEventListener('keydown', e => { 
            keys[e.code] = true; 
            if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault(); 
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if(!gameActive) return;

            // Move Ship
            if(keys['ArrowLeft'] && ship.x > 0) ship.x -= ship.speed;
            if(keys['ArrowRight'] && ship.x < canvas.width - ship.w) ship.x += ship.speed;
            if(keys['ArrowUp'] && ship.y > 0) ship.y -= ship.speed;
            if(keys['ArrowDown'] && ship.y < canvas.height - ship.h) ship.y += ship.speed;

            // Shoot
            if(keys['Space'] && bullets.length < 5) {
                bullets.push({ x: ship.x + ship.w/2 - 2, y: ship.y, w: 4, h: 12 });
                keys['Space'] = false; // Semi-auto
            }

            // Bullet Logic
            bullets.forEach((b, i) => {
                b.y -= 8;
                if(b.y < 0) bullets.splice(i, 1);
            });

            // Enemy Logic
            spawnTimer++;
            if(spawnTimer > 30) {
                enemies.push({ x: Math.random() * (canvas.width - 30), y: -30, w: 30, h: 30, speed: 2 + Math.random() * 3 });
                spawnTimer = 0;
            }

            enemies.forEach((en, ei) => {
                en.y += en.speed;
                
                // Collision with Ship
                if(ship.x < en.x + en.w && ship.x + ship.w > en.x && ship.y < en.y + en.h && ship.y + ship.h > en.y) {
                    gameActive = false;
                }

                // Collision with Bullet
                bullets.forEach((b, bi) => {
                    if(b.x < en.x + en.w && b.x + b.w > en.x && b.y < en.y + en.h && b.y + b.h > en.y) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 50;
                        document.getElementById('pScore').innerText = score;
                    }
                });

                if(en.y > canvas.height) enemies.splice(ei, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ship (Cyan)
            ctx.fillStyle = '#00f2ff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
            ctx.beginPath();
            ctx.moveTo(ship.x + ship.w/2, ship.y);
            ctx.lineTo(ship.x, ship.y + ship.h);
            ctx.lineTo(ship.x + ship.w, ship.y + ship.h);
            ctx.fill();

            // Bullets (Yellow)
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Enemies (Red Meteor)
            ctx.fillStyle = '#ff3333';
            ctx.shadowColor = '#ff3333';
            enemies.forEach(en => {
                ctx.beginPath();
                ctx.arc(en.x + en.w/2, en.y + en.h/2, en.w/2, 0, Math.PI*2);
                ctx.fill();
            });
            
            ctx.shadowBlur = 0;
        }

        async function saveAndExit() {
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                let userKey = Object.keys(data).find(k => data[k].name.toUpperCase() === player);
                if(userKey) {
                    await fetch(`https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ score: data[userKey].score + score })
                    });
                }
            } catch (e) {}
            window.location.href = 'menu.html';
        }

        function gameLoop() {
            if(!gameActive) {
                document.getElementById('finalScoreDisplay').innerText = score;
                document.getElementById('gameOverModal').style.display = 'flex';
                return;
            }
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>

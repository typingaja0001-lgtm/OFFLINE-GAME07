<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ INITIALIZING NEURAL LINK...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        body { 
            background: #020205; color: #00f2ff; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
            background-image: radial-gradient(circle at center, #0a0a20 0%, #020205 100%);
        }

        /* RADAR SCANNER EFFECT */
        .radar {
            position: absolute; width: 400px; height: 400px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            animation: pulse-radar 2s infinite ease-in-out;
        }
        .radar::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-left: 2px solid #00f2ff; border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse-radar { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.6; } }

        /* PROGRESS BAR CUSTOM */
        .loader-container {
            position: relative; width: 350px; text-align: center; z-index: 10;
        }

        .bar-bg {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 20px; overflow: hidden; margin: 20px 0;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .bar-fill {
            width: 0%; height: 100%; background: linear-gradient(90deg, #bc13fe, #00f2ff);
            box-shadow: 0 0 20px #00f2ff; transition: 0.1s linear;
        }

        /* GLITCH TEXT */
        .glitch-text {
            font-size: 2.5rem; font-weight: 900; letter-spacing: 10px;
            text-shadow: 2px 2px #ff00ff, -2px -2px #00f2ff;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* LOGS STYLE */
        .console-logs {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: rgba(0, 242, 255, 0.6);
            height: 20px; text-transform: uppercase;
        }

        .visualizer {
            display: flex; gap: 3px; justify-content: center; margin-top: 15px;
        }
        .v-bar { width: 3px; height: 15px; background: #00f2ff; animation: v-bounce 0.5s infinite alternate; }
        @keyframes v-bounce { 0% { height: 5px; opacity: 0.3; } 100% { height: 20px; opacity: 1; } }
    </style>
</head>
<body>

    <div class="radar"></div>

    <div class="loader-container">
        <div class="glitch-text mb-2" id="targetLabel">INITIALIZING</div>
        <div id="percent" class="text-3xl font-black italic">0%</div>
        
        <div class="bar-bg">
            <div class="bar-fill" id="bar"></div>
        </div>

        <div class="console-logs" id="logs">Booting kernel...</div>

        <div class="visualizer">
            <div class="v-bar" style="animation-delay: 0.1s"></div>
            <div class="v-bar" style="animation-delay: 0.3s"></div>
            <div class="v-bar" style="animation-delay: 0.2s"></div>
            <div class="v-bar" style="animation-delay: 0.4s"></div>
            <div class="v-bar" style="animation-delay: 0.1s"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const game = params.get("game") || "menu";
        document.getElementById("targetLabel").innerText = game.toUpperCase();

        const bar = document.getElementById("bar");
        const percent = document.getElementById("percent");
        const logs = document.getElementById("logs");

        const statusMessages = [
            "> Establishing secure link...",
            "> Bypassing firewall...",
            "> Loading neural textures...",
            "> Compiling core logic...",
            "> Optimizing visual buffer...",
            "> ACCESS GRANTED. WELCOME."
        ];

        let progress = 0;
        
        const interval = setInterval(() => {
            // Speed loading yang variatif agar terasa nyata
            progress += Math.random() > 0.8 ? 0.5 : 2;

            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                logs.innerText = statusMessages[5];
                logs.style.color = "#fff";
                
                setTimeout(() => {
                    window.location.href = game + ".html";
                }, 800);
            }

            bar.style.width = progress + "%";
            percent.innerText = Math.floor(progress) + "%";

            // Ganti log pesan berdasarkan progres
            const msgIndex = Math.floor((progress / 100) * (statusMessages.length - 1));
            if(logs.innerText !== statusMessages[msgIndex]) {
                logs.innerText = statusMessages[msgIndex];
            }

        }, 40);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ INITIALIZING SYSTEM...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
        }

        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            flex-direction: column;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle, #0a1120 0%, #050505 100%);
        }

        /* FRAME DEKORASI */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--neon-blue);
            filter: drop-shadow(0 0 5px var(--neon-blue));
        }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        /* TEXT ANIMATION */
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            letter-spacing: 8px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        /* BAR CONTAINER */
        .loader-container {
            position: relative;
            width: 350px;
            padding: 5px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 4px;
        }

        .bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 0 15px var(--neon-blue);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* SCAN LINE */
        .progress::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 50px; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: scan 1.5s infinite;
        }

        @keyframes scan {
            0% { left: -50px; }
            100% { left: 100%; }
        }

        .status-text {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-top: 15px;
        }

        #percent {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-purple);
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <div class="mb-4 opacity-50">
        <i class="fas fa-microchip text-4xl text-cyan-500 animate-spin-slow"></i>
    </div>

    <div class="title" id="gameTitle">LOADING</div>
    
    <div class="loader-container">
        <div class="bar">
            <div class="progress" id="progressBar"></div>
        </div>
    </div>

    <div id="percent">0%</div>
    <div class="status-text" id="statusMessage">Initializing System...</div>

    <script>
        let params = new URLSearchParams(window.location.search);
        let game = params.get("game") || "GAME";

        document.getElementById("gameTitle").innerText = game.toUpperCase();

        let bar = document.getElementById("progressBar");
        let percentText = document.getElementById("percent");
        let statusMsg = document.getElementById("statusMessage");

        let messages = [
            "Connecting to secure server...",
            "Verifying user assets...",
            "Syncing global balance...",
            "Loading HD textures...",
            "Optimizing engine...",
            "Preparing your win..."
        ];

        let progress = 0;

        let interval = setInterval(() => {
            // Random progress biar lebih natural
            progress += Math.floor(Math.random() * 8) + 2;

            // Ganti pesan status tiap progress tertentu
            if(progress < 30) statusMsg.innerText = messages[0];
            else if(progress < 50) statusMsg.innerText = messages[1];
            else if(progress < 70) statusMsg.innerText = messages[2];
            else if(progress < 90) statusMsg.innerText = messages[3];
            else statusMsg.innerText = messages[5];

            if(progress >= 100) {
                progress = 100;
                clearInterval(interval);
                statusMsg.innerText = "ACCESS GRANTED!";
                statusMsg.style.color = "#00f2ff";

                setTimeout(() => {
                    // Pindah ke halaman game
                    window.location.href = game + ".html";
                }, 800);
            }

            bar.style.width = progress + "%";
            percentText.innerText = progress + "%";

        }, 150);
    </script>

</body>
</html>

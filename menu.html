<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - ARENA SUPREME ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
        }

        body { 
            background: radial-gradient(circle at center, #0d0221 0%, #050112 100%); 
            color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; 
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }
        .neon-cyan { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* HEADER GLASSMORPHISM */
        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.2);
        }

        /* ARCADE CARDS UPGRADE */
        .arcade-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 20px; padding: 20px; text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        .arcade-card.ready { border-color: var(--neon-purple); }
        
        .arcade-card.ready:hover { 
            border-color: var(--neon-blue);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            background: rgba(0, 242, 255, 0.05);
        }

        .arcade-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* BUTTONS */
        .btn-play {
            background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 8px 0; border-radius: 8px; font-weight: 900; transition: 0.3s;
            text-transform: uppercase; font-size: 10px; letter-spacing: 2px;
        }

        .arcade-card:hover .btn-play {
            background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue);
        }

        /* MODAL */
        #gameModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { 
            background: #0d0221; border: 2px solid var(--neon-blue); padding: 40px; 
            border-radius: 30px; text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050112; }
        ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="gameModal">
        <div class="modal-box">
            <div class="flex justify-center mb-6">
                <div class="bg-cyan-500 p-4 rounded-full shadow-[0_0_20px_#00f2ff] animate-pulse">
                    <i class="fas fa-play text-2xl text-black"></i>
                </div>
            </div>
            <h2 id="modalTitle" class="orbitron text-3xl neon-cyan mb-8 uppercase italic font-black">GAME NAME</h2>
            <div id="popupRankList" class="mb-10 flex flex-col gap-3"></div>
            <button onclick="startGameAction()" class="w-full bg-white text-black py-4 rounded-xl orbitron font-black text-xl hover:bg-cyan-400 transition uppercase tracking-widest shadow-[0_5px_0_#aaa]">MASUK ARENA</button>
            <button onclick="closeModal()" class="mt-8 text-gray-500 text-xs orbitron uppercase tracking-[0.3em] block w-full hover:text-red-500 transition">BATAL</button>
        </div>
    </div>

    <header class="p-6 px-12 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-3xl font-black orbitron italic neon-cyan tracking-tighter">YOKBISAYOK<span class="text-white">.OS</span></h1>
        <div class="flex items-center gap-8">
            <div class="bg-white/5 px-6 py-2 rounded-full border border-white/10 flex items-center gap-4">
                <i class="fas fa-user-circle text-purple-500"></i>
                <div class="text-left">
                    <p id="userNameDisplay" class="text-[10px] orbitron font-bold neon-purple uppercase leading-none">---</p>
                    <p id="myTotalScore" class="text-lg orbitron font-bold neon-cyan leading-none">0</p>
                </div>
            </div>
            <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-red-500 text-2xl hover:scale-125 transition"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="mb-16 text-center md:text-left">
            <h2 class="text-6xl font-black orbitron text-white uppercase italic leading-none">ARENA <span class="neon-purple">SUPREME</span></h2>
            <p class="text-[11px] text-cyan-500 tracking-[8px] mt-4 font-bold uppercase animate-pulse">SYSTEM STATUS: ALL GAMES OPERATIONAL</p>
        </div>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-6 mb-24"></div>

        <h3 class="orbitron text-white text-xl mb-10 italic flex items-center gap-6">
            <i class="fas fa-trophy text-yellow-500"></i> TOP OPERATORS <span class="h-[1px] flex-1 bg-gradient-to-r from-purple-500 to-transparent"></span>
        </h3>
        <div id="leaderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </main>

    <script>
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const activeUser = (localStorage.getItem('loginUser') || "USER").toUpperCase();
        document.getElementById('userNameDisplay').innerText = activeUser;

        // DAFTAR GAME LENGKAP (Sudah diperbaiki komanya Bosku)
        const readyGames = [
            "SNAKE RETRO", "TETRIS ULTRA", "PAC-MAN NEO", "SPACE INVADERS", 
            "GALAXY SHOOTER", "BRICK BREAKER", "NEON RACER", "FLAPPY CYBER", "CYBER STRIKE"
        ];
        
        const icons = {
            "SNAKE RETRO": "fa-snake", "TETRIS ULTRA": "fa-th-large", "PAC-MAN NEO": "fa-ghost",
            "SPACE INVADERS": "fa-space-shuttle", "GALAXY SHOOTER": "fa-rocket", "BRICK BREAKER": "fa-border-all",
            "NEON RACER": "fa-car-side", "FLAPPY CYBER": "fa-dove", "CYBER STRIKE": "fa-crosshairs"
        };

        const grid = document.getElementById('arcadeGrid');
        
        // Buat 48 slot
        for(let i=0; i<48; i++) {
            let name = readyGames[i] || "SECURE_GAME #" + (i+1);
            let isReady = i < readyGames.length;
            
            grid.innerHTML += `
                <div class="arcade-card ${isReady ? 'ready' : 'opacity-30'}">
                    <div class="h-20 flex items-center justify-center bg-black/60 rounded-xl mb-4 border border-white/5 relative">
                        <i class="fas ${isReady ? icons[name] : 'fa-lock'} text-3xl ${isReady ? 'neon-cyan' : 'text-gray-700'}"></i>
                        ${isReady ? '<span class="absolute top-2 right-2 flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span></span>' : ''}
                    </div>
                    <p class="text-[10px] font-black orbitron text-white uppercase mb-4 truncate italic">${name}</p>
                    <button onclick="${isReady ? `showPopup('${name}')` : ''}" class="btn-play w-full orbitron">
                        ${isReady ? 'RE-SYNC' : 'ENCRYPTED'}
                    </button>
                </div>`;
        }

        async function getDatabase() {
            try {
                const res = await fetch(dbURL + "?nocache=" + Date.now());
                const data = await res.json();
                if (!data) return [];
                return Object.values(data).sort((a, b) => b.score - a.score);
            } catch (e) { return []; }
        }

        let currentGameTarget = "";

        async function showPopup(name) {
            currentGameTarget = name;
            document.getElementById('modalTitle').innerText = name;
            const popupRankList = document.getElementById('popupRankList');
            document.getElementById('gameModal').style.display = 'flex';
            popupRankList.innerHTML = "<p class='text-[10px] text-cyan-500 animate-pulse italic'>CONNECTING TO DATABASE...</p>";

            const players = await getDatabase();
            popupRankList.innerHTML = "";
            players.slice(0, 3).forEach((p, idx) => {
                let color = idx === 0 ? "#ffd700" : (idx === 1 ? "#c0c0c0" : "#cd7f32");
                popupRankList.innerHTML += `
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10">
                        <span class="text-[11px] font-bold" style="color:${color}">${idx+1}. ${p.name.toUpperCase()}</span>
                        <span class="orbitron text-xs text-white">${p.score.toLocaleString()}</span>
                    </div>`;
            });
        }

        async function syncAll() {
            const players = await getDatabase();
            const list = document.getElementById('leaderList');
            const myHeaderScore = document.getElementById('myTotalScore');

            const me = players.find(p => p.name.trim().toUpperCase() === activeUser.trim());
            myHeaderScore.innerText = me ? me.score.toLocaleString() : "0";

            if(list) {
                list.innerHTML = "";
                players.slice(0, 12).forEach((p, idx) => {
                    list.innerHTML += `
                        <div class="bg-white/5 border border-white/10 p-3 rounded-xl flex justify-between items-center hover:border-cyan-500 transition">
                            <span class="orbitron font-bold text-purple-500 text-xs">${idx+1}</span>
                            <p class="text-[11px] orbitron uppercase text-white">${p.name}</p>
                            <p class="text-[11px] orbitron neon-cyan">${p.score.toLocaleString()}</p>
                        </div>`;
                });
            }
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }

        function startGameAction() { 
            const target = currentGameTarget.toUpperCase().trim();
            const routes = {
                "SNAKE RETRO": "snake.html", "TETRIS ULTRA": "tetris.html", "PAC-MAN NEO": "pacman.html",
                "SPACE INVADERS": "invaders.html", "GALAXY SHOOTER": "shooter.html", "BRICK BREAKER": "brick.html",
                "NEON RACER": "racer.html", "FLAPPY CYBER": "flappy.html", "CYBER STRIKE": "strike.html"
            };
            if(routes[target]) window.location.href = routes[target];
        }

        syncAll();
        setInterval(syncAll, 5000);
    </script>
</body>
</html>

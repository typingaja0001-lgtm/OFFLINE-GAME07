<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK | NEURAL INTERFACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&display=swap');
        
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --dark: #020205;
        }

        body { 
            background: var(--dark); color: white; font-family: 'Michroma', sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* SCANLINE ANIMATION */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000; pointer-events: none; background-size: 100% 2px, 3px 100%;
        }

        /* BACKGROUND ELEMENTS */
        .bg-glow {
            position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            top: -200px; right: -200px; z-index: -1; animation: float 10s infinite alternate;
        }

        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(-100px, 100px); } }

        /* HEXAGON GRID */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px;
            padding: 40px; perspective: 1000px;
        }

        .cyber-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 5px solid var(--neon);
            clip-path: polygon(0% 0%, 90% 0%, 100% 15%, 100% 100%, 10% 100%, 0% 85%);
            padding: 30px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.1);
            position: relative; cursor: pointer;
        }

        .cyber-card:hover {
            background: rgba(0, 242, 255, 0.1);
            transform: rotateY(10deg) translateZ(20px);
            border-left: 10px solid var(--purple);
            box-shadow: -20px 0 50px rgba(188, 19, 254, 0.2);
        }

        .cyber-card::after {
            content: "READY"; position: absolute; top: 10px; right: 20px;
            font-size: 8px; color: var(--neon); letter-spacing: 3px; opacity: 0.5;
        }

        /* BUTTON HOLOGRAPHIC */
        .btn-glitch {
            position: relative; width: 100%; padding: 12px; background: transparent;
            border: 1px solid var(--neon); color: var(--neon); font-size: 10px;
            letter-spacing: 5px; font-weight: bold; overflow: hidden; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .btn-glitch:hover {
            background: var(--neon); color: black;
            box-shadow: 0 0 30px var(--neon);
        }

        /* MODAL GHOST */
        #gameModal {
            display: none; position: fixed; inset: 0; background: rgba(2,2,5,0.98);
            z-index: 9999; align-items: center; justify-content: center;
        }

        .ghost-box {
            border-top: 2px solid var(--neon); border-bottom: 2px solid var(--purple);
            padding: 50px; text-align: center; width: 100%; max-width: 600px;
            background: linear-gradient(45deg, rgba(0, 242, 255, 0.05), rgba(188, 19, 254, 0.05));
        }

        .glitch-title {
            font-family: 'Syncopate', sans-serif; font-size: 3rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: -5px;
            background: linear-gradient(to right, #00f2ff, #bc13fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav class="p-10 flex justify-between items-center relative z-50">
        <div>
            <h1 class="glitch-title" style="font-size: 1.5rem; letter-spacing: 2px;">YOKBISAYOK</h1>
            <p class="text-[8px] text-cyan-400 tracking-[8px] opacity-50 uppercase">Neural Network Online</p>
        </div>
        
        <div class="flex items-center gap-10">
            <div class="text-right">
                <p id="userNameDisplay" class="text-[10px] text-purple-400 tracking-widest font-bold">UNIDENTIFIED</p>
                <p class="text-2xl font-bold italic tracking-tighter" id="myTotalScore">0.00</p>
            </div>
            <div onclick="logout()" class="p-4 border border-red-500/20 text-red-500 cursor-pointer hover:bg-red-500 hover:text-white transition">
                <i class="fas fa-power-off"></i>
            </div>
        </div>
    </nav>

    <main class="relative z-10 px-10">
        <div class="flex items-center gap-6 mb-20 border-b border-white/5 pb-10">
            <h2 class="text-6xl font-black uppercase tracking-tighter italic">DATA <span class="text-cyan-400 underline decoration-purple-500">ARENA</span></h2>
            <div class="text-xs text-gray-500 max-w-xs leading-tight">
                ACCESSING ENCRYPTED FILES...<br>VERIFYING GAME ASSETS...
            </div>
        </div>

        <div id="arcadeGrid" class="grid-container">
            </div>
    </main>

    <div id="gameModal">
        <div class="ghost-box">
            <p class="text-[10px] text-cyan-500 tracking-[10px] mb-4 uppercase">Initializing Session</p>
            <h2 id="modalTitle" class="glitch-title mb-10">NEON RACER</h2>
            
            <div id="popupRankList" class="mb-10 grid grid-cols-1 gap-2">
                </div>

            <div class="flex flex-col gap-4">
                <button onclick="confirmStart()" class="bg-cyan-500 text-black py-5 font-bold orbitron uppercase tracking-[10px] hover:bg-white transition">CONNECTING TO HOST</button>
                <button onclick="closeModal()" class="text-[9px] text-gray-600 hover:text-red-500 uppercase tracking-widest">Terminate Protocol</button>
            </div>
        </div>
    </div>

    <script>
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const activeUser = (localStorage.getItem('loginUser') || "GUEST");
        document.getElementById('userNameDisplay').innerText = activeUser.toUpperCase();

        const gamesMap = [
            { id: "crash", name: "CYBER CRASH", file: "crash", desc: "High-speed tactical impact" },
            { id: "miner", name: "NEON MINER", file: "miner", desc: "Subterranean resource heist" },
            { id: "snake", name: "SNAKE RETRO", file: "snake", desc: "Classic neural loop" },
            { id: "tetris", name: "TETRIS ULTRA", file: "tetris", desc: "Structural block compilation" },
            { id: "pacman", name: "PAC-MAN NEO", file: "pacman", desc: "Ghost-code consumption" },
            { id: "invaders", name: "SPACE INVADERS", file: "invaders", desc: "Deep space defense" }
        ];

        let selectedGameFile = "";

        function renderGrid() {
            const grid = document.getElementById('arcadeGrid');
            grid.innerHTML = "";
            
            gamesMap.forEach(game => {
                grid.innerHTML += `
                    <div class="cyber-card group" onclick="showPopup('${game.name}', '${game.file}')">
                        <div class="text-cyan-400 text-[9px] mb-2 font-bold opacity-50">FILE_0${Math.floor(Math.random()*900)}</div>
                        <h3 class="text-xl font-bold mb-1 group-hover:text-cyan-400 transition">${game.name}</h3>
                        <p class="text-[9px] text-gray-500 mb-6">${game.desc}</p>
                        <button class="btn-glitch">SYNCHRONIZE</button>
                    </div>`;
            });
        }

        async function showPopup(name, file) {
            selectedGameFile = file;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('gameModal').style.display = 'flex';
            
            const list = document.getElementById('popupRankList');
            list.innerHTML = "<p class='text-[10px] text-purple-500 animate-pulse'>ENCRYPTING DATA...</p>";
            
            const players = await getDatabase();
            list.innerHTML = "";
            players.slice(0, 3).forEach((p, i) => {
                list.innerHTML += `
                    <div class="flex justify-between p-4 bg-white/5 border-l-2 border-purple-500 text-[11px]">
                        <span class="text-gray-400 tracking-widest">#0${i+1} ${p.name}</span>
                        <span class="text-cyan-400 font-bold">${p.score} CR</span>
                    </div>`;
            });
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        function confirmStart() { window.location.href = `loading.html?game=${selectedGameFile}`; }

        async function getDatabase() {
            try {
                const res = await fetch(dbURL + "?nocache=" + Date.now());
                const data = await res.json();
                return data ? Object.values(data).sort((a, b) => b.score - a.score) : [];
            } catch (e) { return []; }
        }

        async function syncAll() {
            const players = await getDatabase();
            const me = players.find(p => p.name.toUpperCase() === activeUser.toUpperCase());
            if(me) document.getElementById('myTotalScore').innerText = me.score.toFixed(2);
        }

        function logout() {
            if(confirm("LOGOUT FROM NEURAL NETWORK?")) {
                localStorage.removeItem('loginUser');
                window.location.href = 'index.html';
            }
        }

        renderGrid();
        syncAll();
        setInterval(syncAll, 10000);
    </script>
</body>
</html>

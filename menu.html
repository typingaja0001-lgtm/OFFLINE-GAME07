<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - FAST LOBBY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            margin: 0; overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* KARTU GAME RINGAN (TANPA GAMBAR BERAT) */
        .game-card {
            background: #0f172a; border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 12px; transition: 0.2s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 140px; text-align: center; padding: 15px;
        }
        .game-card:hover {
            border-color: #00f2ff;
            background: #1e293b;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            transform: translateY(-3px);
        }

        /* ICON NEON */
        .icon-box {
            font-size: 2.5rem; margin-bottom: 10px;
            color: #334155; transition: 0.2s;
        }
        .game-card:hover .icon-box { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }

        /* SCROLL KATEGORI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-4 px-6 flex justify-between items-center border-b border-white/5 bg-slate-950 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-bolt text-cyan-400"></i>
            <h1 class="text-lg font-black orbitron italic text-cyan-400">YOKBISAYOK</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="userName" class="text-[10px] orbitron text-gray-400">PLAYER</span>
            <button onclick="logout()" class="text-gray-500 hover:text-red-500"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <main class="p-4 max-w-6xl mx-auto">
        
        <div class="mb-6 mt-2">
            <h2 class="text-2xl font-bold orbitron uppercase italic">PC GAME <span class="text-cyan-400">OFFLINE</span></h2>
            <p class="text-gray-500 text-xs tracking-widest">STABLE VERSION v4.0 • NO DELAY</p>
        </div>

        <div class="flex gap-2 mb-6 overflow-x-auto no-scrollbar">
            <button class="bg-cyan-600 text-white px-4 py-1.5 rounded text-[10px] font-bold orbitron">ALL</button>
            <button class="bg-slate-800 px-4 py-1.5 rounded text-[10px] font-bold orbitron">ACTION</button>
            <button class="bg-slate-800 px-4 py-1.5 rounded text-[10px] font-bold orbitron">RACING</button>
            <button class="bg-slate-800 px-4 py-1.5 rounded text-[10px] font-bold orbitron">ARCADE</button>
        </div>

        <div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
            </div>

    </main>

    <script>
        // DATA GAME MENGGUNAKAN ICON FONT AWESOME (ANTI-LOADING)
        const games = [
            { id: "snake", name: "NEON SNAKE", icon: "fa-snake", color: "text-green-500" },
            { id: "motor", name: "CYBER MOTO", icon: "fa-motorcycle", color: "text-blue-500" },
            { id: "space", name: "SPACE WAR", icon: "fa-rocket", color: "text-purple-500" },
            { id: "zombie", name: "ZOMBIE HUNT", icon: "fa-biohazard", color: "text-red-500" },
            { id: "drift", name: "GT DRIFT", icon: "fa-car-side", color: "text-orange-500" },
            { id: "knife", name: "KNIFE HIT", icon: "fa-utensils", color: "text-gray-300" },
            { id: "chess", name: "PC CHESS", icon: "fa-chess", color: "text-white" },
            { id: "pool", name: "8 BALL POOL", icon: "fa-circle", color: "text-blue-400" },
            { id: "tank", name: "WAR TANK", icon: "fa-shield-halved", color: "text-emerald-600" },
            { id: "tetris", name: "BLOCK NEO", icon: "fa-cubes", color: "text-pink-500" },
            { id: "box", name: "UFC FIGHT", icon: "fa-hand-fist", color: "text-red-600" },
            { id: "bird", name: "ANGRY BIRD", icon: "fa-crow", color: "text-yellow-500" }
        ];

        // Validasi Login
        const user = localStorage.getItem("loginUser");
        if(!user) { window.location.href = "index.html"; }
        document.getElementById("userName").innerText = user.toUpperCase();

        const grid = document.getElementById("menuGrid");
        
        games.forEach(g => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.onclick = () => window.location.href = `loading.html?game=${g.id}`;
            card.innerHTML = `
                <div class="icon-box"><i class="fas ${g.icon}"></i></div>
                <h4 class="text-[11px] font-bold orbitron text-white/80">${g.name}</h4>
                <span class="text-[8px] text-cyan-500 mt-1">PLAY NOW</span>
            `;
            grid.appendChild(card);
        });

        function logout() {
            localStorage.removeItem("loginUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

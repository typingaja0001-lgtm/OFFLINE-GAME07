<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - ULTIMATE ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        
        body { 
            background: #050112; color: white; font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(rgba(18, 10, 41, 0.9), rgba(5, 1, 18, 0.95)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        .neon-text-purple { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        .neon-text-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
        
        .sidebar-nav {
            background: rgba(0, 0, 0, 0.6);
            border-right: 2px solid #00f2ff;
            box-shadow: 5px 0 15px rgba(0, 242, 255, 0.2);
        }

        .arcade-card {
            background: #000; border: 2px solid #ff00ff; border-radius: 8px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .arcade-card:hover { 
            transform: scale(1.05); border-color: #00f2ff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5); 
        }
        .play-btn {
            background: #00f2ff; color: #000; font-family: 'Orbitron';
            font-size: 8px; font-weight: 900; padding: 4px 0; width: 100%;
            display: block; text-align: center;
        }

        .main-banner {
            background: linear-gradient(to right, #000, rgba(255, 0, 255, 0.1), #000);
            border: 2px solid #00f2ff55;
            position: relative;
        }

        /* MODAL / POP-UP STYLING */
        #gameModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #0d0221;
            border: 3px solid #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.5);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: modalZoom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalZoom {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="gameModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <i class="fas fa-trophy text-5xl text-yellow-500 mb-4 shadow-lg"></i>
            <h2 id="modalGameTitle" class="orbitron text-2xl neon-text-cyan mb-2 uppercase">GAME TITLE</h2>
            <p class="text-gray-400 text-xs tracking-widest mb-6">ALL TIME HIGH SCORE</p>
            
            <div class="bg-black/50 border border-purple-500/50 p-6 rounded-xl mb-8">
                <p id="topPlayerName" class="orbitron text-xl neon-text-purple">---</p>
                <p id="topPlayerScore" class="text-3xl font-black text-white mt-2">0</p>
                <p class="text-[10px] text-cyan-400 font-bold">POINTS</p>
            </div>

            <button onclick="closeModal()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-3 rounded-lg orbitron font-bold hover:scale-105 transition shadow-lg">LANJUT BERMAIN</button>
        </div>
    </div>

    <header class="p-4 px-8 flex justify-between items-center bg-black border-b-2 border-cyan-500 sticky top-0 z-50">
        <h1 class="text-3xl font-black orbitron italic neon-text-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-[10px] text-purple-400 font-bold uppercase">Neon Coins</p>
                <p class="text-sm orbitron font-bold">14,500 NC</p>
            </div>
            <button onclick="logout()" class="bg-red-600 px-4 py-1 rounded text-xs orbitron font-bold shadow-[0_0_10px_red]">LOGOUT</button>
        </div>
    </header>

    <div class="flex flex-1">
        <aside class="w-20 lg:w-32 sidebar-nav flex flex-col items-center py-10 gap-10 sticky top-[72px] h-[calc(100vh-72px)]">
            <div class="text-center group cursor-pointer">
                <i class="fas fa-swords text-2xl mb-2 text-purple-500 group-hover:neon-text-purple"></i>
                <p class="text-[8px] orbitron font-bold">ACTION</p>
            </div>
            <div class="text-center group cursor-pointer">
                <i class="fas fa-chess text-2xl mb-2 text-cyan-500 group-hover:neon-text-cyan"></i>
                <p class="text-[8px] orbitron font-bold">STRATEGY</p>
            </div>
            <div class="text-center group cursor-pointer">
                <i class="fas fa-car text-2xl mb-2 text-purple-500 group-hover:neon-text-purple"></i>
                <p class="text-[8px] orbitron font-bold">RACING</p>
            </div>
            <div class="text-center group cursor-pointer">
                <i class="fas fa-puzzle-piece text-2xl mb-2 text-cyan-500 group-hover:neon-text-cyan"></i>
                <p class="text-[8px] orbitron font-bold">PUZZLE</p>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-10 overflow-y-auto">
            <div class="main-banner p-8 rounded-2xl mb-10 flex items-center justify-between border-2 border-purple-500/50 shadow-[inset_0_0_30px_rgba(255,0,255,0.2)]">
                <div>
                    <h2 class="text-5xl font-black orbitron italic text-white leading-none">
                        PC <span class="neon-text-purple">ULTRA</span> LIBRARY
                    </h2>
                    <p class="text-xs text-gray-400 mt-4 tracking-widest font-bold">TERSEDIA 48+ GAME OFFLINE HIGH PERFORMANCE V10.0</p>
                </div>
                <div class="hidden lg:block">
                    <i class="fas fa-gamepad text-[100px] opacity-10"></i>
                </div>
            </div>

            <h3 class="orbitron text-cyan-400 text-sm font-bold mb-6 flex items-center gap-3 italic">
                <span class="h-[2px] w-10 bg-cyan-400"></span> NEW RELEASES <span class="h-[2px] w-full bg-gray-800"></span>
            </h3>

            <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-4 mb-16"></div>

            <h3 class="orbitron text-purple-400 text-sm font-bold mb-6 flex items-center gap-3 italic">
                <span class="h-[2px] w-10 bg-purple-400"></span> TOP PLAYERS <span class="h-[2px] w-full bg-gray-800"></span>
            </h3>
            <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </main>
    </div>

    <script>
        const gameData = [
            { n: "CYBER-RACER X", i: "https://wallpapercave.com/wp/wp7158145.jpg" },
            { n: "GALACTIC DEFENDER", i: "https://wallpapercave.com/wp/wp5870377.jpg" },
            { n: "PUZZLE MASTER", i: "https://wallpapercave.com/wp/wp10319208.jpg" },
            { n: "PIXEL PUNCHER", i: "https://wallpapercave.com/wp/wp7429107.jpg" }
        ];

        // Data Skor Real (Simulasi setiap game punya record sendiri)
        const records = {
            "CYBER-RACER X": { player: "AAN", score: "145,000" },
            "GALACTIC DEFENDER": { player: "BUDI", score: "92,400" },
            "PUZZLE MASTER": { player: "SAKTI", score: "88,100" },
            "PIXEL PUNCHER": { player: "ZIDAN", score: "75,000" }
        };

        const grid = document.getElementById('arcadeGrid');
        for(let i=0; i<48; i++) {
            const g = gameData[i % gameData.length];
            grid.innerHTML += `
                <div class="arcade-card">
                    <img src="${g.i}" class="w-full h-20 object-cover opacity-80">
                    <div class="p-2 bg-black">
                        <h4 class="text-[8px] font-black orbitron truncate text-white mb-2 uppercase">${g.n}</h4>
                        <button onclick="playGame('${g.n}')" class="play-btn">PLAY NOW</button>
                    </div>
                </div>
            `;
        }

        const scores = [
            { name: "AAN", game: "Cyber Racer X", score: "145,000" },
            { name: "BUDI", game: "Galactic Def", score: "92,400" },
            { name: "SAKTI", game: "Puzzle Master", score: "88,100" }
        ];

        const lBoard = document.getElementById('leaderList');
        scores.forEach(s => {
            lBoard.innerHTML += `
                <div class="bg-black border border-purple-500/30 p-4 rounded-lg flex justify-between items-center shadow-[0_0_10px_rgba(255,0,255,0.1)]">
                    <div>
                        <p class="text-xs font-black orbitron neon-text-purple">${s.name}</p>
                        <p class="text-[8px] text-gray-500 uppercase">${s.game}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black orbitron text-white">${s.score}</p>
                        <p class="text-[8px] text-cyan-400 font-bold">HIGH SCORE</p>
                    </div>
                </div>
            `;
        });

        // FUNGSI POP-UP
        function playGame(gameName) {
            const modal = document.getElementById('gameModal');
            const record = records[gameName] || { player: "NO RECORD", score: "0" };

            document.getElementById('modalGameTitle').innerText = gameName;
            document.getElementById('topPlayerName').innerText = record.player;
            document.getElementById('topPlayerScore').innerText = record.score;

            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById('gameModal').style.display = "none";
        }

        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>

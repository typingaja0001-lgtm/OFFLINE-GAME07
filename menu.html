<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - ARENA FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        
        .arcade-card { 
            background: #000; border: 2px solid #ff00ff; border-radius: 12px; 
            padding: 15px; text-align: center; position: relative; z-index: 10;
        }
        
        /* TOMBOL PLAY (DIPAKSA PALING DEPAN) */
        .play-btn {
            background: #00f2ff; color: black; font-family: 'Orbitron'; 
            font-weight: 900; padding: 10px; width: 100%; border-radius: 6px; 
            margin-top: 12px; cursor: pointer; position: relative; z-index: 50;
            display: block; transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body class="min-h-screen">

    <header class="p-4 px-10 flex justify-between items-center bg-black border-b-2 border-cyan-500 sticky top-0 z-50">
        <h1 class="text-3xl font-black orbitron italic neon-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p id="userNameDisplay" class="text-xs orbitron font-bold neon-purple">PLAYER</p>
                <p id="myTotalScore" class="text-xl orbitron font-bold neon-cyan">0</p>
            </div>
            <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-red-500 text-2xl"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-10">
        <h2 class="text-4xl font-black orbitron italic mb-10">PC <span class="neon-purple">ULTRA</span> LIBRARY</h2>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 mb-20"></div>

        <h3 class="orbitron text-purple-400 text-lg mb-6 italic">GLOBAL RANKING</h3>
        <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </main>

    <script>
        // MASUKKAN KODE FIREBASE BOSKU DI SINI
        const firebaseConfig = { 
            apiKey: "ISI_API_KEY_BOSKU", 
            databaseURL: "https://yokbisayok-db-default-rtdb.firebaseio.com", 
            projectId: "yokbisayok-db" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const activeUser = localStorage.getItem('loginUser') || "USER_1";
        document.getElementById('userNameDisplay').innerText = activeUser;

        // DAFTAR GAME (SAYA BUATKAN 48 SLOT)
        const games = ["SNAKE RETRO", "TETRIS ULTRA", "PAC-MAN NEO", "SPACE INVADERS", "GALAXY SHOOTER", "BRICK BREAKER"];
        for(let i=7; i<=48; i++) { games.push("ARCADE GAME #" + i); }

        const grid = document.getElementById('arcadeGrid');
        games.forEach(name => {
            grid.innerHTML += `
                <div class="arcade-card">
                    <i class="fas fa-gamepad text-3xl text-gray-700 mb-2"></i>
                    <p class="text-[10px] font-black orbitron text-white uppercase mb-2">${name}</p>
                    <button onclick="goPlay('${name}')" class="play-btn">PLAY NOW</button>
                </div>`;
        });

        // FUNGSI PINDAH HALAMAN (WAJIB ADA)
        function goPlay(name) {
            console.log("Klik: " + name);
            if(name === "SNAKE RETRO") {
                // ARAHKAN KE FILE snake.html
                window.location.href = "snake.html";
            } else {
                alert("Game " + name + " belum ada isinya, Bosku!");
            }
        }

        // AMBIL DATA LEADERBOARD
        db.ref('leaderboard').orderByChild('score').on('value', snap => {
            const list = document.getElementById('leaderList');
            let data = [];
            snap.forEach(c => { 
                data.push(c.val());
                if(c.val().name === activeUser) document.getElementById('myTotalScore').innerText = c.val().score.toLocaleString();
            });
            list.innerHTML = "";
            data.reverse().slice(0, 12).forEach((p, idx) => {
                list.innerHTML += `
                    <div class="bg-black border border-purple-500/30 p-4 rounded-lg flex justify-between items-center">
                        <span class="orbitron font-bold ${idx < 3 ? 'text-yellow-500' : 'text-gray-500'}">${idx+1}</span>
                        <p class="text-xs orbitron uppercase">${p.name}</p>
                        <p class="text-xs orbitron neon-cyan">${p.score.toLocaleString()}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>

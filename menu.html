<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - OFFICIAL ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        
        body { 
            background: #050112; color: white; font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a0b3c 0%, #050112 100%);
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        
        /* CARD GAME */
        .arcade-card { 
            background: rgba(0,0,0,0.8); border: 2px solid #ff00ff; border-radius: 12px; 
            padding: 15px; transition: 0.3s; position: relative; overflow: hidden;
        }
        .arcade-card:hover { border-color: #00f2ff; transform: translateY(-5px); box-shadow: 0 0 20px #00f2ff55; }
        
        /* TOMBOL PLAY */
        .play-btn {
            background: linear-gradient(90deg, #00f2ff, #0066ff); color: black;
            font-family: 'Orbitron'; font-weight: 900; font-size: 10px;
            padding: 10px; width: 100%; border-radius: 6px; margin-top: 12px;
            transition: 0.2s; cursor: pointer; text-transform: uppercase;
        }
        .play-btn:hover { filter: brightness(1.3); transform: scale(1.02); }

        /* MODAL POPUP */
        #gameModal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-box { 
            background: #0d0221; border: 3px solid #ff00ff; padding: 35px; 
            border-radius: 25px; text-align: center; max-width: 380px; width: 90%;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
        }

        /* RANKING COLORS */
        .rank-1 { color: #ffd700; text-shadow: 0 0 15px #ffd700; }
        .rank-2 { color: #c0c0c0; text-shadow: 0 0 15px #c0c0c0; }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 15px #cd7f32; }
    </style>
</head>
<body class="min-h-screen">

    <div id="gameModal">
        <div class="modal-box">
            <i class="fas fa-trophy text-5xl text-yellow-500 mb-4"></i>
            <h2 id="modalGameTitle" class="orbitron text-2xl neon-cyan mb-2 uppercase italic">GAME NAME</h2>
            <p class="text-[10px] text-gray-500 tracking-[4px] mb-6">GLOBAL RECORD HOLDER</p>
            
            <div class="bg-black/60 border border-purple-500/40 p-6 rounded-2xl mb-8">
                <p id="topPlayerName" class="orbitron text-xl neon-purple uppercase tracking-widest">---</p>
                <p id="topPlayerScore" class="text-4xl font-black text-white mt-2">0</p>
                <p class="text-[9px] text-cyan-400 font-bold uppercase mt-1">Total Points</p>
            </div>

            <button onclick="closeModal()" class="w-full bg-white text-black py-3 rounded-lg orbitron font-bold hover:bg-cyan-400 transition">START SESSION</button>
        </div>
    </div>

    <header class="p-4 px-10 flex justify-between items-center bg-black border-b-2 border-cyan-500 sticky top-0 z-50">
        <h1 class="text-3xl font-black orbitron italic neon-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-8">
            <div class="text-right border-r border-gray-800 pr-6">
                <p id="userNameDisplay" class="text-xs orbitron font-bold neon-purple uppercase">---</p>
                <p class="text-[9px] text-gray-500 font-bold uppercase">Player Active</p>
            </div>
            <div class="text-right">
                <p id="myTotalScore" class="text-2xl orbitron font-bold neon-cyan">0</p>
                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-tighter">Your Global Points</p>
            </div>
            <button onclick="logout()" class="text-red-500 text-2xl hover:scale-110 transition ml-4"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-8 lg:p-12">
        <div class="mb-12">
            <h2 class="text-5xl font-black orbitron italic text-white uppercase leading-none">PC <span class="neon-purple">ULTRA</span> LIBRARY</h2>
            <p class="text-[10px] text-gray-500 tracking-[5px] mt-2 font-bold uppercase italic">V25.0 Database Online Connected</p>
        </div>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-6 mb-24"></div>

        <h3 class="orbitron text-purple-400 text-lg font-bold mb-8 italic uppercase flex items-center gap-4">
            <span class="h-[1px] w-12 bg-purple-500"></span> Global Hall of Fame <span class="h-[1px] w-full bg-gray-800"></span>
        </h3>
        <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // 1. DAFTAR GAME
        const games = [
            "SNAKE RETRO", "TETRIS ULTRA", "PAC-MAN NEO", "SPACE INVADERS", "GALAXY SHOOTER", "BRICK BREAKER",
            "MOTO RACING", "STREET FIGHTER", "BOBBLE PUZZLE", "ZOMBIE SLAYER", "PINBALL NEON", "TANK WARS",
            "CHESS PRO", "SUDOKU GOLD", "FRUIT SLICE", "ANGRY BIRDS", "FLAPPY BIRD", "SUBWAY SURF",
            "TEMPLE RUN", "CANDY CRUSH", "MINECRAFT 2D", "AMONG US", "DOTA MINI", "CS GO 2D",
            "PUBG PIXEL", "ROBLOX MINI", "SONIC RUN", "MARIO BROS", "POKEMON GO", "FIFA 2026",
            "NBA JAM", "F1 RACING", "CRASH BANDICOOT", "SPIDER-MAN", "BATMAN ARKHAM", "IRON MAN FLY",
            "GOD OF WAR", "TEKKEN 8", "MORTAL KOMBAT", "GTA 6 LITE", "VALORANT 2D", "CYBERPUNK",
            "ELDEN RING", "WITCHER 3", "FORZA HORIZON", "NEED FOR SPEED", "ASPHALT 9", "TEBAK KATA"
        ];

        // 2. FIREBASE CONFIG (GANTI DENGAN PUNYA BOSKU)
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_BOSKU",
            databaseURL: "https://yokbisayok-db-default-rtdb.firebaseio.com",
            projectId: "yokbisayok-db",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const activeUser = localStorage.getItem('loginUser') || "GUEST_USER";
        document.getElementById('userNameDisplay').innerText = activeUser;

        // 3. RENDER GRID GAME
        const grid = document.getElementById('arcadeGrid');
        games.forEach((name) => {
            grid.innerHTML += `
                <div class="arcade-card">
                    <div class="h-20 bg-gray-900/50 flex items-center justify-center rounded-lg border-b border-purple-500/20 mb-3">
                        <i class="fas fa-gamepad text-gray-700 text-3xl"></i>
                    </div>
                    <p class="text-[10px] font-black orbitron text-center text-white truncate uppercase">${name}</p>
                    <button onclick="handlePlay('${name}')" class="play-btn">Play Now</button>
                </div>
            `;
        });

        // 4. LOGIC PLAY & UPDATE DATABASE
        function handlePlay(gameName) {
            const userRef = db.ref('leaderboard/' + activeUser.toLowerCase());
            const gameRecordRef = db.ref('game_records/' + gameName.replace(/ /g, "_"));

            // Tambah skor user global
            userRef.once('value').then(snap => {
                let current = snap.val();
                let newTotal = current ? current.score + 1000 : 1000;
                userRef.set({ name: activeUser, score: newTotal });
            });

            // Cek rekor tertinggi di game ini
            gameRecordRef.once('value').then(snap => {
                let rec = snap.val();
                
                // Jika rekor kosong, isi dengan pemain sekarang
                if(!rec) {
                    gameRecordRef.set({ name: activeUser, score: 1000 });
                }

                // Tampilkan Popup
                document.getElementById('modalGameTitle').innerText = gameName;
                document.getElementById('topPlayerName').innerText = rec ? rec.name : activeUser;
                document.getElementById('topPlayerScore').innerText = (rec ? rec.score : 1000).toLocaleString();
                document.getElementById('gameModal').style.display = 'flex';
            });
        }

        // 5. REAL-TIME LEADERBOARD LISTENER
        db.ref('leaderboard').orderByChild('score').on('value', snap => {
            const list = document.getElementById('leaderList');
            let players = [];
            
            snap.forEach(child => { 
                let p = child.val();
                players.push(p);
                if(p.name.toLowerCase() === activeUser.toLowerCase()) {
                    document.getElementById('myTotalScore').innerText = p.score.toLocaleString();
                }
            });

            list.innerHTML = "";
            players.reverse().slice(0, 12).forEach((p, idx) => {
                let rankStyle = "";
                let icon = `<span class="text-gray-600 font-black mr-3">${idx+1}</span>`;
                
                if(idx === 0) { rankStyle = "rank-1"; icon = `<i class="fas fa-crown rank-1 mr-2"></i>`; }
                else if(idx === 1) { rankStyle = "rank-2"; icon = `<i class="fas fa-medal rank-2 mr-2"></i>`; }
                else if(idx === 2) { rankStyle = "rank-3"; icon = `<i class="fas fa-medal rank-3 mr-2"></i>`; }

                list.innerHTML += `
                    <div class="bg-black/60 border border-purple-500/20 p-4 rounded-xl flex justify-between items-center shadow-lg">
                        <div class="flex items-center">
                            ${icon}
                            <div>
                                <p class="text-xs font-black orbitron uppercase ${rankStyle || 'text-white'}">${p.name}</p>
                                <p class="text-[8px] text-gray-500 font-bold">TOP ${idx+1} GLOBAL</p>
                            </div>
                        </div>
                        <p class="text-sm font-black orbitron neon-cyan">${p.score.toLocaleString()}</p>
                    </div>`;
            });
        });

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>

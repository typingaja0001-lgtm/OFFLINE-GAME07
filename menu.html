<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - ARENA FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        
        /* CSS POPUP - DIPAKSA MUNCUL */
        #gameModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(15px);
        }
        .modal-active { display: flex !important; }

        /* CARD GAME */
        .arcade-card { 
            background: #111; 
            border: 2px solid #ff00ff; 
            border-radius: 10px; 
            padding: 10px;
            text-align: center;
        }
        .play-btn {
            background: #00f2ff;
            color: black;
            font-family: 'Orbitron';
            font-weight: 900;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 10px;
            display: block;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="gameModal">
        <div class="bg-[#0d0221] border-2 border-[#ff00ff] p-10 rounded-2xl text-center max-w-sm w-full shadow-[0_0_50px_#ff00ff]">
            <i class="fas fa-crown text-5xl text-yellow-500 mb-4"></i>
            <h2 id="modalGameTitle" class="orbitron text-2xl neon-cyan mb-2">GAME NAME</h2>
            <div class="bg-black p-4 rounded-xl border border-purple-500/50 mb-6">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Top Player</p>
                <p id="topPlayerName" class="orbitron text-xl neon-purple uppercase">NO DATA</p>
                <p id="topPlayerScore" class="text-3xl font-black text-white mt-1">0</p>
            </div>
            <button onclick="closeModal()" class="w-full bg-white text-black py-3 rounded-lg orbitron font-bold">START SESSION</button>
        </div>
    </div>

    <header class="p-4 px-10 flex justify-between items-center bg-black border-b-2 border-cyan-500">
        <h1 class="text-3xl font-black orbitron italic neon-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-10">
            <div class="text-right">
                <p id="userNameDisplay" class="text-sm orbitron font-bold neon-purple uppercase">---</p>
                <p id="myTotalScore" class="text-xl orbitron font-bold neon-cyan">0</p>
            </div>
            <button onclick="logout()" class="text-red-500 text-2xl"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-10">
        <h2 class="text-4xl font-black orbitron italic mb-10 text-white uppercase italic">PC ULTRA LIBRARY</h2>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 mb-20"></div>

        <h3 class="orbitron text-purple-400 text-lg mb-6 italic">GLOBAL LEADERBOARD</h3>
        <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </main>

    <script>
        // 1. FIREBASE (GANTI DENGAN KODE ASLI BOSKU)
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_BOSKU",
            databaseURL: "https://yokbisayok-db-default-rtdb.firebaseio.com",
            projectId: "yokbisayok-db",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const activeUser = localStorage.getItem('loginUser') || "USER";
        document.getElementById('userNameDisplay').innerText = activeUser;

        // 2. RENDER GAME DENGAN TEKS PUTIH TERANG
        const grid = document.getElementById('arcadeGrid');
        for(let i=1; i<=48; i++) {
            const gameName = `ARCADE GAME #${i}`;
            grid.innerHTML += `
                <div class="arcade-card">
                    <i class="fas fa-gamepad text-4xl text-gray-700 mb-2"></i>
                    <p class="text-[11px] font-black orbitron text-white uppercase block mb-2">${gameName}</p>
                    <button onclick="handlePlay('${gameName}')" class="play-btn">PLAY NOW</button>
                </div>
            `;
        }

        // 3. FUNGSI PLAY & MODAL
        function handlePlay(gName) {
            const modal = document.getElementById('gameModal');
            const userRef = db.ref('leaderboard/' + activeUser.toLowerCase());
            const gameRef = db.ref('game_records/' + gName.replace(/ /g, "_"));

            // Tambah Skor User
            userRef.once('value').then(snap => {
                let score = snap.val() ? snap.val().score + 500 : 500;
                userRef.set({ name: activeUser, score: score });
            });

            // Cek Rekor Game
            gameRef.once('value').then(snap => {
                let rec = snap.val();
                document.getElementById('modalGameTitle').innerText = gName;
                document.getElementById('topPlayerName').innerText = rec ? rec.name : activeUser;
                document.getElementById('topPlayerScore').innerText = rec ? rec.score : "500";
                
                // Munculkan Pop-up
                modal.classList.add('modal-active');
            });
        }

        // 4. LEADERBOARD LISTENER
        db.ref('leaderboard').orderByChild('score').on('value', snap => {
            const list = document.getElementById('leaderList');
            let data = [];
            snap.forEach(c => { 
                let p = c.val();
                data.push(p);
                if(p.name.toLowerCase() === activeUser.toLowerCase()) {
                    document.getElementById('myTotalScore').innerText = p.score.toLocaleString();
                }
            });
            list.innerHTML = "";
            data.reverse().slice(0, 10).forEach((p, idx) => {
                list.innerHTML += `
                    <div class="bg-black border border-purple-500/50 p-4 rounded-lg flex justify-between items-center">
                        <span class="orbitron font-bold text-purple-500">${idx+1}</span>
                        <p class="text-xs orbitron uppercase text-white">${p.name}</p>
                        <p class="text-xs orbitron neon-cyan">${p.score.toLocaleString()}</p>
                    </div>`;
            });
        });

        function closeModal() { document.getElementById('gameModal').classList.remove('modal-active'); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>

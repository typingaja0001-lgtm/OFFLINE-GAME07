<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - FIX NEON LOBBY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
        
        body { 
            background: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* NEON TEXT SUPER TERANG */
        .neon-text-cyan {
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff, 0 0 40px #00f2ff;
        }

        /* CARD SYSTEM FIX - AGAR MIRIP GAMBAR CONTOH */
        .game-card {
            background: #0b1120; border-radius: 12px; overflow: hidden; 
            transition: 0.3s; border: 2px solid #1e293b; 
            cursor: pointer; position: relative;
        }
        
        /* HOVER: NEON KARTU MENYALA GAHAR */
        .game-card:hover { 
            transform: translateY(-8px); 
            border-color: #00f2ff; 
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.7); 
        }

        /* IMAGE STYLING - FIX GAMBAR KOSONG */
        .game-img { 
            width: 100%; height: 140px; object-fit: cover; 
            border-bottom: 2px solid #1e293b;
        }
        .game-card:hover .game-img { border-bottom-color: #00f2ff; }

        /* BANNER HEADER MIRIP CONTOH */
        .neon-banner {
            background: linear-gradient(90deg, #0f172a 0%, #000 50%, #0f172a 100%);
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="p-4 px-8 flex justify-between items-center border-b border-cyan-500/30 bg-black/80 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-black orbitron italic neon-text-cyan">YOKBISAYOK</h1>
        </div>
        <div class="flex items-center gap-4 text-xs orbitron">
            <div class="text-right">
                <p class="text-white">AAN</p>
                <p class="text-cyan-400 text-[10px]">RANK: ELITE</p>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition text-xl">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        
        <div class="neon-banner p-10 rounded-2xl mb-10 text-center md:text-left relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-4xl md:text-5xl font-black orbitron italic mb-2 tracking-tighter uppercase">
                    PC <span class="text-cyan-400">ULTRA</span> LIBRARY
                </h2>
                <p class="text-gray-400 text-sm max-w-lg mb-6">Library game PC terbaik tanpa internet. Optimasi performa sistem v8.0 untuk grafis 4K.</p>
                <button class="bg-cyan-500 text-black px-10 py-2.5 rounded-full text-xs font-black orbitron shadow-[0_0_15px_#00f2ff] hover:bg-white transition">EXPLORE ALL</button>
            </div>
        </div>

        <div class="relative mb-12 max-w-2xl mx-auto">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-cyan-500"></i>
            <input type="text" placeholder="Cari Game PC OFFLINE..." class="w-full bg-black border border-cyan-500/30 p-4 pl-14 rounded-full focus:border-cyan-400 outline-none transition text-sm orbitron text-white">
        </div>

        <div id="menuGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
            </div>

    </main>

    <script>
        // Pakai URL gambar dari Source yang lebih stabil
        const games = [
            { id: 1, name: "CYBER SNAKE", cat: "Arcade", img: "https://images.pexels.com/photos/163036/mario-luigi-yoshi-figures-163036.jpeg?auto=compress&w=400" },
            { id: 2, name: "MOTO RACER", cat: "Racing", img: "https://images.pexels.com/photos/2116475/pexels-photo-2116475.jpeg?auto=compress&w=400" },
            { id: 3, name: "STARFIELD WAR", cat: "Shooter", img: "https://images.pexels.com/photos/1205301/pexels-photo-1205301.jpeg?auto=compress&w=400" },
            { id: 4, name: "DEAD TARGET", cat: "Action", img: "https://images.pexels.com/photos/15174526/pexels-photo-15174526/free-photo-of-zombie-in-forest.jpeg?auto=compress&w=400" },
            { id: 5, name: "NIGHT DRIFT", cat: "Racing", img: "https://images.pexels.com/photos/3136673/pexels-photo-3136673.jpeg?auto=compress&w=400" },
            { id: 6, name: "WAR TANK", cat: "War", img: "https://images.pexels.com/photos/7010344/pexels-photo-7010344.jpeg?auto=compress&w=400" },
            { id: 7, name: "PRO CHESS", cat: "Strategy", img: "https://images.pexels.com/photos/1015568/pexels-photo-1015568.jpeg?auto=compress&w=400" },
            { id: 8, name: "UFC FIGHT", cat: "Fighting", img: "https://images.pexels.com/photos/4761779/pexels-photo-4761779.jpeg?auto=compress&w=400" },
            { id: 9, name: "8 BALL POOL", cat: "Sport", img: "https://images.pexels.com/photos/1573352/pexels-photo-1573352.jpeg?auto=compress&w=400" },
            { id: 10, name: "NEON JUMPER", cat: "Arcade", img: "https://images.pexels.com/photos/131616/pexels-photo-131616.jpeg?auto=compress&w=400" }
        ];

        const grid = document.getElementById("menuGrid");
        games.forEach(g => {
            grid.innerHTML += `
                <div class="game-card" onclick="alert('Playing ${g.name}')">
                    <img src="${g.img}" class="game-img" onerror="this.src='https://via.placeholder.com/300x150/000000/00f2ff?text=IMAGE+ERROR'">
                    <div class="p-4 bg-black/60">
                        <p class="text-[10px] text-cyan-400 font-bold orbitron mb-1 tracking-tighter">${g.cat.toUpperCase()}</p>
                        <h4 class="font-bold text-xs orbitron text-white truncate">${g.name}</h4>
                        <div class="mt-3 flex items-center gap-2">
                             <div class="h-1 w-full bg-slate-800 rounded-full overflow-hidden">
                                <div class="h-full bg-cyan-500 shadow-[0_0_10px_#00f2ff]" style="width: 80%"></div>
                             </div>
                             <span class="text-[9px] text-yellow-500 font-bold italic">4.9</span>
                        </div>
                    </div>
                </div>
            `;
        });

        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - MEMBER LOBBY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-text { text-shadow: 0 0 10px #00f2ff; color: #00f2ff; }

        /* KARTU GAME VERSI MENU UTAMA */
        .game-card {
            background: #0f172a; border-radius: 12px; overflow: hidden; transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; position: relative;
        }
        .game-card:hover { transform: scale(1.05); border-color: #bc13fe; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }
        
        .game-img { width: 100%; height: 120px; object-fit: cover; filter: brightness(0.6); }
        .game-card:hover .game-img { filter: brightness(1); }

        .play-btn {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: #bc13fe; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
        }
        .game-card:hover .play-btn { opacity: 1; top: 35%; }

        /* KATEGORI SCROLL */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="p-4 px-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-slate-950/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-bolt text-cyan-400 text-xl"></i>
            <h1 class="text-xl font-black orbitron italic neon-text">YOKBISAYOK</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="bg-white/5 px-4 py-1 rounded-full border border-white/10 flex items-center gap-3">
                <i class="fas fa-coins text-yellow-500 text-xs"></i>
                <span id="userBalance" class="text-xs font-bold orbitron">1,000</span>
            </div>
            <div class="text-right hidden sm:block">
                <p id="userName" class="text-xs font-bold orbitron text-purple-400">PLAYER</p>
            </div>
            <button onclick="logout()" class="text-gray-500 hover:text-red-500 transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        
        <div class="mb-8">
            <h2 class="text-3xl font-black orbitron italic mb-1 uppercase tracking-tighter">Selamat Datang, <span id="welcomeName" class="text-cyan-400">Gamer</span>!</h2>
            <p class="text-gray-500 text-sm">Pilih game favoritmu dan mulai kumpulkan skor tertinggi hari ini.</p>
        </div>

        <div class="flex gap-2 mb-8 overflow-x-auto no-scrollbar pb-2">
            <button class="bg-cyan-500 text-black px-5 py-1.5 rounded-lg text-xs font-black orbitron">SEMUA GAME</button>
            <button class="bg-slate-800 px-5 py-1.5 rounded-lg text-xs font-bold orbitron hover:bg-slate-700 transition">ARCADE</button>
            <button class="bg-slate-800 px-5 py-1.5 rounded-lg text-xs font-bold orbitron hover:bg-slate-700 transition">ACTION</button>
            <button class="bg-slate-800 px-5 py-1.5 rounded-lg text-xs font-bold orbitron hover:bg-slate-700 transition">RACING</button>
            <button class="bg-slate-800 px-5 py-1.5 rounded-lg text-xs font-bold orbitron hover:bg-slate-700 transition">PUZZLE</button>
        </div>

        <div class="relative mb-8">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" placeholder="Cari Game..." class="w-full bg-slate-900/50 border border-white/10 p-3 pl-12 rounded-xl focus:border-cyan-400 outline-none transition text-sm">
        </div>

        <div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>

    </main>

    <script>
        // DATA GAME LENGKAP
        const games = [
            { id: "snake", name: "Neon Snake", cat: "ARCADE", img: "snake" },
            { id: "motor", name: "Cyber Moto", cat: "RACING", img: "motorcycle" },
            { id: "brick", name: "Brick Break", cat: "ACTION", img: "breakout" },
            { id: "space", name: "Space War", cat: "SHOOTER", img: "galaxy" },
            { id: "memory", name: "Brain Match", cat: "BRAIN", img: "brain" },
            { id: "tetris", name: "Tetris Neo", cat: "PUZZLE", img: "blocks" },
            { id: "box", name: "Boxing Glow", cat: "FIGHT", img: "boxing" },
            { id: "kick", name: "Penalty Kick", cat: "SPORT", img: "soccer" },
            { id: "dino", name: "Dino Run", cat: "ARCADE", img: "dinosaur" },
            { id: "tank", name: "Neon Tank", cat: "WAR", img: "tank" },
            { id: "sudoku", name: "Sudoku Lite", cat: "MATH", img: "numbers" },
            { id: "drift", name: "Fast Drift", cat: "RACING", img: "racing" },
            { id: "ping", name: "Ping Pong", cat: "SPORT", img: "pingpong" },
            { id: "ttt", name: "Tic Tac Toe", cat: "LOGIC", img: "neon" },
            { id: "gold", name: "Gold Miner", cat: "CASUAL", img: "gold" },
            { id: "arch", name: "Cyber Archer", cat: "ACTION", img: "archery" },
            { id: "jewel", name: "Jewel Match", cat: "PUZZLE", img: "jewels" },
            { id: "jump", name: "Neon Jump", cat: "ARCADE", img: "jumping" },
            { id: "pool", name: "Pool 8 Ball", cat: "SPORT", img: "billiards" },
            { id: "piano", name: "Piano Tiles", cat: "MUSIC", img: "piano" },
            { id: "bird", name: "Angry Bird", cat: "ACTION", img: "bird" },
            { id: "card", name: "Solitaire", cat: "CARD", img: "poker" },
            { id: "dice", name: "Ludo King", cat: "BOARD", img: "dice" },
            { id: "fruit", name: "Fruit Ninja", cat: "ACTION", img: "fruit" },
            { id: "chess", name: "Chess Pro", cat: "STRATEGY", img: "chess" },
            { id: "run", name: "Subway Neon", cat: "RUNNER", img: "running" },
            { id: "bubble", name: "Bubble Pop", cat: "PUZZLE", img: "bubbles" },
            { id: "pin", name: "Pinball Glow", cat: "ARCADE", img: "pinball" },
            { id: "hockey", name: "Air Hockey", cat: "SPORT", img: "hockey" },
            { id: "doodle", name: "Doodle Jump", cat: "CASUAL", img: "scribble" },
            { id: "park", name: "Car Parking", cat: "SIMULATOR", img: "parking" },
            { id: "tower", name: "Tower Stack", cat: "LOGIC", img: "skyscraper" },
            { id: "zombie", name: "Zombie Smash", cat: "HORROR", img: "zombie" },
            { id: "fish", name: "Fishing Hook", cat: "CASUAL", img: "fishing" },
            { id: "knife", name: "Knife Hit", cat: "ACTION", img: "knife" },
            { id: "bowl", name: "Bowling Glow", cat: "SPORT", img: "bowling" }
        ];

        // CEK LOGIN
        const loggedUser = localStorage.getItem("loginUser");
        if(!loggedUser) {
            window.location.href = "index.html"; // Tendang balik ke login jika belum login
        } else {
            document.getElementById("userName").innerText = loggedUser.toUpperCase();
            document.getElementById("welcomeName").innerText = loggedUser;
        }

        // TAMPILKAN GAME
        const grid = document.getElementById("menuGrid");
        games.forEach(g => {
            const card = document.createElement("div");
            card.className = "game-card";
            
            // Gambar otomatis pakai Source Unsplash
            const imgUrl = `https://source.unsplash.com/300x200/?gaming,${g.img}`;
            
            card.onclick = () => {
                // Gunakan loading.html sesuai parameter game
                window.location.href = `loading.html?game=${g.id}`;
            };

            card.innerHTML = `
                <img src="${imgUrl}" class="game-img" alt="${g.name}" onerror="this.src='https://via.placeholder.com/300x200/0f172a/00f2ff?text=${g.name}'">
                <div class="play-btn shadow-lg shadow-purple-500/50">
                    <i class="fas fa-play text-white text-xs"></i>
                </div>
                <div class="p-3">
                    <p class="text-[8px] text-cyan-400 font-bold orbitron mb-0.5 tracking-widest">${g.cat}</p>
                    <h4 class="font-bold text-[11px] truncate uppercase orbitron">${g.name}</h4>
                </div>
            `;
            grid.appendChild(card);
        });

        function logout() {
            localStorage.removeItem("loginUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - ULTIMATE ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        
        body { 
            background: #050112; color: white; font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(rgba(18, 10, 41, 0.9), rgba(5, 1, 18, 0.95)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        .neon-text-purple { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        .neon-text-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
        
        .sidebar-nav {
            background: rgba(0, 0, 0, 0.6);
            border-right: 2px solid #00f2ff;
            box-shadow: 5px 0 15px rgba(0, 242, 255, 0.2);
        }

        .arcade-card {
            background: #000; border: 2px solid #ff00ff; border-radius: 8px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .arcade-card:hover { 
            transform: scale(1.05); border-color: #00f2ff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5); 
        }
        .play-btn {
            background: #00f2ff; color: #000; font-family: 'Orbitron';
            font-size: 8px; font-weight: 900; padding: 4px 0; width: 100%;
            display: block; text-align: center;
        }

        /* MODAL POP-UP */
        #gameModal {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #0d0221; border: 3px solid #ff00ff;
            padding: 40px; border-radius: 20px; text-align: center;
            max-width: 400px; width: 90%; animation: modalZoom 0.3s ease-out;
        }
        @keyframes modalZoom { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="gameModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <i class="fas fa-trophy text-5xl text-yellow-500 mb-4"></i>
            <h2 id="modalGameTitle" class="orbitron text-2xl neon-text-cyan mb-2 uppercase italic">GAME TITLE</h2>
            <p class="text-gray-400 text-[10px] tracking-[4px] mb-6 uppercase">Current Record Holder</p>
            
            <div class="bg-black/50 border border-purple-500/50 p-6 rounded-xl mb-8">
                <p id="topPlayerName" class="orbitron text-xl neon-text-purple uppercase tracking-widest">NO DATA</p>
                <p id="topPlayerScore" class="text-4xl font-black text-white mt-2">0</p>
                <p class="text-[9px] text-cyan-400 font-bold uppercase mt-1">Total Points</p>
            </div>

            <button onclick="closeModal()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-3 rounded-lg orbitron font-bold hover:brightness-125 transition">START SESSION</button>
        </div>
    </div>

    <header class="p-4 px-8 flex justify-between items-center bg-black border-b-2 border-cyan-500 sticky top-0 z-50">
        <h1 class="text-3xl font-black orbitron italic neon-text-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest">Active Player</p>
                <p id="userNameDisplay" class="text-sm orbitron font-bold neon-text-purple">---</p>
            </div>
            <button onclick="logout()" class="text-red-500 text-2xl hover:scale-110 transition"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <div class="flex flex-1">
        <aside class="w-20 lg:w-32 sidebar-nav flex flex-col items-center py-10 gap-10 sticky top-[72px] h-[calc(100vh-72px)]">
            <div class="text-center group cursor-pointer opacity-50 hover:opacity-100 transition">
                <i class="fas fa-swords text-2xl mb-2 text-purple-500"></i>
                <p class="text-[8px] orbitron font-bold uppercase">Action</p>
            </div>
            <div class="text-center group cursor-pointer opacity-50 hover:opacity-100 transition">
                <i class="fas fa-car text-2xl mb-2 text-cyan-500"></i>
                <p class="text-[8px] orbitron font-bold uppercase">Racing</p>
            </div>
            <div class="text-center group cursor-pointer opacity-50 hover:opacity-100 transition">
                <i class="fas fa-puzzle-piece text-2xl mb-2 text-purple-500"></i>
                <p class="text-[8px] orbitron font-bold uppercase">Puzzle</p>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-10">
            <div class="mb-10">
                <h2 class="text-5xl font-black orbitron italic text-white uppercase leading-none mb-2">
                    PC <span class="neon-text-purple">ULTRA</span> LIBRARY
                </h2>
                <p class="text-[10px] text-gray-500 tracking-[5px] font-bold uppercase">48+ Games Offline • High Performance V2026</p>
            </div>

            <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-4 mb-20"></div>

            <h3 class="orbitron text-purple-400 text-sm font-bold mb-6 flex items-center gap-3 italic">
                <span class="h-[1px] w-12 bg-purple-500"></span> TOP PLAYERS LEADERBOARD <span class="h-[1px] w-full bg-white/10"></span>
            </h3>
            <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                </div>
        </main>
    </div>

    <script>
        // Ambil nama dari login (Jika kosong, redirect ke login)
        const activeUser = localStorage.getItem('loginUser');
        if(!activeUser) { window.location.href = "index.html"; }
        document.getElementById('userNameDisplay').innerText = activeUser.toUpperCase();

        // Database Kosong (Real-time di LocalStorage)
        let arcadeDatabase = JSON.parse(localStorage.getItem('game_database')) || [];

        // Render 48 Game (Kosong Nama, Hanya ID)
        const grid = document.getElementById('arcadeGrid');
        for(let i=1; i<=48; i++) {
            grid.innerHTML += `
                <div class="arcade-card">
                    <div class="w-full h-20 bg-gray-900 flex items-center justify-center border-b border-purple-500/20">
                        <i class="fas fa-gamepad text-gray-800 text-3xl"></i>
                    </div>
                    <div class="p-2 bg-black">
                        <h4 class="text-[8px] font-black orbitron text-white mb-2 uppercase">ARCADE GAME #${i}</h4>
                        <button onclick="handlePlay('ARCADE GAME #${i}')" class="play-btn">PLAY NOW</button>
                    </div>
                </div>
            `;
        }

        function renderLeaderboard() {
            const list = document.getElementById('leaderList');
            list.innerHTML = "";
            
            if(arcadeDatabase.length === 0) {
                list.innerHTML = `<p class="text-gray-600 italic text-xs uppercase tracking-widest col-span-3">No active players yet...</p>`;
                return;
            }

            // Urutkan Skor Tertinggi
            arcadeDatabase.sort((a, b) => b.score - a.score);

            arcadeDatabase.forEach(p => {
                list.innerHTML += `
                    <div class="bg-black border border-purple-500/30 p-4 rounded-lg flex justify-between items-center">
                        <div>
                            <p class="text-xs font-black orbitron neon-text-purple uppercase">${p.name}</p>
                            <p class="text-[8px] text-gray-500 uppercase tracking-tighter">Last Play: ${p.game}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black orbitron text-white">${p.score.toLocaleString()}</p>
                            <p class="text-[8px] text-cyan-400 font-bold uppercase">Points</p>
                        </div>
                    </div>
                `;
            });
        }

        function handlePlay(gameTitle) {
            // Cari data user di database
            let userIdx = arcadeDatabase.findIndex(x => x.name === activeUser);
            
            if(userIdx === -1) {
                // Jika user baru, tambahkan ke list
                arcadeDatabase.push({ name: activeUser, game: gameTitle, score: 500 });
            } else {
                // Jika user lama, update game dan tambah skor sedikit
                arcadeDatabase[userIdx].game = gameTitle;
                arcadeDatabase[userIdx].score += 250;
            }

            // Simpan ke memori browser
            localStorage.setItem('game_database', JSON.stringify(arcadeDatabase));
            
            // Munculkan Pop-up Leaderboard
            const record = arcadeDatabase[userIdx === -1 ? arcadeDatabase.length - 1 : userIdx];
            document.getElementById('modalGameTitle').innerText = gameTitle;
            document.getElementById('topPlayerName').innerText = record.name;
            document.getElementById('topPlayerScore').innerText = record.score.toLocaleString();
            document.getElementById('gameModal').style.display = "flex";

            renderLeaderboard();
        }

        function closeModal() { document.getElementById('gameModal').style.display = "none"; }
        function logout() { localStorage.removeItem('loginUser'); window.location.href = "index.html"; }

        // Jalankan render awal
        renderLeaderboard();
    </script>
</body>
</html>

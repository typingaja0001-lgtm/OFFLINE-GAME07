<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - MEGA NEON ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap');
        
        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --pink: #ff0055;
        }

        body { 
            background: #02010a; color: white; font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden; background-attachment: fixed;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.1) 0%, transparent 80%);
            z-index: -2;
        }

        /* CARD STYLE PREMIUM */
        .arcade-card {
            background: rgba(20, 10, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px; border: 1px solid rgba(188, 19, 254, 0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .arcade-card:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 0 30px var(--cyan);
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-play-ultra {
            background: linear-gradient(45deg, var(--cyan), #008891);
            color: #000; font-family: 'Orbitron'; font-weight: 900;
            padding: 10px; border-radius: 8px; font-size: 10px;
            box-shadow: 0 0 15px var(--cyan); transition: 0.3s; width: 100%;
        }

        .btn-play-ultra:hover { background: #fff; box-shadow: 0 0 25px #fff; transform: scale(1.05); }

        #gameModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }

        .modal-box {
            background: #050112; border: 3px solid var(--purple);
            padding: 40px; border-radius: 30px; text-align: center;
            width: 95%; max-width: 500px; box-shadow: 0 0 60px var(--purple);
        }
        
        .score-badge {
            background: rgba(0,0,0,0.5); border: 1px solid var(--cyan);
            padding: 2px 6px; border-radius: 4px; color: var(--cyan); font-size: 10px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <header class="p-6 px-10 bg-black/80 backdrop-blur-md border-b-2 border-purple-600 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-black orbitron italic text-white tracking-tighter uppercase">YOKBI<span class="text-[var(--cyan)]">SAYOK</span></h1>
            <p class="text-[9px] orbitron text-purple-400 tracking-[6px] animate-pulse uppercase">Arena System v.4.0</p>
        </div>
        
        <div class="flex items-center gap-8">
            <div class="text-right">
                <p id="userNameDisplay" class="text-xs orbitron font-bold text-gray-400 uppercase">---</p>
                <div class="flex items-center gap-2 justify-end">
                    <i class="fas fa-bolt text-cyan-500"></i>
                    <p class="text-2xl font-black orbitron text-[var(--cyan)]" id="myTotalScore">0</p>
                </div>
            </div>
            <button onclick="logout()" class="w-12 h-12 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center border border-red-600/50">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </header>

    <main class="p-8 lg:p-12 max-w-[1900px] mx-auto">
        <div class="mb-12 border-l-8 border-cyan-500 pl-6">
            <h2 class="text-6xl font-black orbitron italic uppercase tracking-tighter">MISSION <span class="text-purple-500">SELECT</span></h2>
            <p class="text-cyan-400 font-bold tracking-[3px] mt-2 italic uppercase">Database Modul Aktif: 24 Systems Ready</p>
        </div>

        <div id="arcadeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-6">
        </div>

        <div class="mt-24">
            <h3 class="text-3xl font-black orbitron italic mb-10 text-purple-500 flex items-center gap-4">
                <i class="fas fa-crown text-yellow-500"></i> TOP ARENA SURVIVORS
            </h3>
            <div id="leaderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            </div>
        </div>
    </main>

    <div id="gameModal">
        <div class="modal-box relative">
            <div class="bg-purple-600/20 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 border-2 border-purple-500">
                <i id="modalIcon" class="fas fa-gamepad text-3xl text-white"></i>
            </div>
            <h2 id="modalTitle" class="text-3xl font-black orbitron italic mb-2 text-purple-500 uppercase">GAME NAME</h2>
            <p class="text-[10px] orbitron text-cyan-400 tracking-[5px] mb-8 uppercase">Uplinking Module...</p>
            
            <div id="popupRankList" class="space-y-3 mb-10 text-left">
            </div>

            <button onclick="confirmStart()" class="btn-play-ultra py-4 text-xl italic tracking-tighter">
                LAUNCH MODUL
            </button>
            <button onclick="closeModal()" class="mt-6 text-gray-600 text-xs orbitron hover:text-white transition">ABORT MISSION</button>
        </div>
    </div>

    <script>
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const activeUser = (localStorage.getItem('loginUser') || "PLAYER").toUpperCase();
        document.getElementById('userNameDisplay').innerText = "AGENT ID: " + activeUser;

        // DAFTAR FILE (KEMBALI KE FORMAT LAMA AGAR TIDAK 404)
        const games = [
            { name: "VOID SURVIVOR", file: "survivor", icon: "fa-skull-crossbones" },
            { name: "NEON DRIFT", file: "drift", icon: "fa-car-side" },
            { name: "CYBER STRIKE", file: "strike", icon: "fa-crosshairs" },
            { name: "HEXA JUMP", file: "jump", icon: "fa-up-long" },
            { name: "MATRIX BREAKER", file: "breaker", icon: "fa-burst" },
            { name: "GALAXY WAR", file: "war", icon: "fa-jet-fighter" },
            { name: "SNAKE NEON", file: "snake", icon: "fa-worm" },
            { name: "TETRIS ULTRA", file: "tetris", icon: "fa-cubes" },
            { name: "PAC-MAN NEO", file: "pacman", icon: "fa-ghost" },
            { name: "SPACE INVADER", file: "invaders", icon: "fa-shuttle-space" },
            { name: "BRICK MASTER", file: "brick", icon: "fa-border-all" },
            { name: "FLAPPY CYBER", file: "flappy", icon: "fa-dove" },
            { name: "DRAGON SLAYER", file: "dragon", icon: "fa-dragon" },
            { name: "VOID RUNNER", file: "void", icon: "fa-running" },
            { name: "CYBER PUNCH", file: "punch", icon: "fa-fist-raised" },
            { name: "HEXA PUZZLE", file: "hexa", icon: "fa-vial" },
            { name: "NEON HOOPS", file: "hoops", icon: "fa-basketball" },
            { name: "BLADE STORM", file: "blade", icon: "fa-khanda" },
            { name: "CYBER FISH", file: "fish", icon: "fa-fish" },
            { name: "ROBOT WARS", file: "robot", icon: "fa-robot" },
            { name: "METEOR SHOWER", file: "meteor", icon: "fa-meteor" },
            { name: "CYBER TENNIS", file: "tennis", icon: "fa-table-tennis-paddle-ball" },
            { name: "PORTAL DASH", file: "portal", icon: "fa-door-open" },
            { name: "LASER TAG", file: "tag", icon: "fa-raygun" }
        ];

        let selectedFile = "";

        function renderGrid(data = []) {
            const grid = document.getElementById('arcadeGrid');
            grid.innerHTML = "";
            games.forEach((g, i) => {
                // Cari skor user untuk game ini
                const userScore = data.find(p => p.name.toUpperCase() === activeUser);
                const scoreVal = userScore ? userScore.score.toLocaleString() : "0";

                grid.innerHTML += `
                    <div class="arcade-card p-5 group min-h-[180px]">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[8px] orbitron text-gray-500">M_${100+i}</span>
                            <div class="score-badge orbitron">${scoreVal}</div>
                        </div>
                        <div class="text-center mb-4">
                             <i class="fas ${g.icon} text-3xl text-white group-hover:text-cyan-400 transition duration-500"></i>
                        </div>
                        <h3 class="text-[11px] font-black orbitron mb-4 text-center group-hover:text-cyan-400 uppercase truncate">${g.name}</h3>
                        <button onclick="showPopup('${g.name}', '${g.file}', '${g.icon}')" class="btn-play-ultra uppercase">Select</button>
                    </div>`;
            });
        }

        async function getDB() {
            try {
                const res = await fetch(dbURL + "?nocache=" + Date.now());
                const data = await res.json();
                return data ? Object.values(data).sort((a,b) => b.score - a.score) : [];
            } catch(e) { return []; }
        }

        async function sync() {
            const players = await getDB();
            const me = players.find(p => p.name.toUpperCase() === activeUser);
            document.getElementById('myTotalScore').innerText = me ? me.score.toLocaleString() : "0";
            
            renderGrid(players); // Update grid dengan skor

            const list = document.getElementById('leaderList');
            list.innerHTML = "";
            players.slice(0, 12).forEach((p, idx) => {
                list.innerHTML += `
                <div class="bg-black/50 border border-purple-900/50 p-3 rounded-xl flex justify-between items-center hover:border-cyan-500 transition shadow-lg">
                    <div class="flex items-center gap-3">
                        <span class="text-xl font-black orbitron text-gray-800 italic">#${idx+1}</span>
                        <span class="font-bold text-xs uppercase">${p.name}</span>
                    </div>
                    <span class="text-cyan-400 orbitron font-bold text-sm">${p.score.toLocaleString()}</span>
                </div>`;
            });
        }

        async function showPopup(name, file, icon) {
            selectedFile = file;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalIcon').className = `fas ${icon} text-3xl text-white`;
            document.getElementById('gameModal').style.display = 'flex';
            
            const list = document.getElementById('popupRankList');
            list.innerHTML = "<p class='text-center animate-pulse text-cyan-400 orbitron text-[10px]'>SYNCING...</p>";
            
            const data = await getDB();
            list.innerHTML = "";
            data.slice(0, 3).forEach((p, i) => {
                list.innerHTML += `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded border-l-2 border-cyan-500">
                    <span class="text-xs font-bold uppercase">#${i+1} ${p.name}</span>
                    <span class="text-cyan-400 orbitron font-bold text-xs">${p.score.toLocaleString()}</span>
                </div>`;
            });
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        
        // KEMBALI KE LOGIKA ASLI KAMU AGAR TIDAK 404
        function confirmStart() { 
            window.location.href = `loading.html?game=${selectedFile}`; 
        }

        function logout() { if(confirm("DISCONNECT AGENT?")) { localStorage.clear(); window.location.href='index.html'; } }

        // Jalankan render grid segera
        renderGrid();
        // Jalankan sync database
        sync();
        setInterval(sync, 15000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - ULTIMATE ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        
        /* CARD GAME */
        .arcade-card { background: #000; border: 2px solid #ff00ff; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .arcade-card:hover { transform: translateY(-5px); border-color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        
        /* POPUP */
        #gameModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #0d0221; border: 3px solid #ff00ff; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 50px #ff00ff55; }
    </style>
</head>
<body class="min-h-screen">

    <div id="gameModal">
        <div class="modal-content">
            <i class="fas fa-crown text-5xl text-yellow-500 mb-4"></i>
            <h2 id="modalGameTitle" class="orbitron text-2xl neon-cyan mb-2 uppercase italic">GAME NAME</h2>
            <div class="bg-black/50 border border-purple-500/50 p-6 rounded-xl mb-6">
                <p class="text-[10px] text-gray-400 tracking-[3px] uppercase mb-2">Record Holder</p>
                <p id="topPlayerName" class="orbitron text-xl neon-purple uppercase">NO DATA</p>
                <p id="topPlayerScore" class="text-4xl font-black text-white mt-1">0</p>
                <p class="text-[9px] text-cyan-400 font-bold uppercase">Points</p>
            </div>
            <button onclick="closeModal()" class="w-full bg-cyan-600 hover:bg-white hover:text-black py-3 rounded-lg orbitron font-bold transition uppercase">Mulai Main</button>
        </div>
    </div>

    <header class="p-4 px-10 flex justify-between items-center bg-black border-b-2 border-cyan-500 sticky top-0 z-[100]">
        <h1 class="text-3xl font-black orbitron italic neon-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-8">
            <div class="text-right">
                <p id="userNameDisplay" class="text-sm orbitron font-bold neon-purple uppercase italic">---</p>
                <p class="text-[9px] text-gray-500 font-bold uppercase">Player Active</p>
            </div>
            <div class="text-center bg-purple-900/20 px-4 py-1 rounded border border-purple-500/30">
                <p id="myTotalScore" class="text-xl orbitron font-bold neon-cyan">0</p>
                <p class="text-[8px] text-purple-400 font-bold uppercase">Your Score</p>
            </div>
            <button onclick="logout()" class="text-red-500 text-2xl"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-10">
        <h2 class="text-5xl font-black orbitron italic mb-10 text-white uppercase">PC <span class="neon-purple">ULTRA</span> LIBRARY</h2>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-6 mb-20"></div>

        <div class="border-t-2 border-purple-900/50 pt-10">
            <h3 class="orbitron text-purple-400 text-xl font-bold mb-8 italic uppercase flex items-center gap-4">
                <i class="fas fa-trophy"></i> Global Leaderboard
            </h3>
            <div id="leaderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>
    </main>

    <script>
        // 1. FIREBASE CONFIG (PASTIKAN ISI INI DENGAN BENAR)
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_BOSKU",
            databaseURL: "https://yokbisayok-db-default-rtdb.firebaseio.com",
            projectId: "yokbisayok-db",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const activeUser = localStorage.getItem('loginUser') || "PLAYER_ONE";
        document.getElementById('userNameDisplay').innerText = activeUser;

        // 2. RENDER 48 GAMES DENGAN TOMBOL PLAY & NAMA JELAS
        const grid = document.getElementById('arcadeGrid');
        for(let i=1; i<=48; i++) {
            const gameTitle = `GAME ARCADE #${i}`;
            grid.innerHTML += `
                <div class="arcade-card">
                    <div class="h-24 bg-gray-900 flex items-center justify-center">
                        <i class="fas fa-gamepad text-gray-800 text-4xl"></i>
                    </div>
                    <div class="p-4 bg-black/80">
                        <h4 class="text-xs font-black orbitron text-white mb-3 uppercase truncate">${gameTitle}</h4>
                        <button onclick="handlePlay('${gameTitle}')" class="w-full bg-cyan-600 hover:bg-white hover:text-black py-2 rounded text-[10px] font-black orbitron transition uppercase">
                            <i class="fas fa-play mr-1"></i> Play Now
                        </button>
                    </div>
                </div>
            `;
        }

        // 3. LOGIC PLAY & POPUP
        function handlePlay(gameId) {
            const userRef = db.ref('leaderboard/' + activeUser.toLowerCase());
            const gameRecordRef = db.ref('game_records/' + gameId.replace(/ /g, "_"));

            // Tambah skor total user
            userRef.once('value').then(snap => {
                let data = snap.val();
                userRef.set({ name: activeUser, score: (data ? data.score + 100 : 100) });
            });

            // Ambil data rekor di game ini
            gameRecordRef.once('value').then(snap => {
                let record = snap.val();
                
                // Jika kita menang rekor baru atau data kosong
                if(!record || record.score < 100) {
                    gameRecordRef.set({ name: activeUser, score: 100 });
                }

                // Tampilkan Popup
                document.getElementById('modalGameTitle').innerText = gameId;
                document.getElementById('topPlayerName').innerText = record ? record.name : activeUser;
                document.getElementById('topPlayerScore').innerText = record ? record.score : "100";
                document.getElementById('gameModal').style.display = "flex";
            });
        }

        // 4. LISTENER LEADERBOARD (UPDATE OTOMATIS)
        db.ref('leaderboard').orderByChild('score').on('value', snap => {
            const list = document.getElementById('leaderList');
            let players = [];
            snap.forEach(c => { 
                let p = childData = c.val();
                players.push(childData);
                if(childData.name.toLowerCase() === activeUser.toLowerCase()) {
                    document.getElementById('myTotalScore').innerText = childData.score.toLocaleString();
                }
            });

            list.innerHTML = "";
            players.reverse().slice(0, 9).forEach((p, i) => {
                list.innerHTML += `
                    <div class="bg-black border border-purple-500/30 p-5 rounded-xl flex justify-between items-center shadow-lg">
                        <div class="flex items-center gap-4">
                            <span class="orbitron text-xl font-black ${i<3 ? 'neon-purple':'text-gray-700'}">${i+1}</span>
                            <div>
                                <p class="text-sm font-black orbitron uppercase text-white">${p.name}</p>
                                <p class="text-[8px] text-cyan-400 font-bold uppercase tracking-widest italic">Rank ${i+1}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black orbitron neon-cyan">${p.score.toLocaleString()}</p>
                            <p class="text-[8px] text-gray-500 font-bold uppercase">Total Points</p>
                        </div>
                    </div>
                `;
            });
        });

        function closeModal() { document.getElementById('gameModal').style.display = "none"; }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>

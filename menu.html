<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - ULTIMATE NEON ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --pink: #ff0055;
            --dark-bg: #02010a;
        }

        body { 
            background: var(--dark-bg); color: white; font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden; background-attachment: fixed;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Efek Glow Latar Belakang */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(188, 19, 254, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        /* CARD STYLE: LEBIH GAHAR */
        .arcade-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .arcade-card:hover {
            transform: translateY(-8px);
            border-color: var(--cyan);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        /* BADGE SKOR GLOBAL */
        .score-tag {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-size: 10px; padding: 2px 8px; border-radius: 4px;
            box-shadow: 0 0 10px var(--cyan);
        }

        /* TOMBOL PLAY NEON */
        .btn-play {
            background: linear-gradient(45deg, #00f2ff, #0077ff);
            color: #000; font-family: 'Orbitron'; font-weight: 900;
            font-size: 10px; letter-spacing: 1px; padding: 10px;
            border-radius: 8px; transition: 0.3s; width: 100%;
        }

        .btn-play:hover {
            background: #fff; box-shadow: 0 0 20px #fff; transform: scale(1.02);
        }

        /* MODAL STYLE */
        #gameModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .modal-content {
            background: #050112; border: 2px solid var(--purple);
            padding: 40px; border-radius: 24px; text-align: center;
            width: 90%; max-width: 450px; box-shadow: 0 0 50px var(--purple);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <header class="p-6 px-10 bg-black/50 backdrop-blur-md border-b border-white/5 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black orbitron italic text-white tracking-tighter uppercase">
                YOKBI<span class="text-cyan-400">SAYOK</span>
            </h1>
            <p class="text-[8px] orbitron text-cyan-500 tracking-[5px] animate-pulse">NEON ARENA v4.0</p>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p id="userNameDisplay" class="text-[9px] orbitron text-gray-500 mb-1">---</p>
                <div class="flex items-center gap-2 justify-end">
                    <span class="text-[10px] orbitron text-purple-400">TOTAL_XP:</span>
                    <p class="text-xl font-black orbitron text-cyan-400" id="myTotalScore">0</p>
                </div>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-lg border border-red-600/30 text-red-500 hover:bg-red-600 hover:text-white transition-all">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </header>

    <main class="p-8 lg:p-12 max-w-[1900px] mx-auto">
        <div class="mb-12 border-l-4 border-cyan-500 pl-6">
            <h2 class="text-5xl font-black orbitron italic uppercase tracking-tighter">BATTLE <span class="text-purple-500">STATION</span></h2>
            <p class="text-gray-400 text-xs tracking-[3px] mt-2">SELECT MODULE TO BEGIN SIMULATION</p>
        </div>

        <div id="arcadeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-5">
            </div>

        <div class="mt-24">
            <h3 class="text-2xl font-black orbitron italic mb-8 text-white flex items-center gap-3">
                <i class="fas fa-crown text-yellow-500"></i> TOP SURVIVORS
            </h3>
            <div id="leaderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            </div>
        </div>
    </main>

    <div id="gameModal">
        <div class="modal-content">
            <div class="w-20 h-20 bg-cyan-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-cyan-500/50">
                <i id="modalIcon" class="fas fa-gamepad text-3xl text-cyan-400"></i>
            </div>
            <h2 id="modalTitle" class="text-3xl font-black orbitron italic text-white mb-8 uppercase">GAME NAME</h2>
            
            <div id="popupRankList" class="space-y-3 mb-10">
                </div>

            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-xs orbitron font-bold text-gray-500 hover:text-white transition">ABORT</button>
                <button onclick="confirmStart()" class="flex-[2] btn-play">LAUNCH MODUL</button>
            </div>
        </div>
    </div>

    <script>
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const activeUser = (localStorage.getItem('loginUser') || "PLAYER").toUpperCase();
        document.getElementById('userNameDisplay').innerText = "AGENT: " + activeUser;

        const games = [
            { name: "VOID SURVIVOR", file: "survivor.html", icon: "fa-skull-crossbones" },
            { name: "NEON DRIFT", file: "drift.html", icon: "fa-car-side" },
            { name: "SNAKE NEON", file: "snake.html", icon: "fa-worm" },
            { name: "CYBER STRIKE", file: "strike.html", icon: "fa-crosshairs" },
            { name: "HEXA JUMP", file: "jump.html", icon: "fa-up-long" },
            { name: "MATRIX BREAKER", file: "breaker.html", icon: "fa-burst" },
            { name: "GALAXY WAR", file: "war.html", icon: "fa-jet-fighter" },
            { name: "TETRIS ULTRA", file: "tetris.html", icon: "fa-cubes" },
            { name: "PAC-MAN NEO", file: "pacman.html", icon: "fa-ghost" },
            { name: "SPACE INVADER", file: "invaders.html", icon: "fa-shuttle-space" },
            { name: "BRICK MASTER", file: "brick.html", icon: "fa-border-all" },
            { name: "FLAPPY CYBER", file: "flappy.html", icon: "fa-dove" },
            { name: "DRAGON SLAYER", file: "dragon.html", icon: "fa-dragon" },
            { name: "VOID RUNNER", file: "void.html", icon: "fa-running" },
            { name: "CYBER PUNCH", file: "punch.html", icon: "fa-fist-raised" },
            { name: "HEXA PUZZLE", file: "hexa.html", icon: "fa-vial" },
            { name: "NEON HOOPS", file: "hoops.html", icon: "fa-basketball" },
            { name: "BLADE STORM", file: "blade.html", icon: "fa-khanda" },
            { name: "CYBER FISH", file: "fish.html", icon: "fa-fish" },
            { name: "ROBOT WARS", file: "robot.html", icon: "fa-robot" },
            { name: "METEOR SHOWER", file: "meteor.html", icon: "fa-meteor" },
            { name: "CYBER TENNIS", file: "tennis.html", icon: "fa-table-tennis-paddle-ball" },
            { name: "PORTAL DASH", file: "portal.html", icon: "fa-door-open" },
            { name: "LASER TAG", file: "tag.html", icon: "fa-raygun" }
        ];

        let selectedFile = "";

        // Tampilkan Grid secara instan tanpa menunggu database
        function renderGrid(playerScores = []) {
            const grid = document.getElementById('arcadeGrid');
            grid.innerHTML = "";
            
            games.forEach((g, i) => {
                const myScore = playerScores.find(p => p.name.toUpperCase() === activeUser);
                const displayScore = myScore ? myScore.score.toLocaleString() : "0";

                grid.innerHTML += `
                    <div class="arcade-card p-5 group flex flex-col justify-between min-h-[190px]">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[8px] orbitron text-gray-600">ID_${100+i}</span>
                            <div class="score-tag orbitron font-black">${displayScore}</div>
                        </div>
                        <div class="mb-4 text-center">
                            <i class="fas ${g.icon} text-3xl text-white group-hover:text-cyan-400 group-hover:drop-shadow-[0_0_10px_#00f2ff] transition-all"></i>
                        </div>
                        <h3 class="text-[11px] font-black orbitron text-gray-300 group-hover:text-white uppercase mb-4 text-center truncate">${g.name}</h3>
                        <button onclick="showPopup('${g.name}', '${g.file}', '${g.icon}')" class="btn-play">PLAY</button>
                    </div>`;
            });
        }

        async function getDB() {
            try {
                const res = await fetch(dbURL + "?nocache=" + Date.now());
                const data = await res.json();
                return data ? Object.values(data).sort((a,b) => b.score - a.score) : [];
            } catch(e) { return []; }
        }

        async function sync() {
            const players = await getDB();
            // Update skor di header
            const me = players.find(p => p.name.toUpperCase() === activeUser);
            document.getElementById('myTotalScore').innerText = me ? me.score.toLocaleString() : "0";
            
            // Re-render grid dengan skor terbaru
            renderGrid(players);

            // Update Leaderboard Bawah
            const list = document.getElementById('leaderList');
            list.innerHTML = "";
            players.slice(0, 8).forEach((p, idx) => {
                list.innerHTML += `
                <div class="bg-white/5 border border-white/5 p-4 rounded-xl flex justify-between items-center group hover:border-cyan-500/50 transition">
                    <div class="flex items-center gap-4">
                        <span class="text-xl font-black orbitron text-white/10 italic">#${idx+1}</span>
                        <span class="font-bold text-sm uppercase">${p.name}</span>
                    </div>
                    <span class="text-cyan-400 orbitron font-black">${p.score.toLocaleString()}</span>
                </div>`;
            });
        }

        async function showPopup(name, file, icon) {
            selectedFile = file;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalIcon').className = `fas ${icon} text-3xl text-cyan-400`;
            document.getElementById('gameModal').style.display = 'flex';
            
            const list = document.getElementById('popupRankList');
            list.innerHTML = "<p class='text-center animate-pulse text-cyan-400 orbitron text-[10px]'>UPLINKING...</p>";
            
            const data = await getDB();
            list.innerHTML = "";
            data.slice(0, 3).forEach((p, i) => {
                list.innerHTML += `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border-l-2 border-cyan-500">
                    <span class="text-xs font-bold uppercase tracking-widest">${p.name}</span>
                    <span class="text-cyan-400 orbitron font-black text-xs">${p.score.toLocaleString()}</span>
                </div>`;
            });
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        function confirmStart() { window.location.href = `loading.html?game=${selectedFile}`; }
        function logout() { if(confirm("DISCONNECT AGENT?")) { localStorage.clear(); window.location.href='index.html'; } }

        // MAIN EXECUTION
        renderGrid(); // Jalankan instan supaya tidak kosong
        sync();       // Baru ambil data database
        setInterval(sync, 20000); // Sinkronisasi berkala
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - V12 ULTRA LIVING NEON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        
        body { 
            background: #010409 !important; 
            color: white; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* EFEK CAHAYA HIDUP (ANIMASI) */
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
            50% { box-shadow: 0 0 25px rgba(0, 242, 255, 0.5); }
            100% { box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        }

        .neon-blue { color: #00f2ff; text-shadow: 0 0 15px #00f2ff, 0 0 30px rgba(0, 242, 255, 0.5); }
        .neon-purple { color: #bc13fe; text-shadow: 0 0 15px #bc13fe, 0 0 30px rgba(188, 19, 254, 0.5); }

        /* KARTU GAME VERSI HIDUP */
        .game-card {
            background: #0d1117; 
            border: 2px solid #30363d; 
            border-radius: 18px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* HOVER: BIRU MENYALA */
        .card-blue:hover { 
            border-color: #00f2ff; 
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.6); 
            transform: scale(1.07) translateY(-15px);
        }

        /* HOVER: UNGU MENYALA */
        .card-purple:hover { 
            border-color: #bc13fe; 
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.6); 
            transform: scale(1.07) translateY(-15px);
        }

        /* IMAGE STYLING: HIGH CONTRAST */
        .game-img { 
            width: 100%; height: 160px; object-fit: cover; 
            filter: saturate(1.5) brightness(1.1); /* Membuat warna gambar lebih 'hidup' */
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        /* BANNER GAHAR MIRIP REFERENSI */
        .hero-banner {
            background: linear-gradient(135deg, #0d1117 0%, #000 100%);
            border: 2px solid #00f2ff;
            animation: glowPulse 3s infinite;
        }
    </style>
</head>
<body class="p-0 m-0">

    <nav class="p-6 flex justify-between items-center bg-black/95 border-b-2 border-cyan-500 sticky top-0 z-[100] shadow-[0_5px_20px_rgba(0,0,0,0.8)]">
        <h1 class="text-4xl font-black orbitron italic neon-blue">YOKBISAYOK</h1>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <span class="block text-lg orbitron font-bold neon-purple uppercase">AAN</span>
                <span class="text-[10px] tracking-[4px] text-cyan-400">RANK: ELITE MEMBER</span>
            </div>
            <button onclick="logout()" class="text-3xl text-red-500 hover:scale-125 transition"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <main class="max-w-[1700px] mx-auto p-10">
        
        <div class="hero-banner p-14 rounded-[40px] mb-16 flex flex-col md:flex-row items-center justify-between gap-10">
            <div class="md:w-2/3">
                <h2 class="text-7xl font-black orbitron italic mb-4 leading-tight">
                    PC <span class="neon-purple">ULTRA</span> <br> <span class="neon-blue">LIBRARY</span> 2026
                </h2>
                <p class="text-gray-300 text-lg uppercase tracking-widest font-bold">50+ Game Offline Premium • High Performance</p>
                <button class="mt-10 bg-gradient-to-r from-cyan-500 to-blue-600 text-black px-16 py-4 rounded-2xl text-lg font-black orbitron shadow-[0_0_20px_#00f2ff] hover:scale-110 transition">MULAI MAIN</button>
            </div>
            <div class="md:w-1/3 hidden md:block">
                 <i class="fas fa-rocket text-[150px] neon-blue animate-bounce"></i>
            </div>
        </div>

        <div class="relative mb-20 max-w-4xl mx-auto">
            <i class="fas fa-gamepad absolute left-6 top-1/2 -translate-y-1/2 text-3xl text-cyan-500"></i>
            <input type="text" placeholder="CARI JUDUL GAME ANDA..." class="w-full bg-black border-4 border-purple-500/50 p-6 pl-20 rounded-3xl focus:border-cyan-400 outline-none transition text-xl orbitron text-white shadow-2xl">
        </div>

        <div id="gameGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-10">
            </div>

    </main>

    <script>
        // DATA GAMBAR GAME YANG WARNANYA 'HIDUP' (KARAKTER GAME)
        const assetGames = [
            { n: "CYBERPUNK", c: "Action", i: "https://wallpapercave.com/wp/wp7158145.jpg" },
            { n: "GHOST RUNNER", c: "Speed", i: "https://wallpapercave.com/wp/wp7429107.jpg" },
            { n: "VALORANT", c: "Shooter", i: "https://wallpapercave.com/wp/wp5870377.jpg" },
            { n: "GOD OF WAR", c: "Adventure", i: "https://wallpapercave.com/wp/wp10319208.jpg" },
            { n: "ELDEAN RING", c: "RPG", i: "https://wallpapercave.com/wp/wp10495376.jpg" },
            { n: "NEED FOR SPEED", c: "Racing", i: "https://wallpapercave.com/wp/wp4504107.jpg" },
            { n: "MORTAL KOMBAT", c: "Fighting", i: "https://wallpapercave.com/wp/wp4337227.jpg" },
            { n: "SPIDERMAN", c: "Hero", i: "https://wallpapercave.com/wp/wp7239019.jpg" }
        ];

        const grid = document.getElementById("gameGrid");
        
        // Loop 60 Game
        for (let x = 1; x <= 60; x++) {
            const data = assetGames[x % assetGames.length];
            const isPurple = x % 2 === 0;
            const styleClass = isPurple ? "card-purple" : "card-blue";
            const textClass = isPurple ? "neon-purple" : "neon-blue";

            grid.innerHTML += `
                <div class="game-card ${styleClass}" onclick="alert('Loading ${data.n}...')">
                    <img src="${data.i}" class="game-img" onerror="this.src='https://via.placeholder.com/400x200/000000/00f2ff?text=GAME+IMAGE'">
                    <div class="p-5">
                        <p class="text-[10px] font-black orbitron ${textClass} mb-1 tracking-widest">${data.c} PC</p>
                        <h4 class="text-sm font-black orbitron text-white uppercase">${data.n} #${x}</h4>
                        <div class="mt-4 flex items-center justify-between">
                            <span class="text-[10px] text-gray-500">v12.0 ELITE</span>
                            <div class="flex text-yellow-500 text-[10px] gap-1">
                                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - ARENA SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        
        .arcade-card { 
            background: rgba(255, 255, 255, 0.03); border: 2px solid #ff00ff; border-radius: 15px; 
            padding: 20px; text-align: center; backdrop-filter: blur(10px); transition: 0.4s;
        }
        .arcade-card:hover { border-color: #00f2ff; transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        
        #gameModal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-box { 
            background: #0d0221; border: 3px solid #ff00ff; padding: 40px; 
            border-radius: 25px; text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 0 60px rgba(255, 0, 255, 0.4);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="gameModal">
        <div class="modal-box">
            <i class="fas fa-gamepad text-5xl neon-cyan mb-4"></i>
            <h2 id="modalTitle" class="orbitron text-3xl neon-purple mb-6 uppercase italic">GAME NAME</h2>
            
            <p class="text-[10px] text-gray-500 tracking-[3px] mb-4 uppercase">Global Top Records</p>
            <div id="popupRankList" class="mb-8 min-h-[100px] flex flex-col justify-center gap-2">
                </div>

            <button onclick="startGameAction()" class="w-full bg-white text-black py-4 rounded-xl orbitron font-bold text-lg hover:bg-cyan-400 transition transform hover:scale-105">MASUK ARENA</button>
            <button onclick="closeModal()" class="mt-6 text-gray-500 text-xs uppercase orbitron tracking-widest hover:text-white transition">Kembali ke Lobby</button>
        </div>
    </div>

    <header class="p-6 px-12 flex justify-between items-center bg-black/80 border-b-2 border-cyan-500 sticky top-0 z-50 backdrop-blur-md">
        <h1 class="text-3xl font-black orbitron italic neon-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-10">
            <div class="text-right">
                <p id="userNameDisplay" class="text-xs orbitron font-bold neon-purple uppercase tracking-widest">---</p>
                <p id="myTotalScore" class="text-2xl orbitron font-bold neon-cyan">0</p>
            </div>
            <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-red-500 text-2xl hover:rotate-90 transition duration-300"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-12">
        <div class="mb-12">
            <h2 class="text-5xl font-black orbitron italic text-white uppercase italic">PC <span class="neon-purple">ULTRA</span> LIBRARY</h2>
            <p class="text-[10px] text-gray-500 tracking-[5px] mt-2 font-bold uppercase">Database Online V28.0 - LIVE MODE</p>
        </div>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 mb-24"></div>

        <h3 class="orbitron text-purple-400 text-xl mb-8 italic flex items-center gap-4">
            <span class="h-[1px] w-12 bg-purple-500"></span> HALL OF FAME <span class="h-[1px] w-full bg-gray-800"></span>
        </h3>
        <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <script>
        // CONFIG - PASTIKAN API KEY BENAR
        const firebaseConfig = { 
            apiKey: "ISI_API_KEY_BOSKU", 
            databaseURL: "https://yokbisayok-db-default-rtdb.firebaseio.com", 
            projectId: "yokbisayok-db" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const activeUser = localStorage.getItem('loginUser') || "USER";
        document.getElementById('userNameDisplay').innerText = activeUser;

        // GENERATE GRID GAME
        const games = ["SNAKE RETRO", "TETRIS ULTRA", "PAC-MAN NEO", "SPACE INVADERS", "GALAXY SHOOTER", "BRICK BREAKER"];
        for(let i=7; i<=48; i++) { games.push("ARCADE GAME #" + i); }

        const grid = document.getElementById('arcadeGrid');
        games.forEach(name => {
            grid.innerHTML += `
                <div class="arcade-card">
                    <div class="h-24 flex items-center justify-center bg-black/40 rounded-lg mb-4 border border-white/5">
                        <i class="fas fa-gamepad text-4xl text-gray-700"></i>
                    </div>
                    <p class="text-xs font-black orbitron text-white uppercase mb-4 truncate">${name}</p>
                    <button onclick="showPopup('${name}')" class="w-full bg-cyan-500 text-black py-2 rounded-lg orbitron font-bold text-[10px] hover:bg-white transition">PLAY NOW</button>
                </div>`;
        });

        let currentGameTarget = "";

        // FUNGSI POPUP DENGAN LIVE LISTENER
        function showPopup(name) {
            currentGameTarget = name;
            document.getElementById('modalTitle').innerText = name;
            const popupRankList = document.getElementById('popupRankList');
            
            popupRankList.innerHTML = "<p class='text-[10px] text-gray-500 italic animate-pulse'>SYNCING DATABASE...</p>";

            // Menggunakan .on agar skor di popup update otomatis saat ada yang main
            db.ref('leaderboard').orderByChild('score').limitToLast(3).on('value', snap => {
                popupRankList.innerHTML = "";
                let players = [];
                snap.forEach(c => { players.push(c.val()); });
                players.reverse();

                if (players.length > 0) {
                    players.forEach((p, idx) => {
                        let color = idx === 0 ? "#ffd700" : (idx === 1 ? "#c0c0c0" : "#cd7f32");
                        let icon = idx === 0 ? "👑" : (idx === 1 ? "🥈" : "🥉");
                        popupRankList.innerHTML += `
                            <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; border:1px solid ${color}33;">
                                <div class="flex items-center gap-3">
                                    <span style="color:${color}; font-size:14px;">${icon}</span>
                                    <span class="orbitron" style="color:white; font-size:11px; font-weight:bold; letter-spacing:1px;">${p.name.toUpperCase()}</span>
                                </div>
                                <span class="orbitron neon-cyan" style="font-size:14px;">${p.score.toLocaleString()}</span>
                            </div>`;
                    });
                } else {
                    popupRankList.innerHTML = "<p class='text-[10px] text-gray-600 uppercase'>No Global Data Found</p>";
                }
            });

            document.getElementById('gameModal').style.display = 'flex';
        }

        function closeModal() {
            // Mematikan listener saat ditutup agar tidak berat
            db.ref('leaderboard').off(); 
            document.getElementById('gameModal').style.display = 'none';
            // Nyalakan kembali listener global setelah modal tutup
            startGlobalListener();
        }

        function startGameAction() {
            if(currentGameTarget === "SNAKE RETRO") window.location.href = "snake.html";
            else alert("Game " + currentGameTarget + " belum tersedia di library ini.");
        }

        // FUNGSI UPDATE SKOR GLOBAL & HEADER
        function startGlobalListener() {
            db.ref('leaderboard').orderByChild('score').on('value', snap => {
                const list = document.getElementById('leaderList');
                const myHeaderScore = document.getElementById('myTotalScore');
                let data = [];

                snap.forEach(c => { 
                    let player = c.val();
                    data.push(player);
                    
                    // Update Skor Header jika Nama COCOK
                    if(player.name.trim().toUpperCase() === activeUser.trim().toUpperCase()) {
                        myHeaderScore.innerText = player.score.toLocaleString();
                    }
                });

                // Update Hall of Fame
                if(list) {
                    list.innerHTML = "";
                    data.reverse().slice(0, 12).forEach((p, idx) => {
                        list.innerHTML += `
                            <div class="bg-black/40 border border-purple-500/20 p-4 rounded-xl flex justify-between items-center transition hover:border-cyan-500/50">
                                <span class="orbitron font-bold text-purple-500">${idx+1}</span>
                                <p class="text-xs orbitron uppercase text-white">${p.name}</p>
                                <p class="text-xs orbitron neon-cyan">${p.score.toLocaleString()}</p>
                            </div>`;
                    });
                }
            });
        }

        // Jalankan listener saat halaman dibuka
        startGlobalListener();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - MEGA NEON ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap');
        
        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --pink: #ff0055;
            --yellow: #ffee00;
        }

        body { 
            background: #02010a; color: white; font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden; background-attachment: fixed;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* ANIMATED NEON BACKGROUND */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.1) 0%, transparent 80%);
            z-index: -2;
        }

        /* NEON GLOW EFFECTS */
        .glow-cyan { box-shadow: 0 0 20px var(--cyan), inset 0 0 10px var(--cyan); border: 2px solid var(--cyan); }
        .glow-purple { box-shadow: 0 0 20px var(--purple), inset 0 0 10px var(--purple); border: 2px solid var(--purple); }
        .text-neon { text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan); }
        .text-neon-purple { text-shadow: 0 0 10px var(--purple), 0 0 20px var(--purple); }

        /* CARD STYLE */
        .arcade-card {
            background: linear-gradient(145deg, rgba(15, 5, 30, 0.9), rgba(0, 0, 0, 1));
            border-radius: 12px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between;
        }

        .arcade-card:hover {
            transform: scale(1.08) rotate(1deg);
            z-index: 10;
            box-shadow: 0 0 40px var(--cyan);
            border-color: #fff;
        }

        /* PLAY BUTTON NEON */
        .btn-play-ultra {
            background: linear-gradient(45deg, var(--cyan), #008891);
            color: #000; font-family: 'Orbitron'; font-weight: 900;
            padding: 10px; border-radius: 8px; font-size: 12px;
            box-shadow: 0 0 15px var(--cyan); transition: 0.3s;
        }

        .btn-play-ultra:hover {
            background: #fff; transform: translateY(-2px); box-shadow: 0 0 25px #fff;
        }

        /* MODAL GAYA CYBER */
        #gameModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }

        .modal-box {
            background: #050112; border: 3px solid var(--purple);
            padding: 40px; border-radius: 30px; text-align: center;
            width: 95%; max-width: 500px; box-shadow: 0 0 60px var(--purple);
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #02010a; }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 5px; box-shadow: 0 0 10px var(--purple); }
    </style>
</head>
<body class="pb-20">

    <header class="p-6 px-10 bg-black/80 backdrop-blur-md border-b-2 border-purple-600 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-black orbitron italic text-neon tracking-tighter">YOKBI<span class="text-white">SAYOK</span></h1>
            <p class="text-[9px] orbitron text-purple-400 tracking-[6px] animate-pulse">SUPREME ARENA MODULE v.2.6</p>
        </div>
        
        <div class="flex items-center gap-8">
            <div class="text-right">
                <p id="userNameDisplay" class="text-xs orbitron font-bold text-gray-400 uppercase tracking-widest">---</p>
                <div class="flex items-center gap-2 justify-end">
                    <i class="fas fa-wallet text-cyan-500"></i>
                    <p class="text-2xl font-black orbitron text-neon" id="myTotalScore">0</p>
                </div>
            </div>
            <button onclick="logout()" class="w-12 h-12 rounded-xl bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center border border-red-600/50">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </header>

    <main class="p-8 lg:p-12 max-w-[1800px] mx-auto">
        <div class="mb-12 flex justify-between items-end border-l-8 border-cyan-500 pl-6">
            <div>
                <h2 class="text-6xl font-black orbitron italic uppercase tracking-tighter">GAME <span class="text-neon-purple">DATABASE</span></h2>
                <p class="text-cyan-400 font-bold tracking-[3px] mt-2 italic">MENAMPILKAN SEMUA MODUL AKTIF ARENA</p>
            </div>
            <div class="hidden md:block text-right text-gray-600 text-[10px] orbitron">
                SYSTEM STATUS: OPTIMIZED<br>DATABASE: CONNECTED
            </div>
        </div>

        <div id="arcadeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-6">
            </div>

        <div class="mt-24">
            <h3 class="text-3xl font-black orbitron italic mb-10 text-neon-purple flex items-center gap-4">
                <i class="fas fa-crown"></i> TOP ARENA SURVIVORS
            </h3>
            <div id="leaderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </div>
    </main>

    <div id="gameModal">
        <div class="modal-box relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent animate-pulse"></div>
            <div class="bg-purple-600/20 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 border-2 border-purple-500 shadow-[0_0_30px_rgba(188,19,254,0.5)]">
                <i id="modalIcon" class="fas fa-gamepad text-4xl text-white"></i>
            </div>
            <h2 id="modalTitle" class="text-4xl font-black orbitron italic mb-2 text-neon-purple uppercase">GAME NAME</h2>
            <p class="text-[10px] orbitron text-cyan-400 tracking-[5px] mb-8">RETRIEVING WORLD RECORDS...</p>
            
            <div id="popupRankList" class="space-y-3 mb-10 text-left">
                </div>

            <button onclick="confirmStart()" class="w-full btn-play-ultra py-5 text-2xl italic tracking-tighter shadow-[0_0_30px_rgba(0,242,255,0.5)]">
                MASUK ARENA SEKARANG
            </button>
            <button onclick="closeModal()" class="mt-8 text-gray-600 text-xs orbitron tracking-widest hover:text-red-500 transition">ABORT CONNECTION</button>
        </div>
    </div>

    <script>
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const activeUser = (localStorage.getItem('loginUser') || "PLAYER").toUpperCase();
        document.getElementById('userNameDisplay').innerText = "AGENT ID: " + activeUser;

        // DAFTAR GAME LENGKAP - Tambahkan di sini sebanyak mungkin!
        const games = [
            { name: "CYBER CRASH", file: "crash", icon: "fa-car-burst" },
            { name: "NEON MINER", file: "miner", icon: "fa-gem" },
            { name: "SNAKE RETRO", file: "snake", icon: "fa-worm" },
            { name: "TETRIS ULTRA", file: "tetris", icon: "fa-cubes" },
            { name: "PAC-MAN NEO", file: "pacman", icon: "fa-ghost" },
            { name: "NEON RACER", file: "racer", icon: "fa-tachometer-alt" },
            { name: "SPACE INVADERS", file: "invaders", icon: "fa-shuttle-space" },
            { name: "GALAXY SHOOTER", file: "shooter", icon: "fa-crosshairs" },
            { name: "BRICK BREAKER", file: "brick", icon: "fa-border-all" },
            { name: "FLAPPY CYBER", file: "flappy", icon: "fa-dove" },
            { name: "CYBER STRIKE", file: "strike", icon: "fa-hand-fist" },
            { name: "DRAGON SLAYER", file: "dragon", icon: "fa-dragon" },
            { name: "CYBER PUNCH", file: "punch", icon: "fa-fist-raised" },
            { name: "NEON JUMP", file: "jump", icon: "fa-arrow-up" },
            { name: "HEXA PUZZLE", file: "hexa", icon: "fa-vial" },
            { name: "VOID RUNNER", file: "void", icon: "fa-running" }
        ];

        let selectedFile = "";

        function renderGrid() {
            const grid = document.getElementById('arcadeGrid');
            grid.innerHTML = "";
            games.forEach((g, i) => {
                grid.innerHTML += `
                    <div class="arcade-card glow-purple p-5 group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] orbitron text-gray-600">MOD_0${i+1}</span>
                            <i class="fas ${g.icon} text-2xl text-white group-hover:text-cyan-400 group-hover:drop-shadow-[0_0_10px_#00f2ff] transition"></i>
                        </div>
                        <h3 class="text-xs font-black orbitron mb-6 h-8 flex items-center leading-tight group-hover:text-cyan-400">${g.name}</h3>
                        <button onclick="showPopup('${g.name}', '${g.file}', '${g.icon}')" class="btn-play-ultra">PLAY</button>
                    </div>`;
            });
        }

        async function showPopup(name, file, icon) {
            selectedFile = file;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalIcon').className = `fas ${icon} text-4xl text-white`;
            document.getElementById('gameModal').style.display = 'flex';
            
            const list = document.getElementById('popupRankList');
            list.innerHTML = "<p class='text-center animate-pulse text-cyan-400 orbitron text-xs'>ENCRYPTING DATA...</p>";
            
            const data = await getDB();
            list.innerHTML = "";
            data.slice(0, 3).forEach((p, i) => {
                list.innerHTML += `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border-l-4 border-cyan-500">
                    <span class="text-sm font-bold">#${i+1} ${p.name}</span>
                    <span class="text-cyan-400 orbitron font-bold">${p.score.toLocaleString()}</span>
                </div>`;
            });
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        function confirmStart() { window.location.href = `loading.html?game=${selectedFile}`; }

        async function getDB() {
            try {
                const res = await fetch(dbURL + "?nocache=" + Date.now());
                const data = await res.json();
                return data ? Object.values(data).sort((a,b) => b.score - a.score) : [];
            } catch(e) { return []; }
        }

        async function sync() {
            const players = await getDB();
            const me = players.find(p => p.name.toUpperCase() === activeUser);
            document.getElementById('myTotalScore').innerText = me ? me.score.toLocaleString() : "0";
            
            const list = document.getElementById('leaderList');
            list.innerHTML = "";
            players.slice(0, 12).forEach((p, idx) => {
                list.innerHTML += `
                <div class="bg-black/50 border border-purple-900/50 p-4 rounded-xl flex justify-between items-center hover:border-cyan-500 transition shadow-lg">
                    <div class="flex items-center gap-4">
                        <span class="text-2xl font-black orbitron text-gray-800 italic">${idx+1}</span>
                        <span class="font-bold text-sm tracking-tighter uppercase">${p.name}</span>
                    </div>
                    <span class="text-cyan-400 orbitron font-bold text-glow-cyan">${p.score.toLocaleString()}</span>
                </div>`;
            });
        }

        function logout() { if(confirm("ABORT PROTOCOL?")) { localStorage.clear(); window.location.href='index.html'; } }

        renderGrid();
        sync();
        setInterval(sync, 15000);
    </script>
</body>
</html>

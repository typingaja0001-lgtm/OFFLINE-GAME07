<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - FINAL MASTERPIECE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        
        body { 
            background: #02040a; color: white; font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #02040a 100%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* THEME PURPLE DOMINANT (MENCOLOK) */
        .neon-purple { color: #bc13fe; text-shadow: 0 0 15px #bc13fe, 0 0 30px #bc13fe; }
        .neon-blue { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        
        /* CARD SYSTEM MIRIP GAMBAR */
        .game-card {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #bc13fe; /* Default Ungu */
            border-radius: 12px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }
        .game-card:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px rgba(188, 19, 254, 0.8);
            border-color: #00f2ff; /* Berubah Biru saat Hover */
        }

        /* LEADERBOARD PANEL */
        .leader-sidebar {
            background: rgba(13, 2, 33, 0.95);
            border-left: 3px solid #bc13fe;
            box-shadow: -10px 0 30px rgba(188, 19, 254, 0.2);
        }

        /* BANNER */
        .hero-banner {
            background: linear-gradient(90deg, #1a0b2e 0%, #000 50%, #1a0b2e 100%);
            border: 1px solid #bc13fe;
            box-shadow: inset 0 0 50px rgba(188, 19, 254, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-4 px-10 bg-black/80 border-b border-purple-500/50 flex justify-between items-center sticky top-0 z-[100]">
        <div class="flex items-center gap-2">
            <h1 class="text-3xl font-black orbitron italic neon-purple">YOKBISAYOK</h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p id="pName" class="text-sm font-black orbitron neon-blue uppercase">PLAYER_AAN</p>
                <p class="text-[9px] text-purple-400 font-bold tracking-[3px]">MEMBER ELITE</p>
            </div>
            <button onclick="logout()" class="text-red-500 text-2xl hover:scale-125 transition"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <div class="flex flex-1 flex-col lg:flex-row">
        <main class="flex-1 p-8">
            <div class="hero-banner p-10 rounded-3xl mb-12 text-center md:text-left">
                <h2 class="text-5xl font-black orbitron italic mb-3">PC <span class="neon-purple">ULTRA</span> LIBRARY</h2>
                <p class="text-gray-400 text-sm tracking-widest uppercase">48+ Games Offline • Episode 2026</p>
                <div class="mt-6 h-1 w-40 bg-gradient-to-r from-purple-600 to-cyan-500"></div>
            </div>

            <div id="gridContainer" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-6">
                </div>
        </main>

        <aside class="w-full lg:w-96 p-8 leader-sidebar">
            <h3 class="text-2xl font-black orbitron neon-purple mb-8 uppercase text-center border-b border-purple-500/30 pb-4">
                <i class="fas fa-crown mr-2"></i> Hall of Fame
            </h3>
            <div id="leaderList" class="space-y-5">
                </div>
        </aside>
    </div>

    <script>
        const assetGames = [
            { n: "CYBER RACE", c: "Arcade", i: "https://wallpapercave.com/wp/wp7158145.jpg" },
            { n: "VALORANT", c: "Shooter", i: "https://wallpapercave.com/wp/wp5870377.jpg" },
            { n: "ELDEAN RING", c: "RPG", i: "https://wallpapercave.com/wp/wp10495376.jpg" },
            { n: "MORTAL KOMBAT", c: "Fight", i: "https://wallpapercave.com/wp/wp4337227.jpg" },
            { n: "NFS UNBOUND", c: "Racing", i: "https://wallpapercave.com/wp/wp4504107.jpg" },
            { n: "GHOST RUNNER", c: "Speed", i: "https://wallpapercave.com/wp/wp7429107.jpg" }
        ];

        // RENDER 48 GAMES
        const grid = document.getElementById('gridContainer');
        for(let i=1; i<=48; i++) {
            const data = assetGames[i % assetGames.length];
            grid.innerHTML += `
                <div class="game-card p-2" onclick="playGame('${data.n}')">
                    <img src="${data.i}" class="w-full h-28 object-cover rounded-lg border-b border-purple-500/30">
                    <div class="p-2 text-center">
                        <p class="text-[8px] text-cyan-400 font-bold orbitron uppercase tracking-tighter">${data.c}</p>
                        <h4 class="text-[10px] font-black orbitron text-white truncate uppercase">${data.n} #${i}</h4>
                        <div class="mt-3 bg-purple-900/40 rounded py-1 border border-purple-500/20">
                            <span class="text-[9px] font-black text-purple-300">PLAY NOW</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // LEADERBOARD DATA (HIGH SCORE)
        const leaders = [
            { name: "Aan", game: "Cyber Race", score: "99.950", color: "#bc13fe" },
            { name: "Budi", game: "Valorant", score: "88.200", color: "#00f2ff" },
            { name: "Sakti", game: "Eldean Ring", score: "75.400", color: "#00f2ff" },
            { name: "Raja", game: "NFS Unbound", score: "62.100", color: "#00f2ff" },
            { name: "Zidan", game: "Ghost Runner", score: "45.000", color: "#00f2ff" }
        ];

        const list = document.getElementById('leaderList');
        leaders.forEach((l, idx) => {
            list.innerHTML += `
                <div class="flex items-center gap-4 p-4 rounded-xl bg-purple-900/10 border border-purple-500/20 shadow-lg">
                    <span class="text-3xl font-black italic orbitron ${idx==0?'text-yellow-500':'text-gray-600'}">${idx+1}</span>
                    <div class="flex-1">
                        <p class="text-sm font-black orbitron uppercase" style="color:${l.color}">${l.name}</p>
                        <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">${l.game}</p>
                    </div>
                    <div class="text-right border-l border-purple-500/20 pl-4">
                        <p class="text-sm font-black orbitron text-white">${l.score}</p>
                        <p class="text-[8px] text-purple-400 font-bold">PTS</p>
                    </div>
                </div>
            `;
        });

        // LOAD USER
        document.getElementById('pName').innerText = "PLAYER_" + (localStorage.getItem('loginUser') || "GUEST").toUpperCase();

        function playGame(name) { alert("Menyiapkan Server untuk " + name + "..."); }
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - ELITE ARCADE v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            overflow-x: hidden;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* NEON GLOW EFFECTS */
        .neon-text-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
        .neon-text-magenta { color: #bc13fe; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; }

        /* ULTRA NEON CARD SYSTEM */
        .game-card {
            background: #000; border-radius: 12px; overflow: hidden; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #1e293b; cursor: pointer; position: relative;
            transform-origin: center;
        }

        /* EFEK NEON SAAT HOVER (MENYALA GAHAR) */
        .game-card:hover { 
            transform: scale(1.08) translateY(-5px); 
            border-color: #bc13fe; 
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.8), inset 0 0 15px rgba(188, 19, 254, 0.4); 
            z-index: 10;
        }
        .game-card:nth-child(even):hover { 
            border-color: #00f2ff; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.8), inset 0 0 15px rgba(0, 242, 255, 0.4); 
        }

        .game-img { width: 100%; height: 110px; object-fit: cover; transition: 0.3s; }
        .game-card:hover .game-img { filter: brightness(1.2) saturate(1.2); }

        /* PLAY OVERLAY */
        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s;
        }
        .game-card:hover .play-overlay { opacity: 1; }
        .play-icon { 
            background: #bc13fe; color: white; width: 35px; height: 35px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px #bc13fe;
        }

        /* CUSTOM SCROLLBAR NEON */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; box-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="p-4 px-8 flex justify-between items-center border-b-2 border-cyan-500/30 bg-black/90 backdrop-blur-lg sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fas fa-microchip text-cyan-400 text-2xl animate-pulse"></i>
            <h1 class="text-2xl font-black orbitron italic neon-text-cyan tracking-tighter">YOKBISAYOK</h1>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="hidden sm:block text-right">
                <p id="userName" class="text-xs font-black orbitron text-white">PLAYER_01</p>
                <p class="text-[9px] text-cyan-400 tracking-widest">RANK: ELITE</p>
            </div>
            <div class="h-10 w-10 rounded-full border-2 border-purple-500 p-0.5 shadow-[0_0_10px_#bc13fe]">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" class="rounded-full bg-slate-800">
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition text-xl">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </nav>

    <main class="p-6 max-w-[1600px] mx-auto">
        
        <div class="mb-12 p-10 rounded-3xl bg-gradient-to-r from-slate-900 via-black to-slate-900 border border-white/5 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-5xl font-black orbitron italic mb-2 tracking-tighter">
                    PC <span class="neon-text-cyan">ULTRA</span> LIBRARY
                </h2>
                <p class="text-gray-400 max-w-xl">Library game PC terbaik tanpa internet. Optimasi performa sistem v7.0 untuk grafis 4K.</p>
                <button class="mt-6 bg-cyan-500 text-black px-8 py-2 rounded-xl text-xs font-black orbitron hover:bg-white transition">EXPLORE ALL</button>
            </div>
            <i class="fas fa-gamepad absolute -right-10 -bottom-10 text-[280px] text-white/5 rotate-12"></i>
        </div>

        <div class="relative mb-12 max-w-xl mx-auto">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" placeholder="Cari Game PC OFFLINE..." class="w-full bg-black border-2 border-cyan-500/30 p-4 pl-12 rounded-xl focus:border-cyan-400 outline-none transition text-sm orbitron text-white">
        </div>

        <div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            </div>

    </main>

    <script>
        // DATA GAME PC (MENGGUNAKAN GAMBAR CDN STABIL DENGAN COMPRESSION)
        // Kita gandakan listnya biar jadi banyak
        const baseGames = [
            { id: "snake", name: "Cyber Snake", cat: "Arcade", img: "https://images.pexels.com/photos/163036/mario-luigi-yoshi-figures-163036.jpeg?auto=compress&cs=tinysrgb&w=300" },
            { id: "motor", name: "Moto Racer", cat: "Racing", img: "https://images.pexels.com/photos/2116475/pexels-photo-2116475.jpeg?auto=compress&cs=tinysrgb&w=300" },
            { id: "space", name: "Starfield War", cat: "Shooter", img: "https://images.pexels.com/photos/1205301/pexels-photo-1205301.jpeg?auto=compress&cs=tinysrgb&w=300" },
            { id: "zombie", name: "Dead Target", cat: "Action", img: "https://images.pexels.com/photos/15174526/pexels-photo-15174526/free-photo-of-zombie-in-forest.jpeg?auto=compress&cs=tinysrgb&w=300" },
            { id: "drift", name: "Night Drift", cat: "Racing", img: "https://images.pexels.com/photos/3136673/pexels-photo-3136673.jpeg?auto=compress&cs=tinysrgb&w=300" },
            { id: "tank", name: "War Tank", cat: "War", img: "https://images.pexels.com/photos/7010344/pexels-photo-7010344.jpeg?auto=compress&cs=tinysrgb&w=300" },
            { id: "chess", name: "Pro Chess", cat: "Strategy", img: "https://images.pexels.com/photos/1015568/pexels-photo-1015568.jpeg?auto=compress&cs=tinysrgb&w=300" },
            { id: "tetris", name: "Block Neo", cat: "Puzzle", img: "https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=300" }
        ];

        let games = [];
        // Menggandakan 5x biar total jadi 40 game
        for (let i = 1; i <= 5; i++) {
            baseGames.forEach(game => {
                games.push({ ...game, id: `${game.id}_${i}`, name: `${game.name} ${i}` });
            });
        }

        const loggedUser = localStorage.getItem("loginUser") || "PLAYER_MASTER";
        document.getElementById("userName").innerText = loggedUser.toUpperCase();

        const grid = document.getElementById("menuGrid");
        
        games.forEach(g => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.onclick = () => window.location.href = `loading.html?game=${g.id}`;

            card.innerHTML = `
                <img src="${g.img}" class="game-img" alt="${g.name}">
                <div class="play-overlay">
                    <div class="play-icon shadow-[0_0_20px_#bc13fe]"><i class="fas fa-play"></i></div>
                </div>
                <div class="p-3 text-center">
                    <p class="text-[9px] text-cyan-400 font-bold orbitron mb-0.5 tracking-tighter opacity-80">${g.cat}</p>
                    <h4 class="font-bold text-[11px] truncate uppercase orbitron text-white">${g.name}</h4>
                    <div class="mt-2 flex gap-1 justify-center items-center">
                        <span class="text-[7px] text-yellow-500"><i class="fas fa-star"></i> 4.9</span>
                        <div class="h-0.5 w-10 bg-cyan-500 rounded-full shadow-[0_0_5px_#00f2ff]"></div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        function logout() {
            localStorage.removeItem("loginUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

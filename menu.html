<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - MEMBER LOBBY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            margin: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 80%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-border-cyan { box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); border: 1px solid rgba(0, 242, 255, 0.6); }

        /* KARTU GAME RINGAN DENGAN GAMBAR OPTIMAL */
        .game-card {
            background: #0f172a; border-radius: 16px; overflow: hidden; 
            transition: 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.05); 
            cursor: pointer; position: relative;
        }
        .game-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            border-color: #bc13fe; 
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3); 
        }
        
        /* IMAGE STYLING */
        .game-img { width: 100%; height: 110px; object-fit: cover; filter: brightness(0.6); transition: 0.4s; }
        .game-card:hover .game-img { filter: brightness(1); }

        /* PLAY OVERLAY */
        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s;
        }
        .game-card:hover .play-overlay { opacity: 1; }
        .play-icon { 
            background: #bc13fe; color: white; width: 35px; height: 35px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px #bc13fe;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="p-4 px-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-slate-950/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-2">
            <div class="p-2 bg-cyan-500/10 rounded-lg neon-border-cyan">
                <i class="fas fa-terminal text-cyan-400 text-lg"></i>
            </div>
            <h1 class="text-xl font-black orbitron italic bg-gradient-to-r from-white to-cyan-400 bg-clip-text text-transparent">YOKBISAYOK</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="bg-slate-900 px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-3">
                <i class="fas fa-coins text-yellow-500 text-xs"></i>
                <span id="userBalance" class="text-xs font-bold orbitron">1,000</span>
            </div>
            <div class="text-right hidden sm:block">
                <p id="userName" class="text-xs font-bold orbitron text-purple-400">PLAYER</p>
                <p class="text-[8px] text-gray-500 uppercase">Status: Elite</p>
            </div>
            <button onclick="logout()" class="text-gray-500 hover:text-red-500 transition text-lg"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        
        <div class="mb-10 p-6 rounded-2xl bg-gradient-to-r from-slate-900 to-slate-800 border border-white/5">
            <h2 class="text-3xl font-black orbitron italic mb-1 uppercase tracking-tighter">LIBRARY GAME <span class="text-cyan-400">OFFLINE</span></h2>
            <p class="text-gray-500 text-sm">Pilih koleksi game PC terbaik, dioptimasi untuk performa sistem anda. Tidak memerlukan koneksi internet.</p>
        </div>

        <div class="flex gap-2 mb-10 overflow-x-auto no-scrollbar pb-2">
            <button class="bg-cyan-500 text-black px-5 py-2 rounded-lg text-xs font-black orbitron whitespace-nowrap">SEMUA GAME</button>
            <button class="bg-slate-800 px-5 py-2 rounded-lg text-xs font-bold orbitron hover:bg-slate-700 transition">ACTION</button>
            <button class="bg-slate-800 px-5 py-2 rounded-lg text-xs font-bold orbitron hover:bg-slate-700 transition">RACING</button>
            <button class="bg-slate-800 px-5 py-2 rounded-lg text-xs font-bold orbitron hover:bg-slate-700 transition">HORROR</button>
            <div class="relative w-full max-w-sm ml-auto hidden md:block">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" placeholder="Cari Koleksi Game PC..." class="w-full bg-slate-900 border border-white/10 p-3 pl-12 rounded-xl focus:border-cyan-400 outline-none transition text-sm orbitron">
            </div>
        </div>

        <div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>

    </main>

    <script>
        // DATA GAME DENGAN GAMBAR DIOPTIMALKAN (Picsum & Specific URLs)
        const games = [
            { id: "snake", name: "Neon Snake 2026", cat: "ARCADE", img: "https://images.unsplash.com/photo-1635326445070-5b5035780493?q=80&w=300" },
            { id: "motor", name: "Cyber Moto GP", cat: "RACING", img: "https://images.unsplash.com/photo-1591130219388-ae3d1c17431b?q=80&w=300" },
            { id: "space", name: "Starfield War", cat: "SHOOTER", img: "https://images.unsplash.com/photo-1614728263952-84ea206f99b6?q=80&w=300" },
            { id: "zombie", name: "Dead Target", cat: "HORROR", img: "https://images.unsplash.com/photo-1601513059633-2943644f9b46?q=80&w=300" },
            { id: "drift", name: "GT Drift 2077", cat: "RACING", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=300" },
            { id: "knife", name: "Knife Hit Pro", cat: "ACTION", img: "https://images.unsplash.com/photo-1589182397057-b129519163b4?q=80&w=300" },
            { id: "chess", name: "Grandmaster Chess", cat: "STRATEGY", img: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80&w=300" },
            { id: "tetris", name: "Tetris Neo-Glow", cat: "PUZZLE", img: "https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=300" },
            { id: "box", name: "UFC Knockout", cat: "FIGHT", img: "https://images.unsplash.com/photo-1509190314491-b74bc6276040?q=80&w=300" },
            { id: "pool", name: "Real Pool 8D", cat: "SPORT", img: "https://images.unsplash.com/photo-1538388149542-5e24932d11a8?q=80&w=300" },
            { id: "tank", name: "War Tank", cat: "WAR", img: "https://images.unsplash.com/photo-1508349177119-83c02a70597d?q=80&w=300" },
            { id: "bird", name: "Angry Bird Neo", cat: "ACTION", img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=300" }
        ];

        const loggedUser = localStorage.getItem("loginUser");
        if(!loggedUser) { window.location.href = "index.html"; }
        else {
            document.getElementById("userName").innerText = loggedUser.toUpperCase();
        }

        const grid = document.getElementById("menuGrid");
        games.forEach(g => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.onclick = () => window.location.href = `loading.html?game=${g.id}`;

            card.innerHTML = `
                <img src="${g.img}" class="game-img" alt="${g.name}">
                <div class="play-overlay">
                    <div class="play-icon"><i class="fas fa-play"></i></div>
                </div>
                <div class="p-3">
                    <p class="text-[8px] text-cyan-400 font-black orbitron mb-0.5 tracking-widest">${g.cat}</p>
                    <h4 class="font-bold text-[11px] truncate uppercase orbitron text-white/90">${g.name}</h4>
                </div>
            `;
            grid.appendChild(card);
        });

        function logout() {
            localStorage.removeItem("loginUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

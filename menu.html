<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - ARENA SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .arcade-card { background: rgba(255, 255, 255, 0.03); border: 2px solid #ff00ff; border-radius: 15px; padding: 20px; text-align: center; backdrop-filter: blur(10px); transition: 0.4s; cursor: pointer; }
        .arcade-card:hover { border-color: #00f2ff; transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        #gameModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #0d0221; border: 3px solid #ff00ff; padding: 40px; border-radius: 25px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 60px rgba(255, 0, 255, 0.4); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="gameModal">
        <div class="modal-box">
            <div class="flex justify-center mb-6">
                <div class="bg-cyan-400 p-3 rounded-2xl shadow-[0_0_20px_#00f2ff]">
                    <i class="fas fa-gamepad text-3xl text-black"></i>
                </div>
            </div>
            <h2 id="modalTitle" class="orbitron text-3xl neon-purple mb-8 uppercase italic">GAME NAME</h2>
            <div id="popupRankList" class="mb-10 min-h-[60px] flex flex-col gap-3"></div>
            <button onclick="startGameAction()" class="w-full bg-white text-black py-4 rounded-xl orbitron font-black text-xl hover:bg-cyan-400 transition uppercase tracking-tighter">MASUK ARENA</button>
            <button onclick="closeModal()" class="mt-8 text-gray-500 text-sm orbitron uppercase tracking-[0.2em] block w-full">BATAL</button>
        </div>
    </div>

    <header class="p-6 px-12 flex justify-between items-center bg-black/80 border-b-2 border-cyan-500 sticky top-0 z-50 backdrop-blur-md">
        <h1 class="text-3xl font-black orbitron italic neon-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-10">
            <div class="text-right">
                <p id="userNameDisplay" class="text-xs orbitron font-bold neon-purple uppercase tracking-widest">---</p>
                <p id="myTotalScore" class="text-2xl orbitron font-bold neon-cyan">0</p>
            </div>
            <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-red-500 text-2xl"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-12">
        <div class="mb-12">
            <h2 class="text-5xl font-black orbitron italic text-white uppercase italic">PC <span class="neon-purple">ULTRA</span> LIBRARY</h2>
            <p class="text-[10px] text-gray-500 tracking-[5px] mt-2 font-bold uppercase">DATABASE REALTIME AKTIF</p>
        </div>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 mb-24"></div>

        <h3 class="orbitron text-purple-400 text-xl mb-8 italic flex items-center gap-4">
            <span class="h-[1px] w-12 bg-purple-500"></span> HALL OF FAME <span class="h-[1px] w-full bg-gray-800"></span>
        </h3>
        <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const activeUser = (localStorage.getItem('loginUser') || "USER").toUpperCase();
        document.getElementById('userNameDisplay').innerText = activeUser;

        // DAFTAR GAME LENGKAP
        const games = [
            "SNAKE RETRO", 
            "TETRIS ULTRA", 
            "PAC-MAN NEO", 
            "SPACE INVADERS", 
            "GALAXY SHOOTER", 
            "BRICK BREAKER",
            "NEON RACER",
            "FLAPPY CYBER"
            "CYBER STRIKE"
        ];
        
        // Menambah dummy game untuk memperamai library sampai 48 slot
        for(let i=9; i<=48; i++) { games.push("ARCADE GAME #" + i); }
        
        const grid = document.getElementById('arcadeGrid');
        
        games.forEach(name => {
            grid.innerHTML += `
                <div class="arcade-card">
                    <div class="h-24 flex items-center justify-center bg-black/40 rounded-lg mb-4 border border-white/5">
                        <i class="fas fa-gamepad text-4xl text-gray-700"></i>
                    </div>
                    <p class="text-xs font-black orbitron text-white uppercase mb-4 truncate">${name}</p>
                    <button onclick="showPopup('${name}')" class="w-full bg-cyan-500 text-black py-2 rounded-lg orbitron font-bold text-[10px] hover:bg-white transition">PLAY NOW</button>
                </div>`;
        });

        async function getDatabase() {
            try {
                const res = await fetch(dbURL + "?nocache=" + Date.now());
                const data = await res.json();
                if (!data) return [];
                return Object.values(data).sort((a, b) => b.score - a.score);
            } catch (e) { return []; }
        }

        let currentGameTarget = "";

        async function showPopup(name) {
            currentGameTarget = name;
            document.getElementById('modalTitle').innerText = name;
            const popupRankList = document.getElementById('popupRankList');
            document.getElementById('gameModal').style.display = 'flex';
            popupRankList.innerHTML = "<p class='text-[10px] text-cyan-500 animate-pulse italic'>SYNCING...</p>";

            const players = await getDatabase();
            popupRankList.innerHTML = "";
            if (players.length > 0) {
                players.slice(0, 3).forEach((p, idx) => {
                    let color = idx === 0 ? "#ffd700" : (idx === 1 ? "#c0c0c0" : "#cd7f32");
                    popupRankList.innerHTML += `
                        <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid ${color}44;">
                            <span style="color:${color}; font-size:11px; font-weight:bold;">${idx+1}. ${p.name.toUpperCase()}</span>
                            <span class="orbitron" style="color:white; font-size:13px;">${p.score.toLocaleString()}</span>
                        </div>`;
                });
            } else {
                popupRankList.innerHTML = "<p class='text-[10px] text-gray-600 uppercase font-bold'>NO DATA</p>";
            }
        }

        async function syncAll() {
            const players = await getDatabase();
            const list = document.getElementById('leaderList');
            const myHeaderScore = document.getElementById('myTotalScore');

            const me = players.find(p => p.name.trim().toUpperCase() === activeUser.trim());
            myHeaderScore.innerText = me ? me.score.toLocaleString() : "0";

            if(list) {
                list.innerHTML = "";
                players.slice(0, 12).forEach((p, idx) => {
                    list.innerHTML += `<div class="bg-black/40 border border-purple-500/20 p-4 rounded-xl flex justify-between items-center transition hover:border-cyan-500/50"><span class="orbitron font-bold text-purple-500">${idx+1}</span><p class="text-xs orbitron uppercase text-white">${p.name}</p><p class="text-xs orbitron neon-cyan">${p.score.toLocaleString()}</p></div>`;
                });
            }
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }

        // --- KONEKSI FINAL SEMUA FILE GAME ---
        function startGameAction() { 
            const target = currentGameTarget.toUpperCase().trim();
            
            if(target === "SNAKE RETRO") {
                window.location.href = "snake.html"; 
            } else if(target === "TETRIS ULTRA") {
                window.location.href = "tetris.html";
            } else if(target === "PAC-MAN NEO") {
                window.location.href = "pacman.html"; 
            } else if(target === "SPACE INVADERS") {
                window.location.href = "invaders.html"; 
            } else if(target === "GALAXY SHOOTER") {
                window.location.href = "shooter.html"; 
            } else if(target === "BRICK BREAKER") {
                window.location.href = "brick.html";
            } else if(target === "NEON RACER") {
                window.location.href = "racer.html";
            } else if(target === "FLAPPY CYBER") {
                window.location.href = "flappy.html";
            } else if(target === "CYBER STRIKE") {
                window.location.href = "strike.html";    
            } else {
                alert("Arena " + target + " segera hadir di update berikutnya!"); 
            }
        }

        syncAll();
        setInterval(syncAll, 5000);
    </script>
</body>
</html>

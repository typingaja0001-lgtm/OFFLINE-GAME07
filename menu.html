<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - PREMIUM PC LOBBY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background: #020617; color: white; font-family: 'Rajdhani', sans-serif; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 80%);
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-border { box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); border: 1px solid rgba(0, 242, 255, 0.5); }

        /* ANIMASI KARTU GAME */
        .game-card {
            background: rgba(15, 23, 42, 0.8); border-radius: 16px; overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; position: relative;
        }
        .game-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: #00f2ff; 
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.2); 
        }
        
        /* IMAGE STYLING */
        .img-container { position: relative; width: 100%; height: 140px; overflow: hidden; }
        .game-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; filter: saturate(1.2); }
        .game-card:hover .game-img { transform: scale(1.1); filter: brightness(1.2); }

        /* PLAY OVERLAY */
        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }
        .game-card:hover .play-overlay { opacity: 1; }
        .play-icon { 
            background: #00f2ff; color: #000; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px #00f2ff;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f2ff; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-4 px-8 flex justify-between items-center border-b border-white/5 sticky top-0 bg-slate-950/80 backdrop-blur-xl z-50">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-cyan-500/10 rounded-lg neon-border">
                <i class="fas fa-terminal text-cyan-400 text-lg"></i>
            </div>
            <h1 class="text-2xl font-black orbitron italic tracking-tighter bg-gradient-to-r from-white to-cyan-400 bg-clip-text text-transparent">YOKBISAYOK</h1>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="hidden md:flex flex-col text-right">
                <span id="userName" class="text-xs font-black orbitron text-cyan-400">PLAYER_UNKNOWN</span>
                <span class="text-[10px] text-gray-500 uppercase tracking-widest">Elite Member</span>
            </div>
            <div class="h-10 w-10 rounded-full border-2 border-purple-500 p-0.5">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" class="rounded-full bg-slate-800">
            </div>
            <button onclick="logout()" class="hover:text-red-500 transition text-lg"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <main class="p-6 max-w-[1600px] mx-auto">
        
        <div class="mb-10 p-8 rounded-3xl bg-gradient-to-r from-slate-900 to-slate-800 border border-white/5 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-4xl font-black orbitron italic mb-2">PC OFFLINE <span class="text-cyan-400">DASHBOARD</span></h2>
                <p class="text-gray-400 max-w-xl">Akses library game PC terbaik tanpa koneksi internet. Semua game sudah ter-optimasi untuk performa maksimal di sistem anda.</p>
            </div>
            <i class="fas fa-gamepad absolute -right-10 -bottom-10 text-[200px] text-white/5 rotate-12"></i>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
            <div class="flex gap-3 overflow-x-auto w-full no-scrollbar">
                <button class="bg-cyan-500 text-black px-6 py-2 rounded-xl text-xs font-black orbitron whitespace-nowrap">ALL GAMES</button>
                <button class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-xs font-bold orbitron transition whitespace-nowrap">ACTION</button>
                <button class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-xs font-bold orbitron transition whitespace-nowrap">RACING</button>
                <button class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-xl text-xs font-bold orbitron transition whitespace-nowrap">HORROR</button>
            </div>
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" placeholder="Cari Koleksi Game..." class="w-full bg-slate-900 border border-white/10 p-3 pl-12 rounded-2xl focus:border-cyan-400 outline-none transition text-sm orbitron">
            </div>
        </div>

        <div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            </div>

    </main>

    <script>
        // DATA GAME DENGAN GAMBAR STABIL (Picsum & Specific URLs)
        const games = [
            { id: "snake", name: "Cyber Snake 2026", cat: "ARCADE", img: "https://images.unsplash.com/photo-1635326445070-5b5035780493?q=80&w=400" },
            { id: "motor", name: "MotoGP Extreme", cat: "RACING", img: "https://images.unsplash.com/photo-1591130219388-ae3d1c17431b?q=80&w=400" },
            { id: "space", name: "Starfield War", cat: "SHOOTER", img: "https://images.unsplash.com/photo-1614728263952-84ea206f99b6?q=80&w=400" },
            { id: "zombie", name: "Dead Target", cat: "HORROR", img: "https://images.unsplash.com/photo-1601513059633-2943644f9b46?q=80&w=400" },
            { id: "drift", name: "Nissan Skyline Drift", cat: "RACING", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=400" },
            { id: "knife", name: "Knife Hit Pro", cat: "ACTION", img: "https://images.unsplash.com/photo-1589182397057-b129519163b4?q=80&w=400" },
            { id: "chess", name: "Grandmaster Chess", cat: "STRATEGY", img: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80&w=400" },
            { id: "tetris", name: "Tetris Neo-Glow", cat: "PUZZLE", img: "https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?q=80&w=400" },
            { id: "box", name: "UFC Knockout", cat: "FIGHT", img: "https://images.unsplash.com/photo-1509190314491-b74bc6276040?q=80&w=400" },
            { id: "pool", name: "Real Pool 3D", cat: "SPORT", img: "https://images.unsplash.com/photo-1538388149542-5e24932d11a8?q=80&w=400" },
            { id: "tank", name: "World of Tanks", cat: "WAR", img: "https://images.unsplash.com/photo-1508349177119-83c02a70597d?q=80&w=400" },
            { id: "bird", name: "Angry Bird Neo", cat: "ACTION", img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=400" }
        ];

        const loggedUser = localStorage.getItem("loginUser");
        if(!loggedUser) { window.location.href = "index.html"; }
        else {
            document.getElementById("userName").innerText = loggedUser.toUpperCase();
        }

        const grid = document.getElementById("menuGrid");
        games.forEach(g => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.onclick = () => window.location.href = `loading.html?game=${g.id}`;

            card.innerHTML = `
                <div class="img-container">
                    <img src="${g.img}" class="game-img" alt="${g.name}">
                    <div class="play-overlay">
                        <div class="play-icon"><i class="fas fa-play"></i></div>
                    </div>
                </div>
                <div class="p-4">
                    <span class="text-[9px] text-cyan-400 font-black orbitron tracking-widest">${g.cat}</span>
                    <h4 class="font-bold text-sm truncate uppercase orbitron text-white/90 mt-1">${g.name}</h4>
                    <div class="flex items-center gap-2 mt-3">
                        <div class="h-1 flex-1 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-cyan-500 w-[70%]"></div>
                        </div>
                        <span class="text-[8px] text-gray-500 font-bold">READY</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        function logout() {
            localStorage.removeItem("loginUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

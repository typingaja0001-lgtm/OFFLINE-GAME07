<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - ARENA SUPREME ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { background: #050112; color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-purple { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
        .neon-cyan { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        
        .arcade-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 2px solid rgba(255, 0, 255, 0.3); 
            border-radius: 20px; padding: 20px; text-align: center; 
            backdrop-filter: blur(10px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; overflow: hidden;
        }
        .arcade-card.ready { border-color: #ff00ff; cursor: pointer; }
        .arcade-card.ready:hover { 
            border-color: #00f2ff; 
            transform: scale(1.08) translateY(-10px); 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4); 
            background: rgba(0, 0, 0, 0.8);
        }

        .h-28 { 
            height: 112px;
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0, 0, 0, 0.6); border-radius: 0.75rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
        }
        
        .arcade-card.locked { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        #gameModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #0d0221; border: 3px solid #ff00ff; padding: 40px; border-radius: 25px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 60px rgba(255, 0, 255, 0.4); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050112; }
        ::-webkit-scrollbar-thumb { background: #ff00ff; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="gameModal">
        <div class="modal-box">
            <div class="flex justify-center mb-6">
                <div class="bg-cyan-400 p-3 rounded-2xl shadow-[0_0_20px_#00f2ff]">
                    <i class="fas fa-play text-3xl text-black"></i>
                </div>
            </div>
            <h2 id="modalTitle" class="orbitron text-3xl neon-purple mb-8 uppercase italic font-bold">GAME NAME</h2>
            <div id="popupRankList" class="mb-10 min-h-[60px] flex flex-col gap-3"></div>
            <button onclick="startGameAction()" class="w-full bg-white text-black py-4 rounded-xl orbitron font-black text-xl hover:bg-cyan-400 transition uppercase tracking-tighter shadow-[0_5px_0_#ccc]">MASUK ARENA</button>
            <button onclick="closeModal()" class="mt-8 text-gray-500 text-xs orbitron uppercase tracking-[0.2em] block w-full hover:text-white transition">BATAL</button>
        </div>
    </div>

    <header class="p-6 px-12 flex justify-between items-center bg-black/90 border-b-2 border-cyan-500 sticky top-0 z-50 backdrop-blur-md">
        <h1 class="text-3xl font-black orbitron italic neon-cyan">YOKBISAYOK</h1>
        <div class="flex items-center gap-10">
            <div class="text-right">
                <p id="userNameDisplay" class="text-[10px] orbitron font-bold neon-purple uppercase tracking-widest">---</p>
                <p id="myTotalScore" class="text-2xl orbitron font-bold neon-cyan">0</p>
            </div>
            <button onclick="localStorage.removeItem('loginUser'); window.location.href='index.html'" class="text-red-500 text-2xl hover:scale-110 transition"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-12">
        <div class="mb-12">
            <h2 class="text-5xl font-black orbitron italic text-white uppercase italic">PC <span class="neon-purple">ULTRA</span> LIBRARY</h2>
            <p class="text-[10px] text-gray-500 tracking-[5px] mt-2 font-bold uppercase">DATABASE REALTIME AKTIF • 10 READY GAMES</p>
        </div>
        
        <div id="arcadeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 mb-24"></div>

        <h3 class="orbitron text-purple-400 text-xl mb-8 italic flex items-center gap-4">
            <span class="h-[1px] w-12 bg-purple-500"></span> HALL OF FAME <span class="h-[1px] flex-1 bg-gray-800"></span>
        </h3>
        <div id="leaderList" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const activeUser = (localStorage.getItem('loginUser') || "USER").toUpperCase();
        document.getElementById('userNameDisplay').innerText = activeUser;

        // DAFTAR GAME (TAMBAH NEON MINER DI SINI)
        const readyGames = [
            "NEON MINER", "SNAKE RETRO", "TETRIS ULTRA", "PAC-MAN NEO", "SPACE INVADERS", 
            "GALAXY SHOOTER", "BRICK BREAKER", "NEON RACER", "FLAPPY CYBER", "CYBER STRIKE"
        ];
        
        const thematicSvgs = {
            "NEON MINER": `<svg viewBox="0 0 100 100" class="h-16 w-16" style="filter:drop-shadow(0 0 8px #00f2ff)"><path d="M20 80 L50 50 L80 80 Z" fill="#00f2ff" opacity="0.5"/><path d="M50 20 L80 50 L50 80 L20 50 Z" fill="#ff00ff"/><path d="M50 20 L80 50 L50 80 L20 50 Z" fill="none" stroke="#fff" stroke-width="2"/></svg>`,
            "SNAKE RETRO": `<svg viewBox="0 0 100 100" class="h-16 w-16" style="filter:drop-shadow(0 0 8px #ff00ff)"><path d="M10 10 h10 v10 h10 v10 h-10 v10 h10 v10 h20 v-10 h10 v-10 h-10 v-10 h10 v-10 h-20 Z" fill="#ff00ff" stroke="#fff" stroke-width="2"/></svg>`,
            "TETRIS ULTRA": `<svg viewBox="0 0 100 100" class="h-16 w-16"><rect x="10" y="10" width="15" height="15" fill="#ff0000"/><rect x="10" y="25" width="15" height="15" fill="#00ff00"/><path d="M10 10 h30 v45 h-30 Z" fill="none" stroke="#fff" stroke-width="2"/></svg>`,
            "PAC-MAN NEO": `<svg viewBox="0 0 100 100" class="h-16 w-16"><path d="M10 50 A40 40 0 1 1 90 50 A40 40 0 1 1 10 50 Z" fill="#ff00ff" stroke="#fff" stroke-width="2"/></svg>`,
            "SPACE INVADERS": `<svg viewBox="0 0 100 100" class="h-16 w-16"><path d="M10 50 h80 v10 h-10 v10 h-10 v10 h-10 v-10 h-10 v-10 h-10 Z" fill="#ff00ff" stroke="#fff" stroke-width="2"/></svg>`,
            "GALAXY SHOOTER": `<svg viewBox="0 0 100 100" class="h-16 w-16"><path d="M50 10 L60 40 L90 40 L70 60 L80 90 L50 70 L20 90 L30 60 L10 40 L40 40 Z" fill="#ff00ff" stroke="#fff" stroke-width="2"/></svg>`,
            "BRICK BREAKER": `<svg viewBox="0 0 100 100" class="h-16 w-16"><rect x="10" y="80" width="30" height="5" fill="#fff"/><circle cx="20" cy="70" r="3" fill="#ff00ff"/></svg>`,
            "NEON RACER": `<svg viewBox="0 0 100 100" class="h-16 w-16"><path d="M10 80 h80 L70 40 L30 40 Z" fill="#00f2ff" stroke="#fff" stroke-width="2"/></svg>`,
            "FLAPPY CYBER": `<svg viewBox="0 0 100 100" class="h-16 w-16"><path d="M10 50 L30 30 L50 50 L30 70 Z" fill="#ff00ff" stroke="#fff" stroke-width="2"/></svg>`,
            "CYBER STRIKE": `<svg viewBox="0 0 100 100" class="h-16 w-16"><circle cx="50" cy="50" r="40" fill="none" stroke="#ff00ff" stroke-width="3"/></svg>`
        };

        const grid = document.getElementById('arcadeGrid');
        let allGames = [...readyGames];
        for(let i=allGames.length + 1; i<=48; i++) { allGames.push("LOCKED GAME #" + i); }

        allGames.forEach((name, idx) => {
            const isReady = readyGames.includes(name);
            grid.innerHTML += `
                <div class="arcade-card ${isReady ? 'ready' : 'locked'}">
                    <div class="h-28 flex items-center justify-center rounded-xl mb-4 border border-white/5 bg-black/40">
                        ${isReady ? thematicSvgs[name] : '<i class="fas fa-lock text-3xl text-gray-700"></i>'}
                    </div>
                    <p class="text-[10px] font-black orbitron text-white uppercase mb-4 truncate italic">${name}</p>
                    <button onclick="${isReady ? `showPopup('${name}')` : ''}" 
                        class="w-full ${isReady ? 'bg-cyan-500' : 'bg-gray-800'} text-black py-2 rounded-lg orbitron font-bold text-[9px] hover:bg-white transition uppercase">
                        ${isReady ? 'PLAY NOW' : 'LOCKED'}
                    </button>
                </div>`;
        });

        // --- DATABASE LOGIC ---
        async function getDatabase() {
            try {
                const res = await fetch(dbURL + "?nocache=" + Date.now());
                const data = await res.json();
                return data ? Object.values(data).sort((a, b) => b.score - a.score) : [];
            } catch (e) { return []; }
        }

        let currentGameTarget = "";
        async function showPopup(name) {
            currentGameTarget = name;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('gameModal').style.display = 'flex';
            const list = document.getElementById('popupRankList');
            list.innerHTML = "<p class='text-[10px] text-cyan-500 animate-pulse'>SYNCING...</p>";
            const players = await getDatabase();
            list.innerHTML = "";
            players.slice(0, 3).forEach((p, i) => {
                list.innerHTML += `<div class="bg-white/5 p-2 rounded border border-white/10 flex justify-between text-[11px]"><span>${p.name}</span><span class="neon-cyan">${p.score}</span></div>`;
            });
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }

        function startGameAction() { 
            const target = currentGameTarget.toUpperCase().trim();
            const routes = {
                "NEON MINER": "miner.html", // Rute ke game baru
                "SNAKE RETRO": "snake.html",
                "TETRIS ULTRA": "tetris.html",
                "PAC-MAN NEO": "pacman.html",
                "SPACE INVADERS": "invaders.html",
                "GALAXY SHOOTER": "shooter.html",
                "BRICK BREAKER": "brick.html",
                "NEON RACER": "racer.html",
                "FLAPPY CYBER": "flappy.html",
                "CYBER STRIKE": "strike.html"
            };
            if(routes[target]) window.location.href = routes[target];
        }

        async function syncAll() {
            const players = await getDatabase();
            const me = players.find(p => p.name.toUpperCase() === activeUser);
            document.getElementById('myTotalScore').innerText = me ? me.score.toLocaleString() : "0";
            const list = document.getElementById('leaderList');
            if(list) {
                list.innerHTML = "";
                players.slice(0, 12).forEach((p, idx) => {
                    list.innerHTML += `<div class="bg-black/40 border border-purple-500/20 p-4 rounded-xl flex justify-between items-center"><span class="orbitron text-purple-500">${idx+1}</span><p class="text-xs orbitron">${p.name}</p><p class="text-xs neon-cyan">${p.score}</p></div>`;
                });
            }
        }

        syncAll();
        setInterval(syncAll, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKBISAYOK - FLAPPY CYBER ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        
        body { 
            background: #050112; color: white; font-family: 'Rajdhani', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px; overflow: hidden;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-text-pink { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        .neon-text-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }

        /* BACK BUTTON STYLE */
        .btn-back {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 10px 20px; border-radius: 12px;
            font-size: 0.8rem; color: #00f2ff; transition: 0.3s;
            z-index: 1000;
        }
        .btn-back:hover { background: #00f2ff; color: #020617; box-shadow: 0 0 20px #00f2ff; }

        #game-container { 
            position: relative; border: 4px solid #ff00ff; 
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.4); 
            background: #000; border-radius: 25px; overflow: hidden; 
        }

        canvas { display: block; cursor: crosshair; }

        #gameOverModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 100; 
            align-items: center; justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: #0d0221; border: 3px solid #00f2ff; padding: 40px; 
            border-radius: 30px; text-align: center; box-shadow: 0 0 80px rgba(0, 242, 255, 0.5); 
            width: 360px; 
        }

        .guide-panel {
            margin-top: 25px; width: 400px; max-width: 90%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 20px; padding: 15px;
            box-shadow: inset 0 0 20px rgba(255, 0, 255, 0.05);
        }
        .key-badge {
            background: #1a1a1a; border: 1px solid #ff00ff; color: #ff00ff;
            padding: 3px 12px; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }
    </style>
</head>
<body>

    <a href="menu.html" class="btn-back orbitron uppercase font-bold">
        <i class="fas fa-arrow-left mr-2"></i> Back to Base
    </a>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="orbitron text-5xl neon-text-pink mb-2 italic tracking-tighter">OFFLINE</h2>
            <p id="lvlMsg" class="text-xs text-yellow-400 uppercase orbitron mb-8 tracking-[0.3em]">WAVE 1 CLEARED</p>
            
            <div class="mb-10 p-6 bg-black/40 rounded-2xl border border-white/10">
                <p class="text-gray-500 text-xs uppercase orbitron tracking-wider">Nodes Collected</p>
                <p id="finalScoreDisplay" class="text-7xl neon-text-cyan orbitron font-bold">0</p>
            </div>
            
            <div class="flex flex-col gap-4">
                <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black orbitron hover:bg-pink-500 transition uppercase italic text-lg shadow-[0_4px_0_#ccc]">RE-BOOT DRONE</button>
                <button onclick="saveAndExit()" class="w-full border border-gray-600 text-gray-500 py-3 rounded-xl hover:text-white hover:border-white transition uppercase text-[10px] orbitron">RETURN TO BASE</button>
            </div>
        </div>
    </div>

    <div class="flex gap-14 mb-6 text-center">
        <div>
            <p class="text-xs text-gray-500 uppercase orbitron tracking-widest">Wave</p>
            <p id="lvlDisplay" class="text-4xl text-yellow-400 orbitron">1</p>
        </div>
        <div>
            <p class="text-xs text-gray-500 uppercase orbitron tracking-widest">Data Score</p>
            <p id="pScore" class="text-4xl neon-text-pink orbitron">0</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="flappyCanvas" width="400" height="520"></canvas>
    </div>

    <div class="guide-panel">
        <h3 class="orbitron text-[10px] text-center text-pink-500 mb-4 tracking-[0.4em] uppercase">--- Flight Protocol ---</h3>
        <div class="flex justify-around items-center">
            <div class="text-center">
                <p class="text-[10px] text-gray-500 uppercase mb-2 font-bold italic">Command</p>
                <div class="flex gap-2 items-center justify-center">
                    <span class="key-badge italic">SPACE</span>
                    <span class="text-gray-600">/</span>
                    <span class="key-badge italic">TAP</span>
                </div>
            </div>
            <div class="h-10 w-[1px] bg-white/10"></div>
            <div class="text-left">
                <p class="text-[10px] text-gray-500 uppercase mb-1 font-bold italic">Objective</p>
                <p class="text-[12px] text-gray-300">● Avoid Red Lasers</p>
                <p class="text-[12px] text-cyan-400">● Level Up Every 5 Points</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('flappyCanvas');
        const ctx = canvas.getContext('2d');
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const player = (localStorage.getItem('loginUser') || "USER").toUpperCase();

        let score = 0, level = 1, gameActive = true;
        let gravity = 0.26, speed = 3.8;
        
        const drone = { x: 70, y: 200, w: 38, h: 26, dy: 0, jump: -6 };
        let pipes = [];
        const pipeWidth = 65, pipeGap = 160;

        function jump() { if(gameActive) drone.dy = drone.jump; }
        window.addEventListener('keydown', e => { if(e.code === 'Space') jump(); });
        canvas.addEventListener('mousedown', jump);

        function spawnPipe() {
            let minH = 70, maxH = canvas.height - pipeGap - minH;
            let h = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
            pipes.push({ x: canvas.width, y: h, passed: false });
        }

        function drawDrone() {
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
            ctx.fillStyle = '#00f2ff';
            ctx.beginPath();
            ctx.moveTo(drone.x, drone.y + 8);
            ctx.lineTo(drone.x + drone.w, drone.y);
            ctx.lineTo(drone.x + drone.w, drone.y + drone.h);
            ctx.lineTo(drone.x, drone.y + drone.h - 8);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(drone.x + 20, drone.y + 5, 12, 10);
            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(p => {
                ctx.save();
                let grad = ctx.createLinearGradient(p.x, 0, p.x + pipeWidth, 0);
                grad.addColorStop(0, 'rgba(255, 0, 85, 0.2)');
                grad.addColorStop(0.5, 'rgba(255, 0, 85, 0.6)');
                grad.addColorStop(1, 'rgba(255, 0, 85, 0.2)');
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff0055';
                ctx.fillStyle = grad;
                ctx.fillRect(p.x, 0, pipeWidth, p.y);
                ctx.fillRect(p.x, p.y + pipeGap, pipeWidth, canvas.height);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(p.x + pipeWidth/2, 0); ctx.lineTo(p.x + pipeWidth/2, p.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p.x + pipeWidth/2, p.y + pipeGap); ctx.lineTo(p.x + pipeWidth/2, canvas.height); ctx.stroke();
                ctx.restore();
            });
        }

        function checkLevel() {
            let next = Math.floor(score / 5) + 1;
            if(next > level) {
                level = next; speed += 0.5;
                document.getElementById('lvlDisplay').innerText = level;
                document.getElementById('game-container').style.borderColor = (level % 2 === 0) ? '#00f2ff' : '#ff00ff';
            }
        }

        function update() {
            if(!gameActive) return;
            drone.dy += gravity; drone.y += drone.dy;
            if(drone.y + drone.h > canvas.height || drone.y < 0) gameActive = false;
            if(pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 240) spawnPipe();
            pipes.forEach((p, i) => {
                p.x -= speed;
                if(drone.x + drone.w - 4 > p.x && drone.x + 4 < p.x + pipeWidth) {
                    if(drone.y + 4 < p.y || drone.y + drone.h - 4 > p.y + pipeGap) gameActive = false;
                }
                if(!p.passed && p.x + pipeWidth < drone.x) {
                    p.passed = true; score++;
                    document.getElementById('pScore').innerText = score;
                    checkLevel();
                }
                if(p.x + pipeWidth < 0) pipes.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#050112';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 1);
            drawPipes();
            drawDrone();
        }

        async function saveAndExit() {
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                let userKey = Object.keys(data).find(k => data[k].name.toUpperCase() === player);
                if(userKey) {
                    await fetch(`https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ score: data[userKey].score + score })
                    });
                }
            } catch (e) {}
            window.location.href = 'menu.html';
        }

        function loop() {
            update(); draw();
            if(gameActive) requestAnimationFrame(loop);
            else {
                document.getElementById('finalScoreDisplay').innerText = score;
                document.getElementById('lvlMsg').innerText = "WAVE " + level + " REACHED";
                document.getElementById('gameOverModal').style.display = 'flex';
            }
        }
        loop();
    </script>
</body>
</html>

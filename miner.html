<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON MINER: STARBOUND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #05010d; overflow: hidden; font-family: 'Orbitron', sans-serif; cursor: crosshair; }
        canvas { display: block; }
        .hud {
            position: fixed; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 100;
        }
        .hp-bar-container { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #ff0055; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #ff0055; transition: 0.2s; box-shadow: 0 0 10px #ff0055; }
        .btn-back {
            position: fixed; bottom: 20px; left: 20px; z-index: 100;
            padding: 10px 20px; border: 2px solid #00f2ff; color: #00f2ff;
            text-decoration: none; font-size: 12px; background: rgba(0,242,255,0.1);
        }
        #game-over {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="hud">
        <div class="text-cyan-400">
            <p class="text-[10px] tracking-widest opacity-60">CRYSTALS_MINED</p>
            <h1 id="score" class="text-4xl font-black">0</h1>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-pink-500 tracking-widest opacity-60">DRONE_INTEGRITY</p>
            <div class="hp-bar-container"><div id="hp-fill"></div></div>
        </div>
    </div>

    <a href="menu.html" class="btn-back">ABORT MISSION</a>

    <div id="game-over">
        <h1 class="text-6xl text-pink-600 font-black mb-4">DRONE DESTROYED</h1>
        <p id="final-score" class="text-white text-xl mb-8">SCORE: 0</p>
        <button onclick="location.reload()" class="px-10 py-4 bg-cyan-500 text-black font-bold hover:bg-white transition">REBOOT SYSTEM</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let hp = 100;
        let gameActive = true;
        const mouse = { x: canvas.width/2, y: canvas.height/2 };
        
        let entities = [];
        let particles = [];

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vX = (Math.random() - 0.5) * 10;
                this.vY = (Math.random() - 0.5) * 10;
                this.alpha = 1;
            }
            update() { this.x += this.vX; this.y += this.vY; this.alpha -= 0.02; }
            draw() {
                ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
            }
        }

        class Entity {
            constructor(type) {
                this.type = type; // 'crystal' atau 'enemy'
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = this.type === 'enemy' ? 15 : 10;
                this.color = this.type === 'enemy' ? '#ff0055' : (Math.random() > 0.5 ? '#00f2ff' : '#bc13fe');
                this.speed = this.type === 'enemy' ? 1.5 + (score/500) : 0;
            }
            update() {
                if(this.type === 'enemy') {
                    // AI Mengejar Player
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;
                }

                // Cek Tabrakan dengan Player
                const dist = Math.hypot(mouse.x - this.x, mouse.y - this.y);
                if(dist < this.size + 15) {
                    if(this.type === 'enemy') {
                        hp -= 20;
                        document.getElementById('hp-fill').style.width = hp + '%';
                        this.explode('#ff0055');
                        if(hp <= 0) endGame();
                    } else {
                        score += 50;
                        document.getElementById('score').innerText = score;
                        this.explode(this.color);
                    }
                    this.init();
                }
            }
            draw() {
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if(this.type === 'enemy') {
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(Date.now()*0.005);
                    ctx.strokeRect(-this.size, -this.size, this.size*2, this.size*2);
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore();
                } else {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                }
            }
            explode(color) {
                for(let i=0; i<15; i++) particles.push(new Particle(this.x, this.y, color));
            }
        }

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = "FINAL SCORE: " + score;
        }

        // Spawn Awal
        for(let i=0; i<8; i++) entities.push(new Entity('crystal'));
        for(let i=0; i<3; i++) entities.push(new Entity('enemy'));

        function animate() {
            if(!gameActive) return;
            ctx.fillStyle = 'rgba(5, 1, 13, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Player Drone
            ctx.shadowBlur = 20; ctx.shadowColor = '#fff'; ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 15, 0, Math.PI*2); ctx.stroke();

            entities.forEach(en => { en.update(); en.draw(); });
            particles.forEach((p, i) => { 
                p.update(); p.draw(); 
                if(p.alpha <= 0) particles.splice(i, 1);
            });

            // Tambah musuh tiap 1000 skor
            if(score > 0 && score % 1000 === 0 && entities.length < 20) {
                entities.push(new Entity('enemy'));
                score += 50; // trigger ganjil biar gak spawn terus
            }

            requestAnimationFrame(animate);
        }

        animate();
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON MINER - BREAKOUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        
        body { 
            margin: 0; background: #05010d; overflow: hidden; 
            font-family: 'Orbitron', sans-serif; cursor: none; 
        }

        #game-canvas { display: block; }

        /* HUD */
        .ui-layer {
            position: fixed; top: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 100;
        }

        .btn-back {
            position: fixed; bottom: 20px; left: 20px;
            padding: 10px 20px; border: 2px solid #ff0055;
            color: #ff0055; text-decoration: none; font-size: 12px;
            background: rgba(255,0,85,0.1); pointer-events: auto;
        }

        .combo-text {
            position: absolute; color: #00f2ff; font-size: 40px;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="text-cyan-400">
            <p class="text-[10px] tracking-widest opacity-50">CRYSTALS_SHATTERED</p>
            <h1 id="score" class="text-4xl">0</h1>
        </div>
        <div class="text-right text-pink-500">
            <p class="text-[10px] tracking-widest opacity-50">DRONE_STATUS</p>
            <h1 class="text-xl">ONLINE</h1>
        </div>
    </div>

    <a href="menu.html" class="btn-back">EXIT MINES</a>
    <canvas id="game-canvas"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let particles = [];
        let crystals = [];
        const mouse = { x: canvas.width/2, y: canvas.height/2 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Crystal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 20 + 15;
                this.color = Math.random() > 0.5 ? '#00f2ff' : '#bc13fe';
                this.pulse = 0;
            }
            update() {
                this.pulse += 0.1;
                // Collision check with "Drone" (mouse)
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx*dx + dy*dy);
                
                if(distance < this.size + 20) {
                    this.shatter();
                    return true;
                }
                return false;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.pulse * 0.2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
            shatter() {
                score++;
                scoreEl.innerText = score;
                for(let i=0; i<15; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
        }

        function init() {
            if(crystals.length < 10) crystals.push(new Crystal());
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 1, 13, 0.2)'; // Trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Drone (Mouse Pointer)
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 15, 0, Math.PI * 2);
            ctx.stroke();

            // Update & Draw Crystals
            for(let i = crystals.length - 1; i >= 0; i--) {
                crystals[i].draw();
                if(crystals[i].update()) {
                    crystals.splice(i, 1);
                }
            }

            // Update & Draw Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if(particles[i].opacity <= 0) particles.splice(i, 1);
            }

            init();
            requestAnimationFrame(animate);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

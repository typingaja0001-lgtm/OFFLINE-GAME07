<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID SURVIVOR - ARENA PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #010005; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; cursor: crosshair; }
        canvas { display: block; filter: drop-shadow(0 0 15px #bc13fe); }
        
        /* UI OVERLAY */
        .ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
        .btn-back { pointer-events: auto; border: 1px solid #bc13fe; background: rgba(188, 19, 254, 0.1); padding: 10px 20px; border-radius: 4px; color: #bc13fe; font-size: 11px; text-decoration: none; transition: 0.3s; }
        .btn-back:hover { background: #bc13fe; color: white; box-shadow: 0 0 20px #bc13fe; }

        /* CARA BERMAIN HINT */
        .tutorial-hint { position: fixed; bottom: 30px; left: 30px; opacity: 0.6; font-size: 10px; letter-spacing: 2px; }
        
        #gameOverModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px); pointer-events: auto;
        }
        .modal-box {
            background: #050112; border: 2px solid #bc13fe; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px #bc13fe; width: 90%; max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="ui-layer p-8 flex justify-between items-start">
        <a href="menu.html" class="btn-back font-black tracking-widest uppercase">
            <i class="fas fa-th-large mr-2"></i> EXIT TO MENU
        </a>
        
        <div class="text-right">
            <p class="text-[9px] text-purple-400 tracking-[5px] mb-1">ELIMINATIONS</p>
            <h1 id="scoreDisplay" class="text-5xl font-black italic drop-shadow-[0_0_10px_#bc13fe]">0</h1>
        </div>
    </div>

    <div class="tutorial-hint text-cyan-400">
        <p><i class="fas fa-mouse-pointer mr-2"></i> MOVE MOUSE TO NAVIGATE</p>
        <p><i class="fas fa-crosshairs mr-2 mt-2"></i> LEFT CLICK TO FIRE CANNON</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="gameOverModal">
        <div class="modal-box">
            <h1 class="text-4xl font-black italic text-purple-500 mb-2 uppercase">MISSION FAILED</h1>
            <p class="text-gray-500 text-[10px] tracking-[5px] mb-8">SYSTEM RECOVERY NEEDED</p>
            
            <div class="bg-white/5 p-5 rounded-xl mb-10 border-l-4 border-purple-500 text-left">
                <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-1">Total Score</p>
                <p id="finalScore" class="text-4xl font-black text-white">0</p>
            </div>

            <div class="grid gap-4">
                <button onclick="restartGame()" class="w-full bg-purple-600 text-white py-4 font-black tracking-widest hover:bg-white hover:text-black transition uppercase text-sm rounded-lg">RE-INITIALIZE</button>
                <button onclick="window.location.href='index.html'" class="w-full border border-gray-700 text-gray-500 py-3 font-bold hover:text-white transition text-[10px] tracking-widest rounded-lg">BACK TO BASE</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0, gameActive = true;
        const player = { x: canvas.width/2, y: canvas.height/2, r: 18, color: '#00f2ff' };
        const bullets = [], enemies = [], particles = [];

        // MOUSE CONTROLS
        window.addEventListener('mousemove', (e) => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        window.addEventListener('mousedown', () => {
            if(!gameActive) return;
            bullets.push({ 
                x: player.x, 
                y: player.y - 10, 
                r: 5, 
                color: '#fff', 
                speed: 12 
            });
        });

        function spawnEnemy() {
            if(!gameActive) return;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -50 : canvas.width + 50;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? -50 : canvas.height + 50;
            }
            const angle = Math.atan2(player.y - y, player.x - x);
            enemies.push({ 
                x, y, 
                r: 15 + Math.random() * 15, 
                color: '#ff0055', 
                v: { x: Math.cos(angle) * (2 + score/2000), y: Math.sin(angle) * (2 + score/2000) } 
            });
            setTimeout(spawnEnemy, Math.max(400, 1500 - score/50));
        }

        function createParticles(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({ 
                    x, y, 
                    r: Math.random()*4, 
                    color, 
                    v: { x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*8 }, 
                    alpha: 1 
                });
            }
        }

        function restartGame() {
            score = 0; enemies.length = 0; bullets.length = 0; particles.length = 0;
            gameActive = true; 
            document.getElementById('gameOverModal').style.display = 'none';
            document.getElementById('scoreDisplay').innerText = "0";
            animate();
        }

        function animate() {
            if(!gameActive) return;
            ctx.fillStyle = 'rgba(1, 0, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Bullets
            bullets.forEach((b, bi) => {
                b.y -= b.speed;
                ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
                ctx.fillStyle = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
                if(b.y < -20) bullets.splice(bi, 1);
            });

            // Particles
            particles.forEach((p, pi) => {
                p.x += p.v.x; p.y += p.v.y; p.alpha -= 0.02;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
                if(p.alpha <= 0) particles.splice(pi, 1);
            });

            // Player Glow
            ctx.shadowBlur = 25; ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; // Core
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r/2, 0, Math.PI*2); ctx.fill();

            // Enemies
            enemies.forEach((en, ei) => {
                en.x += en.v.x; en.y += en.v.y;
                ctx.shadowBlur = 15; ctx.shadowColor = en.color;
                ctx.fillStyle = en.color;
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();

                // Collision Player
                const dist = Math.hypot(player.x - en.x, player.y - en.y);
                if(dist - en.r - player.r < 1) {
                    gameActive = false;
                    document.getElementById('finalScore').innerText = score.toLocaleString();
                    document.getElementById('gameOverModal').style.display = 'flex';
                }

                // Collision Bullet
                bullets.forEach((b, bi) => {
                    const bDist = Math.hypot(b.x - en.x, b.y - en.y);
                    if(bDist - en.r - b.r < 1) {
                        createParticles(en.x, en.y, en.color);
                        score += 150;
                        document.getElementById('scoreDisplay').innerText = score.toLocaleString();
                        setTimeout(() => { enemies.splice(ei, 1); bullets.splice(bi, 1); }, 0);
                    }
                });
            });

            requestAnimationFrame(animate);
        }

        spawnEnemy();
        animate();
    </script>
</body>
</html>

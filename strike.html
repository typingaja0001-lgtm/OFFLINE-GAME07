<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YOKBISAYOK - CYBER STRIKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        body { 
            background: #050112; color: white; font-family: 'Rajdhani', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; cursor: crosshair;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #game-container { 
            position: relative; border: 4px solid #ef4444; 
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.3); 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            border-radius: 20px; overflow: hidden; 
        }
        #gameOverModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 100; 
            align-items: center; justify-content: center; backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: #0d0221; border: 3px solid #ef4444; padding: 40px; 
            border-radius: 25px; text-align: center; box-shadow: 0 0 60px #ef4444; width: 340px; 
        }
        .hud { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gameOverModal">
        <div class="modal-content">
            <h2 class="orbitron text-4xl text-red-500 mb-2 italic">MISSION FAILED</h2>
            <p class="text-[10px] text-gray-400 uppercase orbitron mb-6 tracking-widest italic">Base Compromised</p>
            <div class="mb-10">
                <p class="text-gray-500 text-[10px] uppercase orbitron">Kill Count</p>
                <p id="finalScoreDisplay" class="text-6xl text-red-500 orbitron">0</p>
            </div>
            <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black orbitron hover:bg-red-500 transition uppercase italic text-lg">RE-DEPLOY</button>
            <button onclick="window.location.href='menu.html'" class="mt-4 w-full text-gray-500 text-[10px] orbitron uppercase">Abort Mission</button>
        </div>
    </div>

    <div class="mb-4 text-center">
        <p class="text-[10px] text-gray-500 uppercase orbitron">Tactical Score</p>
        <p id="pScore" class="text-5xl text-red-500 orbitron">0</p>
    </div>

    <div id="game-container">
        <div class="hud">
            <p class="text-xs text-red-500 orbitron">HEALTH: <span id="healthDisplay">100%</span></p>
        </div>
        <canvas id="strikeCanvas" width="600" height="400"></canvas>
    </div>

    <div class="mt-6 p-4 bg-white/5 border border-red-500/20 rounded-xl w-[600px] flex justify-around items-center">
        <div class="text-center">
            <p class="text-[10px] text-gray-500 uppercase orbitron">Action</p>
            <p class="text-sm">CLICK TO FIRE</p>
        </div>
        <div class="text-center">
            <p class="text-[10px] text-gray-500 uppercase orbitron">Enemy</p>
            <p class="text-sm text-red-400">NEON DRONES</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('strikeCanvas');
        const ctx = canvas.getContext('2d');
        const dbURL = "https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard.json";
        const player = (localStorage.getItem('loginUser') || "USER").toUpperCase();

        let score = 0, health = 100, gameActive = true;
        let enemies = [], particles = [], mouse = {x: 0, y: 0}, recoil = 0;

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mousedown', () => {
            if(!gameActive) return;
            recoil = 15; // Efek hentakan senjata
            checkHit();
        });

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, 
                    vy: (Math.random()-0.5)*10, 
                    life: 1, color
                });
            }
        }

        function checkHit() {
            enemies.forEach((en, i) => {
                const dist = Math.hypot(en.x - mouse.x, en.y - mouse.y);
                if(dist < en.r) {
                    createExplosion(en.x, en.y, '#ff0000');
                    enemies.splice(i, 1);
                    score += 150;
                    document.getElementById('pScore').innerText = score;
                }
            });
        }

        function spawnEnemy() {
            if(Math.random() < 0.02 + (score/10000)) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: 20 + Math.random()*20,
                    timer: 100 - (score/500) // Musuh menyerang lebih cepat seiring waktu
                });
            }
        }

        function update() {
            if(!gameActive) return;
            spawnEnemy();

            if(recoil > 0) recoil -= 2;

            enemies.forEach((en, i) => {
                en.timer -= 1;
                if(en.timer <= 0) {
                    health -= 10;
                    document.getElementById('healthDisplay').innerText = health + "%";
                    createExplosion(en.x, en.y, '#ffffff');
                    enemies.splice(i, 1);
                    if(health <= 0) gameActive = false;
                }
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Grid (Cyber Atmosphere)
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }

            // Draw Enemies (Realistic Drones)
            enemies.forEach(en => {
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
                // Body
                ctx.fillStyle = '#333';
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();
                // Core Light
                ctx.fillStyle = `rgba(255, 0, 0, ${Math.abs(Math.sin(Date.now()/200))})`;
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r*0.4, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 0, 0, ${p.life})`;
                ctx.fillRect(p.x, p.y, 3, 3);
            });

            // Draw Gun Crosshair (Realistic HUD)
            ctx.save();
            ctx.translate(0, recoil);
            ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 15, 0, Math.PI*2);
            ctx.moveTo(mouse.x - 20, mouse.y); ctx.lineTo(mouse.x + 20, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 20); ctx.lineTo(mouse.x, mouse.y + 20);
            ctx.stroke();
            ctx.restore();
        }

        async function saveAndExit() {
            try {
                const res = await fetch(dbURL);
                const data = await res.json();
                let userKey = Object.keys(data).find(k => data[k].name.toUpperCase() === player);
                if(userKey) {
                    await fetch(`https://yokbisayok-db-default-rtdb.firebaseio.com/leaderboard/${userKey}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ score: data[userKey].score + score })
                    });
                }
            } catch (e) {}
            window.location.href = 'menu.html';
        }

        function loop() {
            update(); draw();
            if(gameActive) requestAnimationFrame(loop);
            else {
                document.getElementById('finalScoreDisplay').innerText = score;
                document.getElementById('gameOverModal').style.display = 'flex';
                saveAndExit();
            }
        }
        loop();
    </script>
</body>
</html>
